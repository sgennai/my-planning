<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0D0D0F" />
  <title>My Planning</title>
  <style>
    :root {
      --bg: #0D0D0F;
      --bg-card: #1F1C26;
      --bg-card-deep: #16151A;
      --bg-hover: #2A2630;
      --border: #2A2830;
      --rule: #2A2630;
      --col-divider: #3A3548;
      --gold: #C9A84C;
      --gold-dim: #9C8845;
      --teal: #7EB8A4;
      --violet: #A78BCA;
      --coral: #E07B6A;
      --text: #E8E0D0;
      --muted-1: #C8BFB0;
      --muted-2: #A09888;
      --muted-3: #7A7268;
      --muted-4: #5A5248;
      --serif: 'Georgia', 'Times New Roman', serif;
      --mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body { position: relative; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
    }
    body::after {
      content: ''; position: fixed; top: 0; left: 0; right: 0;
      height: 2px; z-index: 10;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .wrap, .wrap-wide {
      position: relative; z-index: 1;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .wrap { max-width: 820px; }
    .wrap-wide { max-width: 1500px; }
    .screen-pad-top { padding-top: 80px; }
    .screen-pad-top-sm { padding-top: 40px; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .eyebrow.danger { color: var(--coral); }
    h1.title {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 400;
      line-height: 1.05;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    h2.title {
      font-size: 28px;
      font-weight: 400;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    .rule {
      width: 60px; height: 1px;
      background: var(--gold);
      margin: 20px 0 28px;
    }
    p.lede {
      font-size: 15px;
      color: var(--muted-2);
      line-height: 1.8;
      max-width: 520px;
      margin: 0 0 40px;
      font-style: italic;
    }

    button { font-family: inherit; cursor: pointer; transition: all 0.15s ease; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      padding: 12px 28px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      font-size: 13px;
      letter-spacing: 0.1em;
    }
    .btn-primary:hover:not(:disabled) { background: #D9B85C; }
    .btn-secondary {
      padding: 12px 20px;
      background: transparent;
      color: var(--muted-2);
      border: 1px solid var(--border);
      font-size: 13px;
      letter-spacing: 0.05em;
    }
    .btn-secondary:hover { border-color: var(--muted-3); color: var(--text); }
    .btn-tertiary {
      padding: 8px 14px;
      background: transparent;
      color: var(--muted-3);
      border: none;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .btn-tertiary:hover { color: var(--muted-2); }

    .center { display: flex; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }

    .error-box {
      margin-top: 20px;
      padding: 14px 18px;
      background: #2A1A1A;
      border-left: 2px solid var(--coral);
      color: var(--coral);
      font-size: 13px;
      line-height: 1.6;
      font-family: var(--mono);
    }
    .info-box {
      margin-top: 32px;
      padding: 18px 22px;
      background: var(--bg-card);
      border-left: 2px solid var(--border);
      font-size: 12px;
      color: var(--muted-3);
      line-height: 1.9;
    }
    .info-box .info-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-4);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .pulse {
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
      display: inline-block;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ───────── CALENDAR HEADER ───────── */
    .cal-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }
    .cal-title-block { display: flex; flex-direction: column; min-width: 0; }
    .cal-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .cal-week-label {
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .cal-week-range {
      font-size: 12px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .cal-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .cal-nav-btn {
      width: 38px; height: 38px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 18px;
    }
    .cal-nav-btn:hover { border-color: var(--gold); color: var(--gold); }
    .cal-today-btn {
      padding: 0 16px; height: 38px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-2);
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    }
    .cal-today-btn:hover { border-color: var(--gold); color: var(--gold); }
    .cal-today-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201, 168, 76, 0.06);
    }
    .sync-pill {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 0.15em;
      color: var(--muted-4); text-transform: uppercase;
      font-family: var(--mono);
    }
    .sync-pill::before {
      content: ''; width: 5px; height: 5px;
      background: var(--teal); border-radius: 50%;
      box-shadow: 0 0 8px var(--teal);
    }
    .sync-pill.saving::before { background: var(--gold); animation: pulse 1.2s ease-in-out infinite; }
    .sync-pill.error::before { background: var(--coral); }

    /* ───────── WEEK GRID (desktop) ───────── */
    .week-grid {
      background: var(--bg-card);
      border-top: 1px solid var(--col-divider);
      overflow: hidden;
    }
    .week-grid-header {
      display: grid;
      grid-template-columns: 64px repeat(7, 1fr);
      border-bottom: 2px solid var(--col-divider);
      position: sticky; top: 0; z-index: 4;
      background: var(--bg-card-deep);
    }
    .time-gutter-header { border-right: 2px solid var(--col-divider); }
    .day-header {
      padding: 14px 8px;
      text-align: center;
      border-left: 2px solid var(--col-divider);
      cursor: pointer;
      transition: background 0.15s;
    }
    .day-header:hover { background: rgba(201, 168, 76, 0.06); }
    .day-header.today { background: rgba(201, 168, 76, 0.05); }
    .day-header-name {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--muted-1);
      text-transform: uppercase;
      font-weight: 600;
    }
    .day-header.today .day-header-name { color: var(--gold); }
    .day-header.weekend .day-header-name { color: var(--muted-3); }
    .day-header-date {
      font-size: 19px;
      color: var(--text);
      margin-top: 5px;
      font-variant-numeric: tabular-nums;
      font-family: var(--serif);
      font-weight: 500;
    }
    .day-header.today .day-header-date { color: var(--gold); font-weight: 600; }
    .day-header.weekend .day-header-date { color: var(--muted-2); }

    .week-grid-body {
      display: grid;
      grid-template-columns: 64px repeat(7, 1fr);
      position: relative;
    }
    .time-gutter {
      position: relative;
      border-right: 2px solid var(--col-divider);
    }
    .hour-label {
      position: absolute;
      right: 10px;
      font-size: 11px;
      color: var(--muted-1);
      font-family: var(--mono);
      font-weight: 600;
      letter-spacing: 0.04em;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .day-column {
      position: relative;
      border-left: 2px solid var(--col-divider);
      min-height: 100%;
    }
    .day-column.today { background: rgba(201, 168, 76, 0.025); }
    .day-column.weekend { background: rgba(0,0,0,0.18); }
    .hour-line {
      position: absolute; left: 0; right: 0;
      border-top: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .cal-item {
      position: absolute;
      border-radius: 3px;
      padding: 4px 7px 4px 9px;
      overflow: hidden;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.15s ease;
      font-family: var(--serif);
    }
    .cal-item:hover {
      filter: brightness(1.3);
      transform: translateX(1px);
    }
    .cal-item-title {
      color: var(--text);
      font-size: 12px;
      line-height: 1.3;
      overflow: hidden;
    }
    .cal-item:not(.tiny):not(.short) .cal-item-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .cal-item.short .cal-item-title,
    .cal-item.tiny .cal-item-title {
      white-space: nowrap; text-overflow: ellipsis;
    }
    .cal-item-time {
      font-size: 10px;
      color: var(--muted-1);
      font-family: var(--mono);
      letter-spacing: 0.04em;
      margin-bottom: 2px;
      white-space: nowrap; overflow: hidden;
      font-weight: 500;
    }
    .cal-item-note {
      font-size: 10px;
      color: var(--muted-2);
      font-style: italic;
      margin-top: 3px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cal-item-home-flag {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
      margin-left: 5px;
      vertical-align: middle;
    }
    .cal-item.tiny { padding: 2px 5px 2px 7px; }
    .cal-item.tiny .cal-item-time { display: none; }
    .cal-item.tiny .cal-item-note { display: none; }
    .cal-item.tiny .cal-item-title { font-size: 10px; }
    .cal-item.short .cal-item-note { display: none; }

    /* Day-view items can show more */
    .day-view .cal-item-title { font-size: 14px; line-height: 1.35; }
    .day-view .cal-item:not(.tiny):not(.short) .cal-item-title { -webkit-line-clamp: 3; }
    .day-view .cal-item-time { font-size: 11px; margin-bottom: 4px; }
    .day-view .cal-item-note { font-size: 12px; -webkit-line-clamp: 4; margin-top: 5px; }

    .now-line {
      position: absolute;
      left: 0; right: 0;
      height: 0;
      border-top: 1px solid var(--gold);
      pointer-events: none;
      z-index: 5;
      box-shadow: 0 0 8px rgba(201, 168, 76, 0.5);
    }
    .now-line::before {
      content: '';
      position: absolute;
      left: -4px; top: -3.5px;
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold);
    }

    /* Day view (single-column zoom) */
    .day-view-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-2);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: var(--serif);
      margin-bottom: 16px;
    }
    .day-view-back:hover { border-color: var(--gold); color: var(--gold); }
    .day-view .week-grid-header {
      grid-template-columns: 80px 1fr;
    }
    .day-view .week-grid-body {
      grid-template-columns: 80px 1fr;
    }
    .day-view .day-header { padding: 18px 8px; cursor: default; }
    .day-view .day-header:hover { background: transparent; }
    .day-view .day-header.today:hover { background: rgba(201, 168, 76, 0.05); }
    .day-view .day-header-name { font-size: 12px; }
    .day-view .day-header-date { font-size: 28px; margin-top: 6px; }
    .day-view .hour-label { right: 14px; font-size: 12px; }

    /* ───────── AGENDA (mobile) ───────── */
    .agenda-day-strip {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      margin-bottom: 24px;
      padding-bottom: 6px;
      scrollbar-width: none;
    }
    .agenda-day-strip::-webkit-scrollbar { display: none; }
    .agenda-day-chip {
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-3);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      gap: 4px;
      min-width: 56px;
      font-family: var(--serif);
    }
    .agenda-day-chip-name {
      font-size: 9px; letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted-3);
    }
    .agenda-day-chip-date {
      font-size: 16px;
      color: var(--muted-2);
      font-variant-numeric: tabular-nums;
    }
    .agenda-day-chip.today { border-color: var(--muted-3); }
    .agenda-day-chip.today .agenda-day-chip-name { color: var(--gold); }
    .agenda-day-chip.selected {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.06);
    }
    .agenda-day-chip.selected .agenda-day-chip-name { color: var(--gold); }
    .agenda-day-chip.selected .agenda-day-chip-date { color: var(--text); }

    .agenda-header {
      margin-bottom: 16px;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .agenda-day-title {
      font-size: 22px; font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .agenda-day-subtitle {
      font-size: 11px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.1em;
    }

    .agenda-list { display: flex; flex-direction: column; gap: 3px; }
    .agenda-item {
      display: flex;
      align-items: stretch;
      background: var(--bg-card);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .agenda-item:hover { background: var(--bg-hover); }
    .agenda-item-stripe { width: 3px; flex-shrink: 0; }
    .agenda-item-time {
      width: 70px;
      padding: 14px 10px;
      flex-shrink: 0;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      letter-spacing: 0.05em;
      border-right: 1px solid var(--rule);
      display: flex; flex-direction: column; gap: 2px;
    }
    .agenda-item-time-end { color: var(--muted-4); font-size: 9px; }
    .agenda-item-content { padding: 14px 16px; flex: 1; min-width: 0; }
    .agenda-item-title {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }
    .agenda-item-meta {
      font-size: 11px;
      color: var(--muted-3);
      margin-top: 4px;
      font-style: italic;
      line-height: 1.5;
    }
    .agenda-item.past .agenda-item-time,
    .agenda-item.past .agenda-item-title,
    .agenda-item.past .agenda-item-meta { opacity: 0.4; }
    .agenda-item.now { background: rgba(201, 168, 76, 0.07); }
    .agenda-now-flag {
      position: absolute;
      right: 14px; top: 14px;
      font-size: 9px; letter-spacing: 0.25em;
      color: var(--gold);
      font-family: var(--mono);
    }
    .agenda-empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted-4);
      font-style: italic;
      font-size: 13px;
      background: var(--bg-card);
    }

    /* ───────── LEGEND + FOOTER ───────── */
    .legend {
      margin-top: 32px;
      padding: 16px 0;
      display: flex; flex-wrap: wrap;
      gap: 18px;
      border-top: 1px solid var(--rule);
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    .legend-swatch {
      width: 10px; height: 10px;
      background: rgba(255,255,255,0.05);
      border-left: 2px solid currentColor;
    }

    .raw {
      margin-top: 32px;
      background: var(--bg-card);
      border-left: 2px solid var(--border);
    }
    .raw summary {
      padding: 14px 20px;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--muted-3);
      text-transform: uppercase;
      list-style: none;
      user-select: none;
    }
    .raw summary::-webkit-details-marker { display: none; }
    .raw summary::before { content: '+ '; color: var(--muted-4); }
    .raw[open] summary::before { content: '− '; }
    .raw pre {
      margin: 0;
      padding: 0 20px 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted-3);
      overflow-x: auto;
      line-height: 1.6;
      max-height: 360px;
    }

    .footer {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-info {
      font-size: 10px;
      color: var(--muted-4);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    /* ───────── RIGHT NOW BANNER ───────── */
    .right-now {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.12) 0%, rgba(201, 168, 76, 0.04) 100%);
      border-left: 3px solid var(--gold);
      padding: 18px 24px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .right-now-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .right-now-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.4s ease-in-out infinite;
      box-shadow: 0 0 6px var(--gold);
    }
    .right-now-now {
      font-size: 17px;
      color: var(--text);
      line-height: 1.45;
      font-weight: 400;
    }
    .right-now-now-empty {
      font-size: 14px;
      color: var(--muted-2);
      font-style: italic;
      line-height: 1.5;
    }
    .right-now-next {
      font-size: 12px;
      color: var(--muted-2);
      margin-top: 6px;
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }
    .right-now-next b {
      color: var(--muted-1);
      font-weight: 500;
    }
    .right-now-time {
      text-align: right;
      font-family: var(--mono);
    }
    .right-now-time-big {
      font-size: 28px;
      color: var(--text);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
    .right-now-time-day {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-3);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ───────── MAIN GRID LAYOUT (portfolio + calendar) ───────── */
    .main-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 1199px) {
      .main-layout { grid-template-columns: 340px 1fr; gap: 16px; }
    }
    @media (max-width: 1023px) {
      .main-layout { grid-template-columns: 1fr; }
    }
