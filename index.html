      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 400;
    }
    .today-module.expanded .today-module-title { white-space: normal; font-weight: 500; }
    .today-module.done .today-module-title { text-decoration: line-through; }
    .today-module-time {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted-3);
      letter-spacing: 0.02em;
      flex-shrink: 0;
      font-weight: 500;
    }
    .today-module-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted-4);
      flex-shrink: 0;
    }
    .today-module-dot.active { background: var(--primary); }
    .today-module-dot.done { background: var(--teal); }
    .today-module-body {
      padding: 0 8px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .today-module-desc {
      font-size: 12px;
      color: var(--muted-2);
      font-style: italic;
      line-height: 1.5;
      padding: 4px 6px 8px;
    }
    .today-module-actions-eyebrow {
      font-size: 9px;
      letter-spacing: 0.05em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
      padding: 0 6px 4px;
    }
    .today-module-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* Action items — readable size, clear drag affordance, comfortable hit target */
    .today-project-action {
      font-size: var(--text-sm);
      color: var(--text);
      padding: 8px 10px;
      cursor: grab;
      background: var(--bg-card-deep);
      border-left: 3px solid transparent;
      border-radius: var(--radius-base);
      transition:
        border-color var(--duration-fast) var(--ease-out),
        color var(--duration-fast) var(--ease-out),
        background var(--duration-fast) var(--ease-out),
        transform var(--duration-fast) var(--ease-out);
      line-height: var(--leading-snug);
      font-weight: 500;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .today-project-action-text {
      flex: 1;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .today-project-action-time {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted-3);
      letter-spacing: 0.02em;
      flex-shrink: 0;
      padding-top: 2px;
      font-weight: 500;
    }
    .today-project-action:hover {
      border-left-color: var(--primary);
      background: var(--primary-soft);
      transform: translateX(2px);
    }
    .today-project-action:active { cursor: grabbing; }
    .today-project-action.scheduled {
      opacity: 0.45;
      cursor: default;
    }

    /* Action edit buttons — complete (✓) and delete (×) */
    .today-action-btn {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out);
      padding: 0;
    }
    .today-project-action:hover .today-action-btn { opacity: 1; }
    .today-action-btn-complete { color: var(--teal); }
    .today-action-btn-complete:hover { background: color-mix(in srgb, var(--teal) 12%, transparent); }
    .today-action-btn-delete { color: var(--muted-3); }
    .today-action-btn-delete:hover { background: color-mix(in srgb, var(--coral) 10%, transparent); color: var(--coral); }

    /* Add next action row and inline form */
    .today-action-add-row {
      width: 100%;
      background: none;
      border: none;
      border-top: 1px dashed var(--rule);
      padding: 6px 10px;
      text-align: left;
      font-size: 11px;
      color: var(--muted-4);
      cursor: pointer;
      font-family: var(--sans);
      transition: color var(--duration-fast) var(--ease-out);
    }
    .today-action-add-row:hover { color: var(--primary); }
    .today-action-add-form {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-top: 1px dashed var(--rule);
    }
    .today-action-add-input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 6px;
      font-size: 11px;
      font-family: var(--sans);
      background: var(--bg-card-deep);
      color: var(--text);
      outline: none;
    }
    .today-action-add-input:focus { border-color: var(--primary); }
    .today-action-add-min {
      width: 42px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 4px;
      font-size: 11px;
      font-family: var(--mono);
      background: var(--bg-card-deep);
      color: var(--text);
      text-align: center;
      outline: none;
    }
    .today-action-add-min:focus { border-color: var(--primary); }
    .today-action-add-submit {
      padding: 4px 8px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--sans);
      white-space: nowrap;
    }
    .today-action-add-submit:hover { opacity: 0.85; }
    .today-action-add-cancel {
      padding: 4px 6px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--muted-3);
      font-size: 12px;
      cursor: pointer;
    }
    .today-action-add-cancel:hover { color: var(--coral); }

    /* Todo input row — quiet, becomes prominent on focus */
    .today-todo-add {
      display: flex;
      padding: 0;
      border-bottom: 1px solid var(--rule);
      transition: background var(--duration-fast) var(--ease-out);
    }
    .today-todo-add:focus-within { background: var(--primary-soft); }
    .today-todo-add-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      padding: var(--space-3) var(--space-4);
      font-family: var(--serif);
      font-size: var(--text-sm);
      outline: none;
      letter-spacing: var(--tracking-base);
      font-weight: 500;
    }
    .today-todo-add-input::placeholder {
      color: var(--muted-4);
      font-weight: 400;
    }
    /* Todo rows */
    .today-todo-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-4);
      border-bottom: 1px solid var(--rule-faint);
      cursor: grab;
      transition: background var(--duration-fast) var(--ease-out);
      min-height: 36px;
    }
    .today-todo-row:last-child { border-bottom: none; }
    .today-todo-row:hover { background: var(--bg-hover); }
    .today-todo-row.done { opacity: 0.45; }
    /* No strikethrough on done todos either — opacity tells the story */
    .today-todo-row.scheduled { opacity: 0.65; }
    .today-todo-check {
      flex-shrink: 0;
      width: 14px; height: 14px;
      accent-color: var(--teal);
      cursor: pointer;
    }
    .today-todo-title {
      flex: 1;
      font-size: var(--text-sm);
      color: var(--text);
      line-height: var(--leading-snug);
      min-width: 0;
      word-break: break-word;
    }
    .today-todo-badge {
      font-size: var(--text-xs);
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: var(--tracking-wider);
      flex-shrink: 0;
    }
    .today-rail-empty {
      padding: var(--space-5) var(--space-4);
      font-size: var(--text-sm);
      color: var(--muted-4);
      text-align: center;
      line-height: var(--leading-snug);
    }

    /* Footer / utility row */
    .today-footer {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      padding-top: var(--space-3);
      flex-shrink: 0;
    }
    .today-footer-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--muted-2);
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-base);
      text-transform: none;
      font-family: var(--serif);
      font-weight: 500;
      padding: var(--space-2) var(--space-4);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition:
        color var(--duration-fast) var(--ease-out),
        border-color var(--duration-fast) var(--ease-out),
        box-shadow var(--duration-fast) var(--ease-out);
    }
    .today-footer-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: var(--shadow-md);
    }
    .today-footer-status {
      font-size: var(--text-xs);
      color: var(--muted-4);
      font-family: var(--mono);
      letter-spacing: var(--tracking-base);
      margin-left: auto;
      margin-right: var(--space-3);
      font-weight: 500;
    }


    .weather-strip {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 5px 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .weather-strip-left {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      padding-right: 10px;
      border-right: 1px solid var(--rule);
    }
    .weather-strip-eyebrow {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
    }
    .weather-strip-location {
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }
    .weather-strip-tabs {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      background: var(--bg-card-deep);
      border-radius: var(--radius-pill);
      flex-shrink: 0;
    }
    .weather-strip-tab {
      padding: 4px 10px;
      background: transparent;
      border: none;
      border-radius: var(--radius-pill);
      color: var(--muted-3);
      font-size: 11px;
      letter-spacing: 0;
      text-transform: none;
      cursor: pointer;
      font-weight: 500;
      transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
    }
    .weather-strip-tab:hover { color: var(--text); }
    .weather-strip-tab.active {
      background: var(--bg-card);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
      font-weight: 600;
    }
    .weather-strip-cells {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      align-items: stretch;
    }
    .weather-cell {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      padding: 4px 6px;
      border-right: 1px solid var(--rule-faint);
      cursor: default;
      transition: background var(--duration-fast) var(--ease-out);
      gap: 5px;
    }
    .weather-cell:last-child { border-right: none; }
    .weather-cell:hover { background: var(--bg-hover); }
    .weather-cell.now { background: var(--primary-soft); }
    .weather-cell-hour {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.02em;
      font-weight: 600;
      white-space: nowrap;
    }
    .weather-cell.now .weather-cell-hour {
      color: var(--primary);
    }
    .weather-cell-icon {
      font-size: 14px;
      line-height: 1;
    }
    .weather-cell-temp {
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .weather-cell-precip {
      font-size: 10px;
      color: #5B8DB3;
      font-family: var(--mono);
      font-weight: 500;
      white-space: nowrap;
    }
    .weather-cell-precip.dry { color: var(--muted-4); }
    .weather-strip-status {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted-3);
      font-size: 12px;
    }
    .weather-strip-status.error { color: var(--coral); }
    .weather-strip-refresh {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--muted-3);
      font-size: 14px;
      width: 28px;
      height: 28px;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
    }
    .weather-strip-refresh:hover { border-color: var(--primary); color: var(--primary); }
    @media (max-width: 759px) {
      .weather-strip { padding: 4px 8px; gap: 6px; }
      .weather-strip-left { padding-right: 6px; }
      .weather-strip-location { font-size: 10px; max-width: 80px; }
      .weather-strip-eyebrow { display: none; }
      .weather-cell { padding: 3px 4px; gap: 3px; }
    }


    .right-now {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.12) 0%, rgba(201, 168, 76, 0.04) 100%);
      border-left: 3px solid var(--primary);
      padding: 18px 24px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 24px;
      align-items: center;
    }
    .right-now-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .right-now-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--primary);
      animation: pulse 1.4s ease-in-out infinite;
      box-shadow: 0 0 6px var(--primary);
    }
    .right-now-now {
      font-size: 17px;
      color: var(--text);
      line-height: 1.45;
      font-weight: 400;
    }
    .right-now-now-empty {
      font-size: 14px;
      color: var(--muted-2);
      font-style: italic;
      line-height: 1.5;
    }
    .right-now-next {
      font-size: 12px;
      color: var(--muted-2);
      margin-top: 6px;
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }
    .right-now-next b {
      color: var(--muted-1);
      font-weight: 500;
    }
    .right-now-time {
      text-align: right;
      font-family: var(--mono);
      padding-right: 8px;
      border-right: 1px solid rgba(201, 168, 76, 0.18);
      padding-right: 24px;
    }
    .right-now-time-big {
      font-size: 28px;
      color: var(--text);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
    .right-now-time-day {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-3);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Reference Library access panel inside the Right Now banner */
    .right-now-reference {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
    }
    .right-now-reference-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--primary);
      text-transform: uppercase;
      font-weight: 500;
      opacity: 0.85;
    }
    .ref-quick-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ref-quick-item {
      background: transparent;
      border: none;
      padding: 4px 0;
      color: var(--muted-1);
      font-family: var(--serif);
      font-size: 12px;
      text-align: left;
      cursor: pointer;
      transition: color var(--duration-fast) var(--ease-out);
      letter-spacing: 0.005em;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ref-quick-item::before {
      content: '›';
      color: var(--muted-4);
      font-family: var(--mono);
      transition: color var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
    }
    .ref-quick-item:hover {
      color: var(--primary);
    }
    .ref-quick-item:hover::before {
      color: var(--primary);
      transform: translateX(2px);
    }
    .ref-quick-more {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.1em;
      margin-top: 4px;
      padding: 4px 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }
    .ref-quick-more:hover { color: var(--primary); }

    /* ───────── MAIN GRID LAYOUT (portfolio + calendar) ───────── */
    .main-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 1199px) {
      .main-layout { grid-template-columns: 340px 1fr; gap: 16px; }
    }
    @media (max-width: 1023px) {
      .main-layout { grid-template-columns: 1fr; }
    }

    /* ───────── PORTFOLIO PANEL ───────── */
    .portfolio {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: sticky;
      top: 56px;
      max-height: calc(100vh - 56px);
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .portfolio::-webkit-scrollbar { width: 4px; }
    .portfolio::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-pill); }
    .portfolio-section {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .portfolio-list {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .portfolio-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: var(--space-3) var(--space-4) var(--space-2);
      border-bottom: 1px solid var(--rule);
    }
    .portfolio-eyebrow {
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--primary);
      text-transform: uppercase;
      font-weight: 600;
    }
    .portfolio-budget-summary {
      font-size: 11px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.02em;
      font-weight: 500;
    }
    .portfolio-budget-summary b { color: var(--text); font-weight: 600; }
    .portfolio-budget-summary.over { color: var(--coral); }
    .portfolio-budget-summary.over b { color: var(--coral); }

    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-base);
      box-shadow: var(--shadow-sm);
      transition: background var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
      overflow: hidden;
      position: relative;
    }
    .project-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--card-accent, var(--border));
    }
    .project-card.master::before { width: 4px; }
    .project-card:hover { box-shadow: var(--shadow-md); }
    .project-card-header {
      padding: 14px 16px 12px;
      cursor: pointer;
      user-select: none;
    }
    .project-card-header:hover { background: var(--bg-hover); }
    .project-card-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }
    .project-card-name {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0;
    }
    .project-card.master .project-card-name {
      font-size: 16px;
      letter-spacing: -0.01em;
      font-weight: 700;
    }
    .project-card-tier {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--muted-3);
      font-family: var(--mono);
      text-transform: uppercase;
      flex-shrink: 0;
      font-weight: 600;
    }
    .project-card-subtitle {
      font-size: 12px;
      color: var(--muted-3);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .project-card-status {
      font-size: 13px;
      color: var(--muted-2);
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .project-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.02em;
      font-weight: 500;
    }
    .project-card-budget {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .project-card-budget-bar {
      width: 50px;
      height: 3px;
      background: var(--rule);
      position: relative;
      overflow: hidden;
    }
    .project-card-budget-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      transition: width var(--duration-slow) var(--ease-out);
    }
    .project-card-budget-text b { color: var(--muted-1); font-weight: 500; }
    .project-card-effort { color: var(--muted-4); }

    .project-card-body {
      border-top: 1px solid var(--rule);
      padding: 10px 16px 14px;
      display: none;
    }
    .project-card.expanded .project-card-body { display: block; }
    .project-card.expanded { background: var(--bg-hover); }

    .next-actions-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--muted-4);
      text-transform: uppercase;
      margin: 6px 0 8px;
      font-weight: 600;
    }
    .next-action {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-card-deep);
      border-radius: var(--radius-base);
      margin-bottom: 4px;
      cursor: grab;
      transition: background var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
      align-items: flex-start;
    }
    .next-action:hover {
      background: var(--primary-soft);
      transform: translateX(2px);
    }
    .next-action-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      flex: 1;
      font-weight: 500;
    }
    .next-action-time {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.02em;
      flex-shrink: 0;
      padding-top: 1px;
      font-weight: 500;
    }

    /* NEXT modules list — shown when NEXT card is expanded */
    .module-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-top: 4px;
    }
    .module-row {
      background: var(--bg-card);
      cursor: pointer;
      user-select: none;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .module-row:hover { background: var(--bg-card-deep); }
    .module-row-header {
      padding: 9px 12px 9px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .module-row-priority {
      font-size: 9px;
      color: var(--muted-4);
      font-family: var(--mono);
      width: 24px;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }
    .module-row-priority.top {
      color: var(--primary);
      font-weight: 600;
    }
    .module-row-name {
      flex: 1;
      font-size: 12px;
      color: var(--muted-1);
      line-height: 1.35;
    }
    .module-row.expanded .module-row-name { color: var(--text); }
    .module-row-status {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .module-row-effort {
      font-size: 9px;
      color: var(--muted-4);
      font-family: var(--mono);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .module-row-body {
      display: none;
      padding: 4px 14px 14px 38px;
      border-top: 1px solid var(--rule);
    }
    .module-row.expanded .module-row-body { display: block; }
    .module-row-description {
      font-size: 11px;
      color: var(--muted-3);
      line-height: 1.6;
      font-style: italic;
      margin: 8px 0 10px;
    }

    /* ───────── CALENDAR PANEL (right side of layout) ───────── */
    .calendar-panel {
      min-width: 0; /* allows the grid inside to actually shrink */
    }

    /* ───────── SCHEDULED PROJECT BLOCKS ───────── */
    .cal-item.project-block {
      cursor: pointer;
    }
    .cal-item.project-block .cal-item-project {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: var(--mono);
      opacity: 0.85;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cal-item.project-block.completed {
      opacity: 0.55;
    }
    .cal-item.project-block.completed .cal-item-title {
      text-decoration: line-through;
      text-decoration-color: rgba(255,255,255,0.5);
    }
    .cal-item.project-block.completed::after {
      content: '✓';
      position: absolute;
      top: 4px; right: 6px;
      font-size: 11px;
      color: #fff;
    }
    .cal-item.project-block.partial {
      background-image: repeating-linear-gradient(
        135deg,
        transparent 0px, transparent 6px,
        rgba(255,255,255,0.15) 6px, rgba(255,255,255,0.15) 12px
      );
    }
    .cal-item.project-block.partial::after {
      content: '½';
      position: absolute;
      top: 2px; right: 6px;
      font-size: 12px;
      color: #fff;
      font-family: var(--serif);
    }

    /* Drop target highlight */
    .day-column.drop-active {
      background: var(--primary-soft) !important;
      box-shadow: inset 0 0 0 1px var(--primary);
    }
    .day-column.drop-active::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(59, 130, 246, 0.06) 50%,
        transparent 100%
      );
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    /* Drop preview ghost */
    .drop-ghost {
      position: absolute;
      left: 2px; right: 2px;
      pointer-events: none;
      border: 1px dashed var(--primary);
      background: rgba(201, 168, 76, 0.08);
      border-radius: 2px;
      z-index: 6;
    }

    /* ───────── ACTION CHIP STATES ───────── */
    .next-action.scheduled {
      opacity: 0.55;
      cursor: default;
    }
    .next-action.scheduled:hover {
      background: var(--bg-card);
      border-left-color: var(--border);
    }
    .next-action-badge {
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 2px;
      font-family: var(--mono);
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 1px;
    }
    .next-action-badge.scheduled {
      background: rgba(201, 168, 76, 0.15);
      color: var(--primary);
    }
    .next-action-dragging { opacity: 0.4; }

    /* ───────── BLOCK POPOVER MODAL ───────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: var(--modal-backdrop);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn var(--duration-fast) var(--ease-out);
    }
    .modal {
      background: var(--bg-card);
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border-top: 3px solid var(--primary);
      animation: modalIn var(--duration-base) var(--ease-out);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--rule);
    }
    .modal-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .modal-title {
      font-size: 18px;
      color: var(--text);
      line-height: 1.3;
      font-weight: 400;
      letter-spacing: -0.005em;
    }
    .modal-meta {
      display: flex;
      gap: 14px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.05em;
      flex-wrap: wrap;
    }
    .modal-meta-project { color: var(--primary); }
    .modal-body {
      padding: 18px 24px 22px;
    }
    .modal-section {
      margin-bottom: 18px;
    }
    .modal-section:last-child { margin-bottom: 0; }
    .modal-section-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-3);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .modal-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .modal-input {
      background: var(--bg-card-deep);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 14px;
      width: 90px;
      letter-spacing: 0.04em;
    }
    .modal-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .modal-input.wide { width: 110px; }
    .modal-input-suffix {
      color: var(--muted-3);
      font-size: 12px;
      font-family: var(--mono);
    }
    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .modal-btn {
      padding: 11px 16px;
      background: var(--bg-card-deep);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--serif);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
    }
    .modal-btn:hover { border-color: var(--muted-3); background: var(--bg-hover); }
    .modal-btn-hint {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.05em;
    }
    .modal-btn.primary {
      border-color: var(--primary);
      color: var(--primary);
    }
    .modal-btn.primary:hover {
      background: rgba(201, 168, 76, 0.08);
    }
    .modal-btn.danger {
      border-color: rgba(224, 123, 106, 0.3);
      color: var(--coral);
    }
    .modal-btn.danger:hover {
      border-color: var(--coral);
      background: rgba(224, 123, 106, 0.06);
    }
    .modal-btn.complete {
      background: rgba(126, 184, 164, 0.06);
      border-color: rgba(126, 184, 164, 0.3);
      color: var(--teal);
    }
    .modal-btn.complete:hover {
      background: rgba(126, 184, 164, 0.12);
      border-color: var(--teal);
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 18px;
      background: none;
      border: none;
      color: var(--muted-3);
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { color: var(--text); }
    .modal { position: relative; }


    /* ───────── RESIZE HANDLE ───────── */
    .cal-item-resize-handle {
      position: absolute;
      left: 0; right: 0;
      bottom: 0;
      height: 6px;
      cursor: ns-resize;
      z-index: 3;
      background: transparent;
    }
    .cal-item-resize-handle:hover {
      background: rgba(201, 168, 76, 0.25);
    }

    /* ───────── ROUTINE COMPLETE CHECKBOX (in calendar block) ───────── */
    .cal-item-check {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.15);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
      color: #fff;
      font-weight: bold;
      transition: border-color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out);
      z-index: 4;
    }
    .cal-item-check:hover {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.3);
    }
    .cal-item.routine-completed .cal-item-check {
      border-color: #fff;
      background: #fff;
      color: var(--text);
    }
    .cal-item.routine-completed .cal-item-title {
      opacity: 0.7;
    }

    /* Agenda view check button */
    .agenda-item-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--muted-3);
      background: transparent;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--teal);
      font-weight: bold;
      flex-shrink: 0;
      align-self: center;
      transition: border-color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out);
    }
    .agenda-item-check:hover {
      border-color: var(--teal);
    }
    .agenda-item.past .agenda-item-check {
      border-color: var(--teal);
      background: var(--teal);
      color: var(--bg);
    }
    .cal-item.resizing {
      filter: brightness(1.35);
      outline: 1px dashed var(--primary);
      outline-offset: -1px;
    }
    /* Routine items: cursor pointer to telegraph "click to edit" */
    .cal-item.routine-item { cursor: pointer; }
    .cal-item.moved {
      box-shadow: inset 2px 0 0 var(--primary);
    }
    .cal-item.moved::before {
      content: '↪';
      position: absolute;
      top: 1px; right: 4px;
      font-size: 12px;
      color: var(--primary);
      line-height: 1;
    }
    .cal-item.overridden::before {
      content: '✎';
      position: absolute;
      top: 2px; right: 4px;
      font-size: 10px;
      color: var(--primary);
      opacity: 0.6;
    }

    /* ───────── REFERENCE LIBRARY MODAL ───────── */
    .ref-modal { max-width: 720px; }
    .ref-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .ref-entry {
      background: var(--bg-card-deep);
      border-left: 2px solid var(--border);
    }
    .ref-entry-header {
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      transition: background var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
      user-select: none;
    }
    .ref-entry-header:hover {
      background: var(--bg-hover);
    }
    .ref-entry.expanded {
      border-left-color: var(--primary);
    }
    .ref-entry-title {
      font-size: 14px;
      color: var(--text);
      letter-spacing: 0.005em;
    }
    .ref-entry-chevron {
      color: var(--muted-3);
      font-family: var(--mono);
      font-size: 14px;
      transition: transform var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
    }
    .ref-entry.expanded .ref-entry-chevron { transform: rotate(90deg); color: var(--primary); }
    .ref-entry-body {
      padding: 6px 22px 18px;
      display: none;
    }
    .ref-entry.expanded .ref-entry-body { display: block; }
    .ref-entry-content {
      font-size: 13px;
      color: var(--muted-1);
      line-height: 1.75;
      white-space: pre-wrap;
      font-family: var(--serif);
    }
    .ref-entry-edit-btn {
      background: none;
      border: none;
      color: var(--muted-3);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      cursor: pointer;
      text-transform: uppercase;
      padding: 6px 0;
      margin-top: 8px;
    }
    .ref-entry-edit-btn:hover { color: var(--primary); }
    .ref-entry-edit textarea {
      width: 100%;
      min-height: 220px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--serif);
      font-size: 13px;
      padding: 12px 14px;
      line-height: 1.75;
      resize: vertical;
      box-sizing: border-box;
    }
    .ref-entry-edit textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .ref-entry-edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    /* ───────── ROUTINE EDIT FORMS ───────── */
    .routine-modal { max-width: 720px; }
    .routine-day-group { margin-bottom: 16px; }

    /* ───────── CATEGORY COLORS PICKER (in routine manager) ───────── */
    .category-colors-section {
      margin-bottom: 24px;
      padding: 14px 16px;
      background: var(--bg-card-deep);
      border-left: 2px solid var(--rule);
    }
    .category-colors-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .category-colors-eyebrow {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-family: var(--mono);
      font-weight: 600;
    }
    .category-colors-hint {
      font-size: 11px;
      color: var(--muted-3);
      font-style: italic;
    }
    .category-colors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 6px;
    }
    .category-color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      background: var(--bg-card);
      transition: background var(--duration-fast) var(--ease-out);
    }
    .category-color-row:hover { background: var(--bg-hover); }

    /* Emoji button (inline, beside swatch) */
    .category-emoji-btn {
      flex-shrink: 0;
      width: 30px;
      height: 26px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: var(--radius-base);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
    }
    .category-emoji-btn:hover { border-color: var(--primary); transform: scale(1.05); }

    /* Emoji picker popover */
    .category-color-row { position: relative; }
    .emoji-picker-popover {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 50;
      width: 320px;
      max-height: 360px;
      overflow-y: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: var(--space-3);
      animation: fadeIn var(--duration-fast) var(--ease-out);
    }
    .emoji-picker-group { margin-bottom: var(--space-3); }
    .emoji-picker-group:last-child { margin-bottom: 0; }
    .emoji-picker-group-label {
      font-size: 10px;
      letter-spacing: var(--tracking-wider);
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: var(--space-1);
      padding-left: var(--space-1);
    }
    .emoji-picker-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
    }
    .emoji-picker-cell {
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
    }
    .emoji-picker-cell:hover { background: var(--bg-hover); transform: scale(1.15); }
    .emoji-picker-cell.selected { background: var(--primary-soft); border-color: var(--primary); }
    .category-color-swatch {
      flex-shrink: 0;
      width: 28px;
      height: 22px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      padding: 1px;
    }
    .category-color-label {
      flex: 1;
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0.01em;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .category-color-hex {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.05em;
    }
    .category-color-reset {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-3);
      width: 22px;
      height: 22px;
      cursor: pointer;
      padding: 0;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .category-color-reset:hover { border-color: var(--primary); color: var(--primary); }

    .routine-day-group-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .routine-item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg-card-deep);
      border-left: 2px solid var(--border);
      cursor: pointer;
      transition: background var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
      margin-bottom: 1px;
    }
    .routine-item-row:hover {
      background: var(--bg-hover);
      border-left-color: var(--primary);
    }
    .routine-item-row-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      letter-spacing: 0.04em;
      width: 90px;
      flex-shrink: 0;
    }
    .routine-item-row-title {
      flex: 1;
      font-size: 13px;
      color: var(--text);
    }
    .routine-item-row-cat {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .routine-form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .routine-form-row {
      grid-column: span 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .routine-form-row.half { grid-column: span 1; }
    .routine-form-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
    }
    .routine-form-input {
      background: var(--bg-card-deep);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      font-family: var(--serif);
      font-size: 14px;
      box-sizing: border-box;
    }
    .routine-form-input:focus { outline: none; border-color: var(--primary); }
    .routine-form-input.mono { font-family: var(--mono); font-size: 13px; }
    .routine-form-textarea {
      background: var(--bg-card-deep);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      font-family: var(--serif);
      font-size: 13px;
      line-height: 1.6;
      min-height: 70px;
      resize: vertical;
      box-sizing: border-box;
    }
    .routine-form-textarea:focus { outline: none; border-color: var(--primary); }
    .day-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .day-chip {
      padding: 8px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-3);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--serif);
      min-width: 48px;
      text-align: center;
    }
    .day-chip.active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(201, 168, 76, 0.06);
    }
    .cat-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .cat-chip {
      padding: 6px 10px;
      background: transparent;
      border: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--mono);
      color: var(--muted-3);
    }
    .cat-chip.active {
      background: rgba(201, 168, 76, 0.08);
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      padding: 6px 0;
    }
    .checkbox-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .checkbox-row span {
      font-size: 13px; color: var(--muted-1);
    }
    .scope-toggle {
      display: flex;
      gap: 1px;
      background: var(--bg);
      padding: 2px;
      border: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .scope-toggle-btn {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--muted-3);
      font-family: var(--serif);
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
    }
    .scope-toggle-btn.active {
      background: rgba(201, 168, 76, 0.14);
      color: var(--primary);
    }
    .scope-hint {
      font-size: 11px;
      color: var(--muted-3);
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    /* ───────── HEADER MANAGE BUTTON ───────── */
    .manage-btn {
      padding: 0 14px;
      height: 38px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-2);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: var(--serif);
      cursor: pointer;
    }
    .manage-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* Mobile adjustments: stack everything */
    @media (max-width: 1023px) {
      .right-now { padding: 14px 18px; grid-template-columns: 1fr; }
      .right-now-time {
        text-align: left;
        display: flex;
        align-items: baseline;
        gap: 12px;
        border-right: none;
        padding-right: 0;
      }
      .right-now-time-big { font-size: 20px; }
      .right-now-time-day { margin-top: 0; }
      .right-now-reference { display: none; }
      .portfolio { margin-bottom: 24px; }
    }

    @media (max-width: 759px) {
      .wrap, .wrap-wide { padding: 0 18px 60px; }
      .screen-pad-top { padding-top: 58px; }
      .screen-pad-top-sm { padding-top: 58px; }
      .view-switcher-bar { top: 10px; }
      .cal-header { gap: 12px; }
      .cal-week-label { font-size: 22px; }
      .right-now-now { font-size: 15px; }
      .routine-form-grid { grid-template-columns: 1fr; }
      .routine-form-row.half { grid-column: span 1; }
    }

    /* ───────── ELSEWHERE TOGGLES ───────── */
    .elsewhere-toggles {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      align-items: center;
    }
    .elsewhere-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-family: var(--mono);
      margin-right: 4px;
    }
    .elsewhere-btn {
      padding: 7px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-3);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--serif);
      transition: color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
    }
    .elsewhere-btn:hover {
      border-color: var(--coral);
      color: var(--coral);
    }
    .elsewhere-btn.active {
      background: rgba(224, 123, 106, 0.12);
      border-color: var(--coral);
      color: var(--coral);
    }

    /* ───────── TODOS PANE ───────── */
    .todos-pane {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      flex-shrink: 0;
    }
    .todos-pane-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: var(--space-3) var(--space-4) var(--space-2);
      border-bottom: 1px solid var(--rule);
    }
    .todos-pane-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
    }
    .todos-pane-count {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--muted-4);
      font-family: var(--mono);
    }
    .todos-add-bar {
      display: flex;
      gap: 0;
      margin: 12px 12px 10px;
      background: var(--bg-card-deep);
      border-left: 2px solid var(--border);

      var box = document.getElementById('errbox');
      box.style.display = 'block';
      box.textContent = 'ERROR: ' + (e.message || 'unknown') + '\n\nat ' + (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?') + (e.error && e.error.stack ? '\n\n' + e.error.stack : '');
    });
    window.addEventListener('unhandledrejection', function(e) {
      var box = document.getElementById('errbox');
      box.style.display = 'block';
      box.textContent = 'PROMISE REJECTION: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
    });
  </script>
