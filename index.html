      font-weight: 500;
    }
    .today-timeline-row.is-now .today-timeline-title { font-weight: 600; }
    .today-timeline-meta-line {
      font-size: var(--text-xs);
      color: var(--muted-4);
      font-family: var(--mono);
      letter-spacing: var(--tracking-wide);
    }
    .today-timeline-tag {
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      font-family: var(--mono);
      flex-shrink: 0;
      opacity: 0.6;
    }
    .today-timeline-empty {
      padding: var(--space-10) var(--space-5);
      text-align: center;
      color: var(--muted-3);
      font-size: var(--text-sm);
      line-height: var(--leading-base);
      max-width: 340px;
      margin: 0 auto;
    }
    .today-timeline-drop-hint {
      margin: var(--space-3) var(--space-4);
      padding: var(--space-4) var(--space-5);
      text-align: center;
      color: var(--muted-4);
      font-size: var(--text-sm);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-lg);
      cursor: default;
      transition:
        background var(--duration-fast) var(--ease-out),
        color var(--duration-fast) var(--ease-out),
        border-color var(--duration-fast) var(--ease-out),
        transform var(--duration-fast) var(--ease-out);
    }
    .today-timeline-drop-hint.drag-over {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: var(--primary);
      transform: translateY(-1px);
    }
    .today-timeline-check {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      line-height: 1;
      color: var(--teal);
      transition:
        border-color var(--duration-base) var(--ease-out),
        background var(--duration-base) var(--ease-out),
        transform var(--duration-fast) var(--ease-out);
    }
    .today-timeline-check:hover {
      border-color: var(--teal);
      transform: scale(1.05);
    }
    .today-timeline-check:active { transform: scale(0.92); }
    .today-timeline-row.is-completed .today-timeline-check {
      border-color: var(--teal);
      background: var(--teal);
      color: var(--bg);
      animation: tickPop 280ms var(--ease-out);
    }

    /* Right column: hero + calendar stacked */
    .today-right-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: transparent;
      padding: 66px var(--space-4) 0 var(--space-4);
    }

    /* Right rail — scrollable but no visible scrollbar */
    .today-rail::-webkit-scrollbar { display: none; }

    /* ───────── MINI MONTH PICKER ───────── */
    .mini-month {
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      padding: 12px 10px 8px;
      flex-shrink: 0;
      animation: riseIn var(--duration-slow) var(--ease-out) backwards;
      animation-delay: 60ms;
    }
    .mini-month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .mini-month-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted-3);
      letter-spacing: 0;
      font-family: var(--serif);
    }
    .mini-month-nav {
      display: flex;
      gap: 2px;
    }
    .mini-month-nav-btn {
      width: 20px;
      height: 20px;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--muted-3);
      font-size: 13px;
      line-height: 1;
      padding: 0 0 1px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
    }
    .mini-month-nav-btn:hover {
      background: var(--bg-hover);
      color: var(--text);
    }
    .mini-month-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 2px;
    }
    .mini-month-weekday {
      text-align: center;
      font-size: 9px;
      color: var(--muted-3);
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 1px 0;
    }
    .mini-month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 30px;
      place-items: center;
      gap: 0;
    }
    .mini-month-day {
      width: 26px;
      height: 26px;
      background: transparent;
      border: none;
      border-radius: 50%;
      font-size: 11px;
      color: var(--text);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--serif);
      font-weight: 400;
      transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out), filter var(--duration-fast) var(--ease-out);
    }
    .mini-month-day:hover { background: var(--bg-hover); }
    .mini-month-day.out { color: var(--muted-4); }
    .mini-month-day.today {
      background: var(--mini-month-today-color, var(--primary));
      color: #fff;
      font-weight: 600;
    }
    .mini-month-day.today:hover {
      background: var(--mini-month-today-color, var(--primary));
      filter: brightness(0.88);
    }
    .mini-month-day.selected {
      background: rgba(0,0,0,0.10);
      color: var(--text);
      font-weight: 600;
      box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.18);
    }
    [data-theme="dark"] .mini-month-day.selected {
      background: rgba(255,255,255,0.12);
      box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.22);
    }
    .mini-month-day.selected:hover {
      background: rgba(0,0,0,0.14);
    }
    [data-theme="dark"] .mini-month-day.selected:hover {
      background: rgba(255,255,255,0.16);
    }
    .today-rail-section {
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      flex-shrink: 0;
    }
    .today-rail-section:nth-child(1) { animation-delay: 80ms; }
    .today-rail-section:nth-child(2) { animation-delay: 140ms; }

    /* Rail nav — Today/‹/date/› inside the left card */
    .today-rail-nav {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-3) var(--space-3) var(--space-2);
      flex-shrink: 0;
    }
    .today-rail-nav-group {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .today-rail-nav-date {
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      font-family: var(--sans);
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .today-rail-nav .app-topbar-btn {
      font-size: 12px;
      padding: 4px 10px;
    }
    .today-rail-nav .app-topbar-nav-btn {
      width: 26px;
      height: 26px;
      font-size: 18px;
    }
    .today-projects-section {
      overflow-y: auto;
      max-height: 520px;
      scrollbar-width: none;
    }
    .today-projects-section::-webkit-scrollbar { display: none; }
    .today-projects-section .today-rail-list { max-height: none; overflow-y: visible; }
    .today-rail-header {
      padding: var(--space-5) var(--space-4) var(--space-1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rail-section-toggle {
      width: 22px;
      height: 22px;
      background: transparent;
      border: none;
      color: var(--muted-3);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      padding: 0;
      flex-shrink: 0;
      transition: color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out);
    }
    .rail-section-toggle:hover {
      color: var(--text);
      background: var(--bg-hover);
    }
    .rail-section-toggle-icon {
      display: inline-block;
      transition: transform var(--duration-base) var(--ease-out);
      line-height: 1;
    }
    .rail-section-toggle-icon.collapsed {
      transform: rotate(-90deg);
    }
    .today-rail-eyebrow {
      font-size: 13px;
      letter-spacing: 0;
      color: var(--muted-3);
      text-transform: none;
      font-weight: 600;
      font-family: var(--serif);
    }
    .today-rail-count {
      font-size: var(--text-xs);
      color: var(--muted-4);
      font-family: var(--mono);
      letter-spacing: var(--tracking-wide);
    }
    .today-rail-list {
      display: flex;
      flex-direction: column;
      max-height: 60vh;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .today-rail-list::-webkit-scrollbar { width: 4px; }
    .today-rail-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-pill); }

    /* Project chip in rail — flat row with accent bar */
    .today-project-chip {
      padding: 0;
      margin-bottom: 0;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      cursor: default;
      transition: background var(--duration-fast) var(--ease-out);
      overflow: hidden;
      position: relative;
    }
    .today-project-chip:last-child { border-bottom: none; }
    .today-project-chip:hover { background: var(--bg-hover); }
    .today-project-chip-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 10px 12px 10px 20px;
      cursor: pointer;
      user-select: none;
    }
    .today-project-chip.collapsed .today-project-chip-header { padding-bottom: 10px; }
    .today-project-chip-chevron {
      font-size: 10px;
      color: var(--muted-3);
      transition: transform var(--duration-fast) var(--ease-out);
      flex-shrink: 0;
      width: 12px;
      display: inline-flex;
      justify-content: center;
    }
    .today-project-chip-chevron.collapsed { transform: rotate(-90deg); }
    .today-project-chip-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .today-project-chip-name {
      font-size: var(--text-sm);
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
      letter-spacing: var(--tracking-base);
    }
    .today-project-chip-tier {
      font-size: var(--text-xs);
      color: var(--muted-4);
      font-family: var(--mono);
      letter-spacing: var(--tracking-wide);
    }
    .today-project-chip-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      padding: 0 12px 12px 30px;
    }

    /* ───────── MASTER PROJECT — MODULES (two-level expand) ───────── */
    .today-project-modules {
      padding: 0 12px 10px 14px;
      display: flex;
      flex-direction: column;
    }
    .today-project-modules-eyebrow {
      font-size: 9px;
      letter-spacing: 0.05em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
      padding: 6px 6px 8px;
    }
    .today-module {
      border-top: 1px solid var(--rule-faint);
      transition: background var(--duration-fast) var(--ease-out);
    }
    .today-module:first-of-type { border-top: none; }
    .today-module.expanded { background: var(--bg-card-deep); }
    .today-module.done { opacity: 0.55; }
    .today-module-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      cursor: pointer;
      user-select: none;
    }
    .today-module-row:hover { background: var(--bg-hover); }
    .today-module-num {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted-3);
      font-weight: 600;
      min-width: 24px;
      flex-shrink: 0;
    }
    .today-module-num.expanded { color: var(--primary); }
    .today-module-title {
      font-size: 13px;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 400;
    }
    .today-module.expanded .today-module-title { white-space: normal; font-weight: 500; }
    .today-module.done .today-module-title { text-decoration: line-through; }
    .today-module-time {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted-3);
      letter-spacing: 0.02em;
      flex-shrink: 0;
      font-weight: 500;
    }
    .today-module-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted-4);
      flex-shrink: 0;
    }
    .today-module-dot.active { background: var(--primary); }
    .today-module-dot.done { background: var(--teal); }
    .today-module-body {
      padding: 0 8px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .today-module-desc {
      font-size: 12px;
      color: var(--muted-2);
      font-style: italic;
      line-height: 1.5;
      padding: 4px 6px 8px;
    }
    .today-module-actions-eyebrow {
      font-size: 9px;
      letter-spacing: 0.05em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
      padding: 0 6px 4px;
    }
    .today-module-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* Action items — readable size, clear drag affordance, comfortable hit target */
    .today-project-action {
      font-size: var(--text-sm);
      color: var(--text);
      padding: 8px 10px;
      cursor: grab;
      background: var(--bg-card-deep);
      border-left: 3px solid transparent;
      border-radius: var(--radius-base);
      transition:
        border-color var(--duration-fast) var(--ease-out),
        color var(--duration-fast) var(--ease-out),
        background var(--duration-fast) var(--ease-out),
        transform var(--duration-fast) var(--ease-out);
      line-height: var(--leading-snug);
      font-weight: 500;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .today-project-action-text {
      flex: 1;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .today-project-action-time {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted-3);
      letter-spacing: 0.02em;
      flex-shrink: 0;
      padding-top: 2px;
      font-weight: 500;
    }
    .today-project-action:hover {
      border-left-color: var(--primary);
      background: var(--primary-soft);
      transform: translateX(2px);
    }
    .today-project-action:active { cursor: grabbing; }
    .today-project-action.scheduled {
      opacity: 0.45;
      cursor: default;
    }

    /* Action edit buttons — complete (✓) and delete (×) */
    .today-action-btn {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out);
      padding: 0;
    }
    .today-project-action:hover .today-action-btn { opacity: 1; }
    .today-action-btn-complete { color: var(--teal); }
    .today-action-btn-complete:hover { background: color-mix(in srgb, var(--teal) 12%, transparent); }
    .today-action-btn-delete { color: var(--muted-3); }
    .today-action-btn-delete:hover { background: color-mix(in srgb, var(--coral) 10%, transparent); color: var(--coral); }

    /* Add next action row and inline form */
    .today-action-add-row {
      width: 100%;
      background: none;
      border: none;
      border-top: 1px dashed var(--rule);
      padding: 6px 10px;
      text-align: left;
      font-size: 11px;
      color: var(--muted-4);
      cursor: pointer;
      font-family: var(--sans);
      transition: color var(--duration-fast) var(--ease-out);
    }
    .today-action-add-row:hover { color: var(--primary); }
    .today-action-add-form {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-top: 1px dashed var(--rule);
    }
    .today-action-add-input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 6px;
      font-size: 11px;
      font-family: var(--sans);
      background: var(--bg-card-deep);
      color: var(--text);
      outline: none;
    }
    .today-action-add-input:focus { border-color: var(--primary); }
    .today-action-add-min {
      width: 42px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 4px;
      font-size: 11px;
      font-family: var(--mono);
      background: var(--bg-card-deep);
      color: var(--text);
      text-align: center;
      outline: none;
    }
    .today-action-add-min:focus { border-color: var(--primary); }
    .today-action-add-submit {
      padding: 4px 8px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--sans);
      white-space: nowrap;
    }
    .today-action-add-submit:hover { opacity: 0.85; }
    .today-action-add-cancel {
      padding: 4px 6px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--muted-3);
      font-size: 12px;
      cursor: pointer;
    }
    .today-action-add-cancel:hover { color: var(--coral); }

    /* Todo input row — quiet, becomes prominent on focus */
    .today-todo-add {
      display: flex;
      padding: 0;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .today-todo-add:focus-within { background: var(--primary-soft); }
    .today-todo-add-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      padding: var(--space-3) var(--space-4);
      font-family: var(--serif);
      font-size: var(--text-sm);
      outline: none;
      letter-spacing: var(--tracking-base);
      font-weight: 500;
    }
    .today-todo-add-input::placeholder {
      color: var(--muted-4);
      font-weight: 400;
    }
    /* Todo rows */
    .today-todo-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      cursor: grab;
      transition: background var(--duration-fast) var(--ease-out);
      min-height: 34px;
    }
    .today-todo-row:hover { background: var(--bg-hover); }
    .today-todo-row.done { opacity: 0.45; }
    .today-todo-row.is-pending { opacity: 0.6; font-style: italic; }
    .today-todo-delete { opacity: 0; transition: opacity var(--duration-fast) var(--ease-out); flex-shrink: 0; }
    .today-todo-row:hover .today-todo-delete { opacity: 0.45; }
    .today-todo-delete:hover { opacity: 1 !important; }
    .today-todo-check {
      flex-shrink: 0;
      width: 14px; height: 14px;
      accent-color: var(--teal);
      cursor: pointer;
    }
    .today-todo-title {
      flex: 1;
      font-size: var(--text-sm);
      color: var(--text);
      line-height: var(--leading-snug);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .today-todo-slots {
      display: flex;
      flex-shrink: 0;
    }
    .today-todo-slots-group {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .today-todo-slots-dot {
      position: absolute;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted-4);
      text-align: center;
      cursor: default;
      pointer-events: none;
    }
    .today-todo-slots-dot.has-slot {
      color: #16a34a;
      font-weight: 700;
    }
    .today-todo-slots-choices {
      display: flex;
      gap: 3px;
      visibility: hidden;
    }
    .today-todo-slots-group:hover .today-todo-slots-dot { display: none; }
    .today-todo-slots-group:hover .today-todo-slots-choices { visibility: visible; }
    .today-todo-slot-btn {
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 500;
      padding: 2px 5px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted-4);
      cursor: pointer;
      line-height: 1.4;
      transition: color var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
    }
    .today-todo-slot-btn.active {
      color: #16a34a;
      border-color: #16a34a;
      font-weight: 700;
      background: rgba(22,163,74,0.07);
    }
    .today-todo-slot-btn:hover:not(.active) {
      color: var(--muted-2);
      border-color: var(--muted-3);
    }
    /* Personal tasks hero columns */
    .today-hero-pt-cols {
      display: flex;
      gap: 10px;
      margin-top: var(--space-2);
      flex: 1;
    }
    .today-hero-pt-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-radius: 8px;
      padding: 6px 8px;
      border: 1.5px dashed transparent;
      transition: border-color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out);
    }
    .today-hero-pt-col.drop-active {
      border-color: var(--primary);
      background: var(--primary-soft);
    }
    .today-hero-pt-col-header {
      font-size: 10px;
      font-family: var(--serif);
      color: var(--muted-3);
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .today-hero-pt-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted-4);
      font-weight: 400;
    }
    .today-hero-pt-empty {
      font-size: 11px;
      color: var(--muted-4);
      font-style: italic;
      padding: 2px 0;
    }
    .today-hero-pt-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 2px 0;
    }
    .today-hero-pt-item.done .today-hero-list-title {
      opacity: 0.45;
      text-decoration: line-through;
    }
    .today-hero-pt-check {
      flex-shrink: 0;
      width: 12px; height: 12px;
      accent-color: var(--teal);
      cursor: pointer;
    }
    .today-hero-pt-remove {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--muted-4);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
      border-radius: 3px;
      transition: color var(--duration-fast) var(--ease-out);
    }
    .today-hero-pt-remove:hover { color: #E53E3E; }
    .today-rail-empty {
      padding: var(--space-5) var(--space-4);
      font-size: var(--text-sm);
      color: var(--muted-4);
      text-align: center;
      line-height: var(--leading-snug);
    }

    /* Footer / utility row */


    .weather-strip {
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      padding: 5px 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .weather-strip-left {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      padding-right: 10px;
      border-right: 1px solid var(--rule);
    }
    .weather-strip-eyebrow {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
    }
    .weather-strip-location {
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }
    .weather-strip-tabs {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      background: var(--bg-card-deep);
      border-radius: var(--radius-pill);
      flex-shrink: 0;
    }
    .weather-strip-tab {
      padding: 4px 10px;
      background: transparent;
      border: none;
      border-radius: var(--radius-pill);
      color: var(--muted-3);
      font-size: 11px;
      letter-spacing: 0;
      text-transform: none;
      cursor: pointer;
      font-weight: 500;
      transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
    }
    .weather-strip-tab:hover { color: var(--text); }
    .weather-strip-tab.active {
      background: var(--bg-card);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
      font-weight: 600;
    }
    .weather-strip-cells {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      align-items: stretch;
    }
    .weather-cell {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      padding: 4px 6px;
      border-right: 1px solid var(--rule-faint);
      cursor: default;
      transition: background var(--duration-fast) var(--ease-out);
      gap: 5px;
    }
    .weather-cell:last-child { border-right: none; }
    .weather-cell:hover { background: var(--bg-hover); }
    .weather-cell.now { background: var(--primary-soft); }
    .weather-cell-hour {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.02em;
      font-weight: 600;
      white-space: nowrap;
    }
    .weather-cell.now .weather-cell-hour {
      color: var(--primary);
    }
    .weather-cell-icon {
      font-size: 14px;
      line-height: 1;
    }
    .weather-cell-temp {
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .weather-cell-precip {
      font-size: 10px;
      color: #5B8DB3;
      font-family: var(--mono);
      font-weight: 500;
      white-space: nowrap;
    }
    .weather-cell-precip.dry { color: var(--muted-4); }
    .weather-strip-status {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted-3);
      font-size: 12px;
    }
    .weather-strip-status.error { color: var(--coral); }
    .weather-strip-refresh {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--muted-3);
      font-size: 14px;
      width: 28px;
      height: 28px;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
    }
    .weather-strip-refresh:hover { border-color: var(--primary); color: var(--primary); }
    @media (max-width: 759px) {
      .weather-strip { padding: 4px 8px; gap: 6px; }
      .weather-strip-left { padding-right: 6px; }
      .weather-strip-location { font-size: 10px; max-width: 80px; }
      .weather-strip-eyebrow { display: none; }
      .weather-cell { padding: 3px 4px; gap: 3px; }
    }


    .right-now {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.12) 0%, rgba(201, 168, 76, 0.04) 100%);
      border-left: 3px solid var(--primary);
      padding: 18px 24px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 24px;
      align-items: center;
    }
    .right-now-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .right-now-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--primary);
      animation: pulse 1.4s ease-in-out infinite;
      box-shadow: 0 0 6px var(--primary);
    }
    .right-now-now {
      font-size: 17px;
      color: var(--text);
      line-height: 1.45;
      font-weight: 400;
    }
    .right-now-now-empty {
      font-size: 14px;
      color: var(--muted-2);
      font-style: italic;
      line-height: 1.5;
    }
    .right-now-next {
      font-size: 12px;
      color: var(--muted-2);
      margin-top: 6px;
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }
    .right-now-next b {
      color: var(--muted-1);
      font-weight: 500;
    }
    .right-now-time {
      text-align: right;
      font-family: var(--mono);
      padding-right: 8px;
      border-right: 1px solid rgba(201, 168, 76, 0.18);
      padding-right: 24px;
    }
    .right-now-time-big {
      font-size: 28px;
      color: var(--text);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
    .right-now-time-day {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-3);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Reference Library access panel inside the Right Now banner */
    .right-now-reference {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
    }
    .right-now-reference-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--primary);
      text-transform: uppercase;
      font-weight: 500;
      opacity: 0.85;
    }
    .ref-quick-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ref-quick-item {
      background: transparent;
      border: none;
      padding: 4px 0;
      color: var(--muted-1);
      font-family: var(--serif);
      font-size: 12px;
      text-align: left;
      cursor: pointer;
      transition: color var(--duration-fast) var(--ease-out);
      letter-spacing: 0.005em;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ref-quick-item::before {
      content: '›';
      color: var(--muted-4);
      font-family: var(--mono);
      transition: color var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
    }
    .ref-quick-item:hover {
      color: var(--primary);
    }
    .ref-quick-item:hover::before {
      color: var(--primary);
      transform: translateX(2px);
    }
    .ref-quick-more {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.1em;
      margin-top: 4px;
      padding: 4px 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }
    .ref-quick-more:hover { color: var(--primary); }

    /* ───────── MAIN GRID LAYOUT (portfolio + calendar) ───────── */
    .main-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 1199px) {
      .main-layout { grid-template-columns: 340px 1fr; gap: 16px; }
    }
    @media (max-width: 1023px) {
      .main-layout { grid-template-columns: 1fr; }
    }

    /* ───────── PORTFOLIO PANEL ───────── */
    .portfolio {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: sticky;
      top: 56px;
      max-height: calc(100vh - 56px);
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .portfolio::-webkit-scrollbar { width: 4px; }
    .portfolio::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-pill); }
    .portfolio-section {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .portfolio-list {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .portfolio-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: var(--space-3) var(--space-4) var(--space-2);
      border-bottom: 1px solid var(--rule);
    }
    .portfolio-eyebrow {
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--primary);
      text-transform: uppercase;
      font-weight: 600;
    }
    .portfolio-budget-summary {
      font-size: 11px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.02em;
      font-weight: 500;
    }
    .portfolio-budget-summary b { color: var(--text); font-weight: 600; }
    .portfolio-budget-summary.over { color: var(--coral); }
    .portfolio-budget-summary.over b { color: var(--coral); }

    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-base);
      box-shadow: var(--shadow-sm);
      transition: background var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
      overflow: hidden;
      position: relative;
    }
    .project-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--card-accent, var(--border));
    }
    .project-card.master::before { width: 4px; }
    .project-card:hover { box-shadow: var(--shadow-md); }
    .project-card-header {
      padding: 14px 16px 12px;
      cursor: pointer;
      user-select: none;
    }
    .project-card-header:hover { background: var(--bg-hover); }
    .project-card-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }
    .project-card-name {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0;
    }
    .project-card.master .project-card-name {
      font-size: 16px;
      letter-spacing: -0.01em;
      font-weight: 700;
    }
    .project-card-tier {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--muted-3);
      font-family: var(--mono);
      text-transform: uppercase;
      flex-shrink: 0;
      font-weight: 600;
    }
    .project-card-subtitle {
      font-size: 12px;
      color: var(--muted-3);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .project-card-status {
      font-size: 13px;
      color: var(--muted-2);
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .project-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.02em;
      font-weight: 500;
    }
    .project-card-budget {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .project-card-budget-bar {
      width: 50px;
      height: 3px;
      background: var(--rule);
      position: relative;
      overflow: hidden;
    }
    .project-card-budget-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      transition: width var(--duration-slow) var(--ease-out);
    }
    .project-card-budget-text b { color: var(--muted-1); font-weight: 500; }
    .project-card-effort { color: var(--muted-4); }

    .project-card-body {
      border-top: 1px solid var(--rule);
      padding: 10px 16px 14px;
      display: none;
    }
    .project-card.expanded .project-card-body { display: block; }
    .project-card.expanded { background: var(--bg-hover); }

    .next-actions-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--muted-4);
      text-transform: uppercase;
      margin: 6px 0 8px;
      font-weight: 600;
    }
    .next-action {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-card-deep);
      border-radius: var(--radius-base);
      margin-bottom: 4px;
      cursor: grab;
      transition: background var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
      align-items: flex-start;
    }
    .next-action:hover {
      background: var(--primary-soft);
      transform: translateX(2px);
    }
    .next-action-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      flex: 1;
      font-weight: 500;
    }
    .next-action-time {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.02em;
      flex-shrink: 0;
      padding-top: 1px;
      font-weight: 500;
    }

    /* NEXT modules list — shown when NEXT card is expanded */
    .module-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-top: 4px;
    }
    .module-row {
      background: var(--bg-card);
      cursor: pointer;
      user-select: none;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .module-row:hover { background: var(--bg-card-deep); }
    .module-row-header {
      padding: 9px 12px 9px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .module-row-priority {
      font-size: 9px;
      color: var(--muted-4);
      font-family: var(--mono);
      width: 24px;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }
    .module-row-priority.top {
      color: var(--primary);
      font-weight: 600;
    }
    .module-row-name {
      flex: 1;
      font-size: 12px;
      color: var(--muted-1);
      line-height: 1.35;
    }
    .module-row.expanded .module-row-name { color: var(--text); }
    .module-row-status {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .module-row-effort {
      font-size: 9px;
      color: var(--muted-4);
      font-family: var(--mono);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .module-row-body {
      display: none;
      padding: 4px 14px 14px 38px;
      border-top: 1px solid var(--rule);
    }
    .module-row.expanded .module-row-body { display: block; }
    .module-row-description {
      font-size: 11px;
      color: var(--muted-3);
      line-height: 1.6;
      font-style: italic;
      margin: 8px 0 10px;
    }

    /* ───────── CALENDAR PANEL (right side of layout) ───────── */
    .calendar-panel {
      min-width: 0; /* allows the grid inside to actually shrink */
    }

    /* ───────── SCHEDULED PROJECT BLOCKS ───────── */
    .cal-item.project-block {
      cursor: pointer;
    }
    .cal-item.project-block .cal-item-project {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: var(--mono);
      opacity: 0.85;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cal-item.project-block.completed {
      opacity: 0.55;
    }
    .cal-item.project-block.completed .cal-item-title {
      text-decoration: line-through;
      text-decoration-color: rgba(255,255,255,0.5);
    }
    .cal-item.project-block.completed::after {
      content: '✓';
      position: absolute;
      top: 4px; right: 6px;
      font-size: 11px;
      color: #fff;
    }
    .cal-item.project-block.partial {
      background-image: repeating-linear-gradient(
        135deg,
        transparent 0px, transparent 6px,
        rgba(255,255,255,0.15) 6px, rgba(255,255,255,0.15) 12px
      );
    }
    .cal-item.project-block.partial::after {
      content: '½';
      position: absolute;
      top: 2px; right: 6px;
      font-size: 12px;
      color: #fff;
      font-family: var(--serif);
    }

    /* Drop target highlight */
    .day-column.drop-active {
      background: var(--primary-soft) !important;
      box-shadow: inset 0 0 0 1px var(--primary);
    }
    .day-column.drop-active::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(59, 130, 246, 0.06) 50%,
        transparent 100%
      );
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    /* Drop preview ghost */
    .drop-ghost {
      position: absolute;
      left: 2px; right: 2px;
      pointer-events: none;
      border: 1px dashed var(--primary);
      background: rgba(201, 168, 76, 0.08);
      border-radius: 2px;
      z-index: 6;
    }

    /* ───────── ACTION CHIP STATES ───────── */
    .next-action.scheduled {
      opacity: 0.55;
      cursor: default;
    }
    .next-action.scheduled:hover {
      background: var(--bg-card);
      border-left-color: var(--border);
    }
    .next-action-badge {
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 2px;
      font-family: var(--mono);
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 1px;
    }
    .next-action-badge.scheduled {
      background: rgba(201, 168, 76, 0.15);
      color: var(--primary);
    }
    .next-action-dragging { opacity: 0.4; }

    /* ───────── BLOCK POPOVER MODAL ───────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: var(--modal-backdrop);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn var(--duration-fast) var(--ease-out);
    }
    .modal {
      background: var(--bg-card);
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border-top: 3px solid var(--primary);
      animation: modalIn var(--duration-base) var(--ease-out);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--rule);
    }
    .modal-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .modal-title {
      font-size: 18px;
      color: var(--text);
      line-height: 1.3;
      font-weight: 400;
      letter-spacing: -0.005em;
    }
    .modal-meta {
      display: flex;
      gap: 14px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.05em;
      flex-wrap: wrap;
    }
    .modal-meta-project { color: var(--primary); }
    .modal-body {
      padding: 18px 24px 22px;
    }
    .modal-section {
      margin-bottom: 18px;
    }
    .modal-section:last-child { margin-bottom: 0; }
    .modal-section-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-3);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .modal-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .modal-input {
      background: var(--bg-card-deep);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 14px;
      width: 90px;
      letter-spacing: 0.04em;
    }
    .modal-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .modal-input.wide { width: 110px; }
    .modal-input-suffix {
      color: var(--muted-3);
      font-size: 12px;
      font-family: var(--mono);
    }
    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .modal-btn {
      padding: 11px 16px;
      background: var(--bg-card-deep);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--serif);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
    }
    .modal-btn:hover { border-color: var(--muted-3); background: var(--bg-hover); }
    .modal-btn-hint {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.05em;
    }
    .modal-btn.primary {
      border-color: var(--primary);
      color: var(--primary);
    }
    .modal-btn.primary:hover {
      background: rgba(201, 168, 76, 0.08);
    }
    .modal-btn.danger {
      border-color: rgba(224, 123, 106, 0.3);
      color: var(--coral);
    }
    .modal-btn.danger:hover {
      border-color: var(--coral);
      background: rgba(224, 123, 106, 0.06);
    }
    .modal-btn.complete {
      background: rgba(126, 184, 164, 0.06);
      border-color: rgba(126, 184, 164, 0.3);
      color: var(--teal);
    }
    .modal-btn.complete:hover {
      background: rgba(126, 184, 164, 0.12);
      border-color: var(--teal);
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 18px;
      background: none;
      border: none;
      color: var(--muted-3);
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { color: var(--text); }
    .modal { position: relative; }


    /* ───────── RESIZE HANDLE ───────── */
    .cal-item-resize-handle {
      position: absolute;
      left: 0; right: 0;
      bottom: 0;
      height: 6px;
      cursor: ns-resize;
      z-index: 3;
      background: transparent;
    }
    .cal-item-resize-handle:hover {
      background: rgba(201, 168, 76, 0.25);
    }

    /* ───────── ROUTINE COMPLETE CHECKBOX (in calendar block) ───────── */
    .cal-item-check {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.15);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
      color: #fff;
      font-weight: bold;
      transition: border-color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out);
      z-index: 4;
    }
    .cal-item-check:hover {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.3);
    }
    .cal-item.routine-completed .cal-item-check {
      border-color: #fff;
      background: #fff;
      color: var(--text);
    }
    .cal-item.routine-completed .cal-item-title {
      opacity: 0.7;
    }

    /* Agenda view check button */
    .agenda-item-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--muted-3);
      background: transparent;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--teal);
      font-weight: bold;
      flex-shrink: 0;
      align-self: center;
      transition: border-color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out);
    }
    .agenda-item-check:hover {
      border-color: var(--teal);
    }
    .agenda-item.past .agenda-item-check {
      border-color: var(--teal);
      background: var(--teal);
      color: var(--bg);
    }
    .cal-item.resizing {
      filter: brightness(1.35);
      outline: 1px dashed var(--primary);
      outline-offset: -1px;
    }
    /* Routine items: cursor pointer to telegraph "click to edit" */
    .cal-item.routine-item { cursor: pointer; }
    .cal-item.moved {
      box-shadow: inset 2px 0 0 var(--primary);
    }
    .cal-item.moved::before {
      content: '↪';
      position: absolute;
      top: 1px; right: 4px;
      font-size: 12px;
      color: var(--primary);
      line-height: 1;
    }
    .cal-item.overridden::before {
      content: '✎';
      position: absolute;
      top: 2px; right: 4px;
      font-size: 10px;
      color: var(--primary);
      opacity: 0.6;
    }

    /* ───────── REFERENCE LIBRARY MODAL ───────── */
    .ref-modal {
      position: relative;
      width: min(680px, 94vw);
      max-height: min(82vh, 720px);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 20px;
      box-shadow: var(--shadow-card), 0 0 0 1px rgba(255,255,255,0.18) inset;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    [data-theme="dark"] .ref-modal {
      background: rgba(30,30,34,0.82);
      border-color: rgba(255,255,255,0.10);
    }
    .ref-modal-header {
      flex-shrink: 0;
      padding: 28px 28px 18px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    [data-theme="dark"] .ref-modal-header {
      border-bottom-color: rgba(255,255,255,0.07);
    }
    .ref-modal-eyebrow {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted-3);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .ref-modal-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .ref-modal-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 20px 20px;
    }
    .ref-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ref-entry {
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow var(--duration-fast) var(--ease-out);
    }
    [data-theme="dark"] .ref-entry {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.10);
    }
    .ref-entry.expanded {
      box-shadow: 0 2px 12px rgba(37,99,235,0.10), 0 1px 4px rgba(0,0,0,0.06);
      border-color: rgba(37,99,235,0.25);
    }
    .ref-entry-header {
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      user-select: none;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .ref-entry-header:hover {
      background: rgba(37,99,235,0.05);
    }
    .ref-entry-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.005em;
    }
    .ref-entry-chevron {
      color: var(--muted-3);
      font-family: var(--mono);
      font-size: 16px;
      line-height: 1;
      transition: transform var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
      flex-shrink: 0;
    }
    .ref-entry.expanded .ref-entry-chevron {
      transform: rotate(90deg);
      color: var(--primary);
    }
    .ref-entry-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 260ms var(--ease-out);
    }
    .ref-entry.expanded .ref-entry-body {
      max-height: 4000px;
    }
    .ref-entry-inner {
      padding: 4px 18px 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    [data-theme="dark"] .ref-entry-inner {
      border-top-color: rgba(255,255,255,0.06);
    }
    .ref-entry-content {
      font-size: 13px;
      color: var(--muted-1);
      line-height: 1.8;
      white-space: pre-wrap;
      font-family: var(--serif);
      padding-top: 10px;
    }
    .ref-entry-edit-btn {
      background: none;
      border: none;
      color: var(--muted-3);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      cursor: pointer;
      text-transform: uppercase;
      padding: 6px 0 0;
      margin-top: 6px;
      display: block;
      touch-action: manipulation;
    }
    .ref-entry-edit-btn:hover { color: var(--primary); }
    .ref-entry-textarea {
      width: 100%;
      min-height: 200px;
      background: rgba(0,0,0,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--serif);
      font-size: 13px;
      padding: 12px 14px;
      line-height: 1.8;
      resize: vertical;
      box-sizing: border-box;
      margin-top: 10px;
    }
    [data-theme="dark"] .ref-entry-textarea {
      background: rgba(255,255,255,0.04);
    }
    .ref-entry-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .ref-entry-edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .ref-entry-save-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity var(--duration-fast) var(--ease-out);
    }
    .ref-entry-save-btn:hover { opacity: 0.88; }
    .ref-entry-cancel-btn {
      background: none;
      color: var(--muted-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 13px;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
    }
    .ref-entry-cancel-btn:hover { border-color: var(--muted-2); color: var(--text); }

    /* ───────── ROUTINE EDIT FORMS ───────── */
    .routine-modal { max-width: 720px; }
    .routine-day-group { margin-bottom: 16px; }

    /* ───────── ROUTINE MANAGER — two-section layout ───────── */
    .rm-sections { display: flex; flex-direction: column; }
    .rm-section { padding: 20px 0 4px; }
    .rm-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .rm-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted-2);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rm-section-btn {
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      background: rgba(37,99,235,0.08);
      border: 1px solid rgba(37,99,235,0.18);
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background var(--duration-fast) var(--ease-out);
      white-space: nowrap;
    }
    .rm-section-btn:hover { background: rgba(37,99,235,0.14); }
    .rm-section-divider {
      height: 1px;
      background: rgba(0,0,0,0.07);
      margin: 8px 0;
    }
    [data-theme="dark"] .rm-section-divider { background: rgba(255,255,255,0.07); }
    .rm-empty {
      font-size: 13px;
      color: var(--muted-3);
      font-style: italic;
      padding: 8px 0;
    }

    /* ───────── CATEGORY ROWS ───────── */
    .cat-row-list { display: flex; flex-direction: column; gap: 2px; }
    .cat-row {
      display: grid;
      /* dot | emoji | name | cpx | reset | delete */
      grid-template-columns: 8px 30px 1fr auto 24px 24px;
      align-items: center;
      gap: 8px;
      padding: 5px 4px;
      border-radius: 8px;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .cat-row:hover { background: rgba(0,0,0,0.03); }
    [data-theme="dark"] .cat-row:hover { background: rgba(255,255,255,0.04); }
    .cat-row-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      justify-self: center;
    }
    .cat-row-emoji {
      width: 28px;
      height: 24px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: border-color var(--duration-fast) var(--ease-out);
    }
    .cat-row-emoji:hover { border-color: var(--primary); }
    .cat-row-name {
      min-width: 0;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      padding: 2px 5px;
      border-radius: 5px;
      cursor: text;
      font-family: inherit;
      transition: background var(--duration-fast);
      width: 100%;
    }
    .cat-row-name:hover { background: rgba(0,0,0,0.04); }
    [data-theme="dark"] .cat-row-name:hover { background: rgba(255,255,255,0.07); }
    .cat-row-name:focus { outline: none; background: rgba(37,99,235,0.08); }
    .cat-row-action {
      width: 22px;
      height: 22px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      padding: 0;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      color: var(--muted-3);
      transition: border-color var(--duration-fast), color var(--duration-fast);
    }
    .cat-row-action.reset:hover { border-color: var(--primary); color: var(--primary); }
    .cat-row-action.delete:hover { border-color: #ef4444; color: #ef4444; }
    .cat-row-action.disabled { opacity: 0.35; cursor: not-allowed; }
    .rm-filter-select {
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 4px 10px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      outline: none;
      max-width: 140px;
    }
    .rm-filter-select:focus { border-color: var(--primary); }
    .cat-new-form {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 8px;
      margin-bottom: 10px;
      background: rgba(37,99,235,0.04);
      border: 1px dashed rgba(37,99,235,0.25);
      border-radius: 10px;
    }
    .cat-new-add-btn {
      flex-shrink: 0;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity var(--duration-fast);
    }
    .cat-new-add-btn:hover { opacity: 0.88; }
    .cat-new-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .cat-new-cancel-btn {
      flex-shrink: 0;
      background: none;
      color: var(--muted-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color var(--duration-fast), color var(--duration-fast);
    }
    .cat-new-cancel-btn:hover { border-color: var(--muted-2); color: var(--text); }

    /* Emoji picker popover — shared by category rows */
    .emoji-picker-popover {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 50;
      width: 320px;
      max-height: 360px;
      overflow-y: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: var(--space-3);
      animation: fadeIn var(--duration-fast) var(--ease-out);
    }
    .emoji-picker-group { margin-bottom: var(--space-3); }
    .emoji-picker-group:last-child { margin-bottom: 0; }
    .emoji-picker-group-label {
      font-size: 10px;
      letter-spacing: var(--tracking-wider);
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: var(--space-1);
      padding-left: var(--space-1);
    }
    .emoji-picker-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
    }
    .emoji-picker-cell {
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
    }
    .emoji-picker-cell:hover { background: var(--bg-hover); transform: scale(1.15); }
    .emoji-picker-cell.selected { background: var(--primary-soft); border-color: var(--primary); }
    .category-color-swatch, .cpx-swatch {
      flex-shrink: 0;
      width: 28px;
      height: 22px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      cursor: pointer;
      padding: 1px;
    }
    .cpx {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .cpx-sep {
      width: 1px;
      height: 14px;
      background: var(--border);
      flex-shrink: 0;
    }
    .cpx-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .cpx-label {
      font-size: 10px;
      color: var(--muted-3);
      white-space: nowrap;
    }
    .cpx-slider {
      width: 52px;
      height: 3px;
      cursor: pointer;
      accent-color: var(--primary);
    }
    .cpx-pct {
      font-size: 10px;
      color: var(--muted-2);
      font-family: var(--mono);
      min-width: 26px;
    }
    .cpx-stripe-btn {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--muted-2);
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .cpx-stripe-btn.active {
      background: rgba(99,102,241,0.12);
      border-color: rgba(99,102,241,0.4);
      color: rgba(99,102,241,0.9);
    }
    .routine-day-group-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .routine-item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
      margin-bottom: 4px;
    }
    [data-theme="dark"] .routine-item-row {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.08);
    }
    .routine-item-row:hover {
      background: rgba(255,255,255,0.82);
      border-color: rgba(255,255,255,0.9);
    }
    [data-theme="dark"] .routine-item-row:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.13);
    }
    .routine-item-row-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      letter-spacing: 0.04em;
      width: 90px;
      flex-shrink: 0;
    }
    .routine-item-row-title {
      flex: 1;
      font-size: 13px;
      color: var(--text);
    }
    .routine-item-row-cat {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .routine-form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .routine-form-row {
      grid-column: span 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .routine-form-row.half { grid-column: span 1; }
    .routine-form-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted-3);
      text-transform: uppercase;
      font-weight: 600;
    }
    .routine-form-input {
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 12px;
      font-family: var(--serif);
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
    }
    [data-theme="dark"] .routine-form-input { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14); }
    .routine-form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }
    .routine-form-input.mono { font-family: var(--mono); font-size: 13px; }
    .routine-form-textarea {
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 12px;
      font-family: var(--serif);
      font-size: 13px;
      line-height: 1.6;
      min-height: 70px;
      resize: vertical;
      box-sizing: border-box;
      transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
    }
    [data-theme="dark"] .routine-form-textarea { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14); }
    .routine-form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }
    .day-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .day-chip {
      padding: 6px 12px;
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted-3);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--sans);
      font-weight: 500;
      min-width: 44px;
      text-align: center;
      transition: all var(--duration-fast) var(--ease-out);
    }
    [data-theme="dark"] .day-chip { background: rgba(255,255,255,0.06); }
    .day-chip:hover { color: var(--text); border-color: var(--muted-3); }
    .day-chip.active {
      background: rgba(99,102,241,0.10);
      border-color: rgba(99,102,241,0.40);
      color: rgba(99,102,241,0.9);
    }
    .cat-chips {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .cat-chip {
      padding: 5px 11px;
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--mono);
      color: var(--muted-3);
      transition: all var(--duration-fast) var(--ease-out);
    }
    [data-theme="dark"] .cat-chip { background: rgba(255,255,255,0.06); }
    .cat-chip:hover { color: var(--text); border-color: var(--muted-3); }
    .cat-chip.active {
      background: rgba(99,102,241,0.09);
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      padding: 6px 0;
    }
    .checkbox-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .checkbox-row span {
      font-size: 13px; color: var(--muted-1);
    }
    .scope-toggle {
      display: flex;
      gap: 1px;
      background: var(--bg);
      padding: 2px;
      border: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .scope-toggle-btn {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--muted-3);
      font-family: var(--serif);
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
    }
    .scope-toggle-btn.active {
      background: rgba(201, 168, 76, 0.14);
      color: var(--primary);
    }
    .scope-hint {
      font-size: 11px;
      color: var(--muted-3);
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    /* ───────── HEADER MANAGE BUTTON ───────── */
    .manage-btn {
      padding: 0 14px;
      height: 38px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-2);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: var(--serif);
      cursor: pointer;
    }
    .manage-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* Mobile adjustments: stack everything */
    @media (max-width: 1023px) {
      .right-now { padding: 14px 18px; grid-template-columns: 1fr; }
      .right-now-time {
        text-align: left;
        display: flex;
        align-items: baseline;
        gap: 12px;

    /* ───────── WEEKLY RESET OVERLAY (full-screen) ───────── */
    .reset-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      overflow-y: auto;
      animation: fadeIn 0.2s ease-out;
    }
    .reset-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
    }
    .reset-overlay::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);

    /* ───────── IMPORTED ICS EVENTS ───────── */
    .cal-item.ics-event {

    }

    }

    }

    }

    }
    .cal-item.ics-event .cal-item-title {
      opacity: 0.85;
    }
    .cal-item.ics-event.all-day {
      background: rgba(140, 140, 150, 0.08);

    /* ───────── SETTINGS MODAL ───────── */
    /* ── SETTINGS MODAL – redesigned ── */
    .settings-modal {
      max-width: 740px;
      border-top: none;
      border-radius: 20px;

      backdrop-filter: blur(32px);

      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18), 0 1px 0 rgba(255,255,255,0.85) inset;
    }

      background: rgba(28,28,30,0.96);
      box-shadow: 0 24px 64px rgba(0,0,0,0.55);
    }

    .sm-header { padding: 24px 28px 0; }
    .sm-header-eyebrow {
      font-size: 9px; letter-spacing: 0.28em; color: var(--muted-3);
      text-transform: uppercase; font-family: var(--mono); font-weight: 600;
      margin-bottom: 4px;
    }
    .sm-title {
      font-size: 22px; font-weight: 400; color: var(--text);
      letter-spacing: -0.01em; margin-bottom: 18px;
    }

    .sm-tabs {
      display: flex; align-items: center;
      background: rgba(0,0,0,0.06); border-radius: 12px;
      padding: 3px; margin: 0 28px 20px; gap: 2px; border-bottom: none;
    }
    [data-theme="dark"] .sm-tabs { background: rgba(255,255,255,0.07); }
    .sm-tab {
      flex: 1; border: none; border-bottom: none; border-radius: 9px;
      padding: 7px 12px; background: transparent; color: var(--muted-2);
