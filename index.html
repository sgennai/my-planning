      transition: all var(--duration-fast) var(--ease-out);
    }
    .sm-tab:hover { color: var(--text); }
    .sm-tab.active {
      background: rgba(255,255,255,0.9); color: var(--primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.10), 0 0 0 0.5px rgba(0,0,0,0.05);
    }
    [data-theme="dark"] .sm-tab.active { background: rgba(255,255,255,0.12); }

    .sm-body { padding: 0 28px 28px; overflow-y: auto; flex: 1; min-height: 0; }
    .sm-section { margin-bottom: 16px; }
    .sm-eyebrow {
      font-size: 9px; letter-spacing: 0.28em; color: var(--muted-3);
      text-transform: uppercase; font-weight: 600; font-family: var(--mono);
      margin-bottom: 7px; padding-left: 2px;
    }

    .sm-card {
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 12px; padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    [data-theme="dark"] .sm-card {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.09);
    }
    .sm-card-subtle {
      background: rgba(255,255,255,0.32);
      border-color: rgba(0,0,0,0.05); box-shadow: none;
    }
    [data-theme="dark"] .sm-card-subtle {
      background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.05);
    }

    .sm-field { display: flex; flex-direction: column; gap: 5px; }
    .sm-field-label {
      font-size: 9px; letter-spacing: 0.20em; color: var(--muted-3);
      text-transform: uppercase; font-weight: 600; font-family: var(--mono);
    }
    .sm-hint { font-size: 11px; color: var(--muted-3); line-height: 1.55; }
    .sm-hint code {
      font-family: var(--mono); font-size: 10px;
      background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px; color: var(--muted-1);
    }

    .sm-input {
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(0,0,0,0.12); border-radius: 8px;
      color: var(--text); padding: 9px 12px;
      font-family: var(--mono); font-size: 12px;
      width: 100%; box-sizing: border-box;
      transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
    }
    .sm-input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
    }
    [data-theme="dark"] .sm-input {
      background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.15);
    }

    .sm-divider { height: 1px; background: var(--rule); margin: 14px 0; }
    .sm-row { display: flex; gap: 10px; align-items: flex-start; }
    .sm-row.half { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .sm-cal-item { padding: 2px 0; }
    .sm-cal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .sm-color-swatch {
      width: 26px; height: 26px; border-radius: 6px;
      border: 1.5px solid var(--border); padding: 2px;
      cursor: pointer; flex-shrink: 0; background: transparent;
    }
    .sm-cal-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
    .sm-nowline-row { flex-direction: row; align-items: center; justify-content: space-between; }
    .sm-nowline-controls { display: flex; align-items: center; gap: 6px; }
    .sm-reset-btn {
      font-size: 13px; color: var(--muted-3); background: none; border: none;
      cursor: pointer; padding: 2px 4px; border-radius: 4px; line-height: 1;
      transition: color var(--duration-fast) var(--ease-out);
      touch-action: manipulation;
    }
    .sm-reset-btn:hover { color: var(--text); }

    .sm-status {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--muted-3); font-family: var(--mono);
    }
    .sm-status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted-4); flex-shrink: 0;
    }
    .sm-status.ok .sm-status-dot { background: var(--teal); }
    .sm-status.ok { color: var(--teal); }
    .sm-status.error .sm-status-dot { background: var(--coral); }
    .sm-status.error { color: var(--coral); }
    .sm-status.loading .sm-status-dot { background: var(--primary); animation: pulse 1.2s ease-in-out infinite; }

    .sm-btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; padding: 8px 18px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.65);
      color: var(--muted-2); font-family: var(--sans); font-size: 13px;
      font-weight: 500; cursor: pointer; white-space: nowrap;
      transition: all var(--duration-fast) var(--ease-out);
      touch-action: manipulation;
    }
    .sm-btn:hover { border-color: var(--muted-3); color: var(--text); background: rgba(255,255,255,0.9); }
    .sm-btn.primary {
      background: rgba(99,102,241,0.10); border-color: rgba(99,102,241,0.35);
      color: rgba(99,102,241,0.9);
    }
    .sm-btn.primary:hover {
      background: rgba(99,102,241,0.17); border-color: rgba(99,102,241,0.55);
      color: rgb(99,102,241);
    }
    .sm-btn.danger { color: var(--coral); border-color: rgba(224,123,106,0.3); background: transparent; }
    .sm-btn.danger:hover { background: rgba(224,123,106,0.07); border-color: var(--coral); }
    .sm-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    [data-theme="dark"] .sm-btn { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); }
    [data-theme="dark"] .sm-btn:hover { background: rgba(255,255,255,0.12); }
    [data-theme="dark"] .sm-btn.primary { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); }

    .sm-guide-list {
      margin: 0; padding-left: 18px;
      font-size: 11px; color: var(--muted-3); line-height: 2;
    }
    .sm-guide-list li { margin-bottom: 2px; }
    .sm-guide-list code {
      font-family: var(--mono); font-size: 10px;
      background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px;
    }


    .cal-item.friday-review-active {
      background: rgba(201, 168, 76, 0.25) !important;
      box-shadow: 0 0 0 1px var(--primary), 0 0 12px rgba(201, 168, 76, 0.4);
    }

    /* week-grid header — transparent so card blur shows through */
    .week-grid-header {
      background: transparent;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* ───────── CALENDAR TOGGLES — Apple Calendar style ───────── */
    .today-cal-toggles {
      padding: 4px var(--space-3) var(--space-4);
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .cal-toggle-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px var(--space-2);
      background: transparent;
      border: none;
      border-radius: var(--radius-base);
      color: var(--text);
      font-size: 13px;
      font-family: var(--serif);
      font-weight: 400;
      cursor: pointer;
      text-align: left;
      transition: background var(--duration-fast) var(--ease-out);
      width: 100%;
    }
    .cal-toggle-btn:hover {
      background: var(--bg-hover);
      border-radius: var(--radius-base);
    }
    .cal-toggle-btn.active { color: var(--text); }
    .cal-toggle-btn:not(.active) { color: var(--muted-3); }
    .cal-toggle-check {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--muted-3);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
    }
    .cal-toggle-check-mark {
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
      color: #fff;
    }
    [data-theme="dark"] .cal-toggle-check-mark {
      color: #111;
    }


    /* ═══════════════════════════════════════════════════════
       INTERVIEW PREP PAGE
    ═══════════════════════════════════════════════════════ */
    .ip-screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      /* No background — aurora from :root shows through all surfaces */
      font-family: var(--serif);
    }

    /* Top bar — mirrors .app-topbar glass treatment */
    .ip-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 20px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border-bottom: 1px solid var(--rule);
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
      z-index: 10;
    }
    [data-theme="dark"] .ip-topbar {
      background: rgba(28,28,30,0.82);
    }
    .ip-back-btn {
      background: none;
      border: none;
      color: var(--primary);
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: var(--radius-base);
      touch-action: manipulation;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .ip-back-btn:hover { background: var(--primary-soft); }
    .ip-topbar-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .ip-topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: var(--tracking-tight);
    }
    .ip-topbar-sub {
      font-size: 10px;
      font-family: var(--display);
      font-style: italic;
      color: var(--muted-3);
      letter-spacing: 0.04em;
    }
    .ip-topbar-right { display: flex; align-items: center; gap: 8px; }
    .ip-topbar-rehearse-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      padding: 7px 16px;
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: var(--shadow-primary);
      transition: opacity var(--duration-fast) var(--ease-out);
    }
    .ip-topbar-rehearse-btn:hover { opacity: 0.87; }

    /* Dashboard strip — glass hero bar */
    .ip-dashboard {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.58);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--rule);
    }
    [data-theme="dark"] .ip-dashboard { background: rgba(28,28,30,0.58); }
    .ip-dash-card {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.70);
      box-shadow: var(--shadow-card);
      flex-shrink: 0;
    }
    [data-theme="dark"] .ip-dash-card {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
    }
    .ip-dash-card--wide { flex: 1; min-width: 0; }
    .ip-dash-val {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .ip-dash-val--sm { font-size: 13px; font-family: var(--serif); font-weight: 600; }
    .ip-dash-denom { font-size: 13px; font-weight: 400; color: var(--muted-3); }
    .ip-dash-label { font-size: 10px; color: var(--muted-3); font-weight: 500; letter-spacing: 0.01em; }
    .ip-dash-cta { margin-left: auto; }
    .ip-start-rehearsal-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      padding: 9px 18px;
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      white-space: nowrap;
      box-shadow: var(--shadow-primary);
      transition: opacity var(--duration-fast) var(--ease-out);
    }
    .ip-start-rehearsal-btn:hover { opacity: 0.87; }

    /* Three-column layout */
    .ip-cols {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Left column — categories (deep glass, like .today-rail) */
    .ip-left {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-right: 1px solid var(--rule);
      box-shadow: 2px 0 16px -4px rgba(0,0,0,0.10);
    }
    [data-theme="dark"] .ip-left {
      background: rgba(28,28,30,0.72);
    }
    .ip-left-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 8px;
      flex-shrink: 0;
    }
    .ip-left-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted-3);
      font-family: var(--display);
    }
    .ip-left-add-btn {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1px solid var(--rule);
      background: none;
      font-size: 16px;
      line-height: 1;
      color: var(--muted-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .ip-left-add-btn:hover { background: var(--primary-soft); color: var(--primary); }
    .ip-add-cat-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      flex-shrink: 0;
    }
    .ip-add-cat-input {
      flex: 1;
      font-family: var(--serif);
      font-size: 12px;
      border: 1px solid var(--primary);
      border-radius: 6px;
      padding: 4px 8px;
      background: var(--bg-card);
      color: var(--text);
      outline: none;
    }
    .ip-add-cat-ok, .ip-add-cat-x {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 5px;
      touch-action: manipulation;
    }
    .ip-add-cat-ok { color: var(--primary); font-weight: 600; }
    .ip-add-cat-x { color: var(--muted-3); }
    .ip-cat-scroll { flex: 1; overflow-y: auto; padding: 0 0 12px; }
    .ip-cat-group { margin-top: 10px; }
    .ip-cat-group-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-3);
      padding: 4px 14px 3px;
      font-family: var(--display);
    }
    .ip-cat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: var(--radius-base);
      margin: 1px 6px;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .ip-cat-item:hover { background: rgba(0,0,0,0.05); }
    [data-theme="dark"] .ip-cat-item:hover { background: rgba(255,255,255,0.07); }
    .ip-cat-item.active {
      background: rgba(37,99,235,0.10);
      box-shadow: inset 0 0 0 1px rgba(37,99,235,0.18);
    }
    [data-theme="dark"] .ip-cat-item.active {
      background: rgba(79,142,247,0.18);
      box-shadow: inset 0 0 0 1px rgba(79,142,247,0.25);
    }
    .ip-cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ip-cat-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .ip-cat-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ip-cat-due-tag {
      font-size: 9px;
      font-weight: 600;
      color: #f59e0b;
      letter-spacing: 0.02em;
    }
    .ip-cat-count {
      font-size: 10px;
      color: var(--muted-3);
      font-family: var(--mono);
      flex-shrink: 0;
    }

    /* Middle column — questions */
    .ip-mid {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--rule);
      background: rgba(255,255,255,0.52);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    [data-theme="dark"] .ip-mid { background: rgba(28,28,30,0.52); }
    .ip-mid-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 6px;
      flex-shrink: 0;
    }
    .ip-search-wrap { position: relative; flex: 1; }
    .ip-search {
      width: 100%;
      box-sizing: border-box;
      font-family: var(--serif);
      font-size: 12px;
      border: 1px solid var(--rule);
      border-radius: var(--radius-base);
      padding: 6px 24px 6px 10px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(8px);
      color: var(--text);
      outline: none;
      transition: border-color var(--duration-fast) var(--ease-out);
    }
    [data-theme="dark"] .ip-search { background: rgba(255,255,255,0.06); }
    .ip-search:focus { border-color: var(--primary); }
    .ip-search::placeholder { color: var(--muted-3); }
    .ip-search-clear {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted-3);
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .ip-add-q-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      padding: 6px 12px;
      font-family: var(--serif);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
      flex-shrink: 0;
      box-shadow: var(--shadow-primary);
    }
    .ip-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 0 12px 8px;
      flex-shrink: 0;
    }
    .ip-filter-btn {
      background: none;
      border: 1px solid var(--rule);
      border-radius: var(--radius-pill);
      padding: 3px 9px;

    /* Move-to-category select */

    [data-theme="dark"] .ip-ws-move-select {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }
    [data-theme="dark"] .ip-ws-move-select option { background: #2c2c2e; }

    /* Dashboard: alternative actions */
    .ip-dash-alt-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .ip-start-rehearsal-btn--alt {
      background: rgba(37,99,235,0.10);
      color: var(--primary);
      font-weight: 600;
      box-shadow: none;
    }
    [data-theme="dark"] .ip-start-rehearsal-btn--alt { background: rgba(79,142,247,0.18); }
    .ip-start-rehearsal-btn--alt:hover { opacity: 0.80; }

    /* ── Story Bank / Progress nav buttons ── */
    .ip-topbar-stories-btn {
      padding: 5px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--rule);
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-family: var(--serif);
      font-size: 13px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out);
    }
    [data-theme="dark"] .ip-topbar-stories-btn { background: rgba(255,255,255,0.08); }
    .ip-topbar-stories-btn:hover { background: var(--primary-soft); color: var(--primary); }

    /* ── Story Bank view ── */
    .ip-story-view { display: flex; height: 100%; overflow: hidden; }
    .ip-story-list-col {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--rule);
      overflow: hidden;
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 2px 0 16px -4px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .ip-story-list-col {
      background: rgba(28,28,30,0.68);
    }
    .ip-story-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--rule);
    }
    .ip-story-list-header span {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted-3);
      text-transform: uppercase;
      letter-spacing: 0.10em;
      font-family: var(--display);
    }
    .ip-story-list-header button {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-size: 12px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .ip-story-list-header button:hover { background: var(--primary-soft); }
    .ip-story-card {
      padding: 11px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--rule);
      transition: background var(--duration-fast) var(--ease-out);
    }
    .ip-story-card:hover { background: rgba(255,255,255,0.48); }
    [data-theme="dark"] .ip-story-card:hover { background: rgba(255,255,255,0.06); }
    .ip-story-card.active {
      background: rgba(37,99,235,0.09);
      box-shadow: inset 3px 0 0 var(--primary);
    }
    [data-theme="dark"] .ip-story-card.active {
      background: rgba(79,142,247,0.14);
      box-shadow: inset 3px 0 0 var(--primary);
    }
    .ip-story-card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .ip-story-card-summary { font-size: 12px; color: var(--muted-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ip-story-empty { padding: 32px 20px; text-align: center; color: var(--muted-3); font-size: 13px; font-style: italic; }
    .ip-story-editor-panel {
      flex: 1;

      flex-direction: column;
      overflow: hidden;
      background: rgba(255,255,255,0.40);

      -webkit-backdrop-filter: blur(12px);

    [data-theme="dark"] .ip-story-editor-panel { background: rgba(28,28,30,0.40); }
    .ip-story-editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--rule);
      background: rgba(255,255,255,0.22);
      gap: 10px;
    }
    [data-theme="dark"] .ip-story-editor-header { background: rgba(255,255,255,0.03); }
    .ip-story-editor-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: var(--tracking-tight); }
    .ip-story-editor-header-right { display: flex; align-items: center; gap: 10px; }
    .ip-story-editor-saved { font-size: 10px; color: #16a34a; font-weight: 600; letter-spacing: 0.02em; }
    .ip-story-editor-del {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(239,68,68,0.38);
      background: transparent;
      color: #ef4444;
      font-size: 12px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .ip-story-editor-del:hover { background: rgba(239,68,68,0.08); }
    .ip-story-editor-body { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
    .ip-story-field { display: flex; flex-direction: column; gap: 4px; }
    .ip-story-field-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: var(--display);
    }
    .ip-story-field-input {
      width: 100%;
      padding: 8px 12px;
      border-radius: var(--radius-base);
      border: 1px solid var(--rule);
      background: rgba(255,255,255,0.72);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      transition: border-color var(--duration-fast) var(--ease-out);
      box-sizing: border-box;
    }
    [data-theme="dark"] .ip-story-field-input { background: rgba(255,255,255,0.06); }
    .ip-story-field-input:focus { outline: none; border-color: var(--primary); }
    .ip-story-field-ta {
      width: 100%;
      padding: 8px 12px;
      border-radius: var(--radius-base);
      border: 1px solid var(--rule);
      background: rgba(255,255,255,0.72);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;

      transition: border-color var(--duration-fast) var(--ease-out);

    [data-theme="dark"] .ip-story-field-ta { background: rgba(255,255,255,0.06); }
    .ip-story-field-ta:focus { outline: none; border-color: var(--primary); }
    .ip-story-editor-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--muted-3); font-size: 14px; font-style: italic; }

    /* ── Linked stories (in workspace) ── */
    .ip-linked-stories { margin-top: 16px; border-top: 1px solid var(--rule); padding-top: 14px; }
    .ip-linked-stories-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .ip-linked-stories-header span {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: var(--display);
    }
    .ip-linked-link-btn {
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-size: 11px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .ip-linked-link-btn:hover { background: var(--primary-soft); }
    .ip-linked-empty { font-size: 12px; color: var(--muted-3); font-style: italic; padding: 4px 0; }
    .ip-linked-story-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--rule); gap: 8px; }
    .ip-linked-story-row:last-of-type { border-bottom: none; }
    .ip-linked-story-info { flex: 1; min-width: 0; }
    .ip-linked-story-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .ip-linked-story-summary { font-size: 12px; color: var(--muted-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ip-linked-story-unlink {
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--muted-3);
      font-size: 11px;
      cursor: pointer;
      touch-action: manipulation;
      flex-shrink: 0;
      transition: color var(--duration-fast) var(--ease-out),
                  border-color var(--duration-fast) var(--ease-out);
    }
    .ip-linked-story-unlink:hover { border-color: #ef4444; color: #ef4444; }
    .ip-story-picker {
      position: relative;
      margin-top: 8px;
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-lg);
      max-height: 200px;
      overflow-y: auto;
    }
    [data-theme="dark"] .ip-story-picker { background: rgba(44,44,46,0.95); }
    .ip-story-picker-empty { padding: 12px; font-size: 12px; color: var(--muted-3); text-align: center; font-style: italic; }
    .ip-story-picker-item { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid var(--rule); transition: background var(--duration-fast) var(--ease-out); }
    .ip-story-picker-item:last-child { border-bottom: none; }
    .ip-story-picker-item:hover { background: var(--primary-soft); }
    .ip-story-picker-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .ip-story-picker-summary { font-size: 12px; color: var(--muted-3); }

    /* ── Workspace status select ── */
    .ip-ws-status-select {
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--rule);
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      touch-action: manipulation;
    }
    .ip-ws-status-select:focus { outline: none; border-color: var(--primary); }
    [data-theme="dark"] .ip-ws-status-select { background: rgba(255,255,255,0.08); }
    [data-theme="dark"] .ip-ws-status-select option { background: #2c2c2e; }

    /* ── Answer quality rubric ── */
    .ip-rubric { margin-top: 16px; border-top: 1px solid var(--rule); padding-top: 14px; }
    .ip-rubric-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .ip-rubric-score {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      font-family: var(--mono);
      background: rgba(37,99,235,0.10);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
    }
    [data-theme="dark"] .ip-rubric-score { background: rgba(79,142,247,0.16); }
    .ip-rubric-list { display: flex; flex-direction: column; gap: 7px; }
    .ip-rubric-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .ip-rubric-cb { width: 14px; height: 14px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
    .ip-rubric-label { font-size: 13px; color: var(--text); }
    .ip-rubric-label--done { color: var(--muted-3); text-decoration: line-through; }

    /* ── Global search overlay — spotlight style ── */
    .ip-search-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 400;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 80px;
    }
    .ip-search-overlay-inner {
      width: min(680px, 92vw);
      background: rgba(255,255,255,0.93);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.80);
      border-radius: var(--radius-xl);
      box-shadow: 0 32px 80px rgba(0,0,0,0.24), 0 1px 0 rgba(255,255,255,0.60);
      overflow: hidden;
    }
    [data-theme="dark"] .ip-search-overlay-inner {
      background: rgba(28,28,30,0.93);
      border-color: rgba(255,255,255,0.10);
      box-shadow: 0 32px 80px rgba(0,0,0,0.55);
    }
    .ip-search-bar-wrap { display: flex; align-items: center; border-bottom: 1px solid var(--rule); }
    .ip-search-global {
      flex: 1;
      padding: 16px 20px;
      border: none;
      background: transparent;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }
    .ip-search-global::placeholder { color: var(--muted-3); }
    .ip-search-close {
      padding: 16px 20px;
      background: transparent;
      border: none;
      color: var(--muted-3);
      font-size: 20px;
      cursor: pointer;

      transition: color var(--duration-fast) var(--ease-out);

    .ip-search-empty { padding: 20px; text-align: center; color: var(--muted-3); font-size: 14px; font-style: italic; }
    .ip-search-hint { padding: 20px; text-align: center; color: var(--muted-3); font-size: 13px; }
    .ip-search-section { padding: 8px 0; }
    .ip-search-section-label {
      padding: 6px 16px;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted-3);
      text-transform: uppercase;
      letter-spacing: 0.10em;
      font-family: var(--display);
    }
    .ip-search-result {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .ip-search-result:hover { background: var(--primary-soft); }
    .ip-search-result-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .ip-search-result-body { flex: 1; min-width: 0; }
    .ip-search-result-text { font-size: 13px; color: var(--text); line-height: 1.4; }
    .ip-search-result-meta { font-size: 11px; color: var(--muted-3); margin-top: 2px; }
    .ip-topbar-btn-sm {
      padding: 5px 8px;
      border-radius: var(--radius-base);
      border: none;
      background: transparent;
      color: var(--muted-3);
      font-size: 16px;
      cursor: pointer;
      touch-action: manipulation;
      transition: color var(--duration-fast) var(--ease-out);
    }
    .ip-topbar-btn-sm:hover { color: var(--text); }

    /* ── Progress view — glass section cards ── */
    .ip-progress-view { flex: 1; overflow-y: auto; padding: 24px; }
    .ip-progress-cols { display: flex; gap: 20px; flex-wrap: wrap; }
    .ip-progress-section {
      flex: 1;
      min-width: 280px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.80);
      border-radius: var(--radius-xl);
      padding: 22px 24px;
      box-shadow: var(--shadow-card);

    [data-theme="dark"] .ip-progress-section {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.10);
    }
    .ip-progress-section-title {
      font-size: 10px;

    .ip-conf-dist { display: flex; flex-direction: column; gap: 10px; }
    .ip-conf-dist-row { display: flex; align-items: center; gap: 10px; }

    .ip-conf-dist-bar-wrap {
      flex: 1;

      border-radius: var(--radius-pill);
      overflow: hidden;
    }
    .ip-conf-dist-bar {
      height: 100%;

      transition: width 0.5s var(--ease-out);
      min-width: 3px;
    }
    .ip-conf-dist-count { font-size: 12px; color: var(--muted-3); font-family: var(--mono); width: 28px; text-align: right; flex-shrink: 0; }
    .ip-cat-readiness { display: flex; flex-direction: column; gap: 14px; }
    .ip-cat-ready-row { display: flex; flex-direction: column; gap: 5px; }
    .ip-cat-ready-top { display: flex; align-items: center; gap: 6px; }
    .ip-cat-ready-name { font-size: 12px; color: var(--text); flex: 1; }
    .ip-cat-ready-frac { font-size: 11px; color: var(--muted-3); font-family: var(--mono); }
    .ip-cat-ready-pct { font-size: 11px; font-weight: 600; color: var(--muted-3); font-family: var(--mono); width: 34px; text-align: right; flex-shrink: 0; }
    .ip-cat-ready-bar-wrap {
      height: 6px;
      background: var(--rule);
      border-radius: var(--radius-pill);
      overflow: hidden;
    }
    .ip-cat-ready-bar {
      height: 100%;
      border-radius: var(--radius-pill);
      opacity: 0.80;
      transition: width 0.5s var(--ease-out);

    /* ── Mock interview ── */
    .ip-mock-setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 20px;

    .ip-mock-setup-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: var(--tracking-tight);

    .ip-mock-setup-desc {
      font-size: 14px;
      color: var(--muted-3);
      text-align: center;
      max-width: 480px;
      line-height: 1.6;
    }
    .ip-mock-field {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);

      border-radius: var(--radius-xl);
      padding: 18px 22px;

    [data-theme="dark"] .ip-mock-field {

    .ip-mock-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted-3);

    .ip-mock-options { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

      padding: 7px 18px;

      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-family: var(--serif);
      font-size: 13px;
      cursor: pointer;
      touch-action: manipulation;
      transition: all var(--duration-fast) var(--ease-out);
    }
    [data-theme="dark"] .ip-mock-opt { background: rgba(255,255,255,0.06); }
    .ip-mock-opt:hover { border-color: var(--primary); color: var(--primary); }
    .ip-mock-opt.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: var(--shadow-primary);
    }
    .ip-mock-actions { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .ip-mock-interview { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 24px 40px; }
    .ip-mock-progress-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 700px;
      padding: 16px 0;
    }
    .ip-mock-progress-center { display: flex; align-items: center; gap: 12px; }
    .ip-mock-timer {
      font-size: 72px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--primary);
      margin: 24px 0 12px;
      letter-spacing: -3px;
      line-height: 1;
      text-shadow: 0 4px 24px rgba(37,99,235,0.20);
      transition: color var(--duration-base) var(--ease-out),
                  text-shadow var(--duration-base) var(--ease-out);
    }
    [data-theme="dark"] .ip-mock-timer { text-shadow: 0 4px 24px rgba(79,142,247,0.28); }
    .ip-mock-timer--urgent {
      color: #ef4444;
      text-shadow: 0 4px 24px rgba(239,68,68,0.26);
    }
    .ip-mock-timer--done { color: var(--muted-3); text-shadow: none; }
    .ip-mock-question {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      max-width: 640px;
      line-height: 1.4;
      margin-bottom: 28px;
      letter-spacing: var(--tracking-tight);
    }
    .ip-mock-time-up { font-size: 13px; color: var(--muted-3); font-style: italic; margin-bottom: 16px; }
    .ip-mock-controls { margin-bottom: 16px; }
    .ip-mock-hint { font-size: 12px; color: var(--muted-3); font-style: italic; }
    .ip-mock-review { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .ip-mock-review-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--rule);
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    [data-theme="dark"] .ip-mock-review-header { background: rgba(28,28,30,0.62); }
    .ip-mock-review-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: var(--tracking-tight);
    }
    .ip-mock-review-sub { font-size: 13px; color: var(--muted-3); margin-top: 2px; font-family: var(--mono); }
    .ip-mock-review-list { flex: 1; overflow-y: auto; padding: 8px 24px; }
    .ip-mock-review-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--rule); }
    .ip-mock-review-row:last-child { border-bottom: none; }
    .ip-mock-review-q { display: flex; align-items: flex-start; gap: 10px; flex: 1; min-width: 0; }
    .ip-mock-review-num { font-size: 11px; font-weight: 600; color: var(--muted-3); font-family: var(--mono); width: 20px; flex-shrink: 0; padding-top: 3px; }
    .ip-mock-review-q-body { flex: 1; min-width: 0; }
    .ip-mock-review-cat { font-size: 11px; font-weight: 600; display: block; margin-bottom: 2px; }
    .ip-mock-review-q-text { font-size: 13px; color: var(--text); line-height: 1.4; }
    .ip-mock-review-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.58);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    [data-theme="dark"] .ip-mock-review-footer { background: rgba(28,28,30,0.58); }
    .ip-conf-btn--sel { outline: 2px solid rgba(255,255,255,0.72); outline-offset: -3px; }

    /* ── Story linked questions ── */
    .ip-story-linked-qs { margin-top: 20px; border-top: 1px solid var(--rule); padding-top: 14px; }
    .ip-story-linked-q-row { font-size: 12px; color: var(--muted-3); padding: 5px 0; border-bottom: 1px solid var(--rule); line-height: 1.4; }
    .ip-story-linked-q-row:last-child { border-bottom: none; }
    .ip-topbar-import-lbl { cursor: pointer; }

    /* ── Add-question form extras ── */
    .ip-add-q-extra { display: flex; gap: 6px; margin-top: 6px; }
    .ip-add-q-status-sel {
      padding: 4px 9px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--rule);
      background: rgba(255,255,255,0.62);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .ip-add-q-status-sel:focus { outline: none; border-color: var(--primary); }
    [data-theme="dark"] .ip-add-q-status-sel { background: rgba(255,255,255,0.06); }
    [data-theme="dark"] .ip-add-q-status-sel option { background: #2c2c2e; }
    .ip-add-q-tags-in {
      flex: 1;
      padding: 4px 9px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--rule);
      background: rgba(255,255,255,0.62);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
    }
    .ip-add-q-tags-in:focus { outline: none; border-color: var(--primary); }
    .ip-add-q-tags-in::placeholder { color: var(--muted-3); }

  </style>
</head>
<body>
  <div id="root"></div>
  <div id="errbox" style="display:none;position:fixed;top:0;left:0;right:0;background:#2A1A1A;color:#E07B6A;padding:14px 18px;font-family:monospace;font-size:12px;z-index:9999;border-bottom:2px solid #E07B6A;line-height:1.6;white-space:pre-wrap;max-height:60vh;overflow:auto"></div>
  <script>
    window.addEventListener('error', function(e) {
      var box = document.getElementById('errbox');
      box.style.display = 'block';
      box.textContent = 'ERROR: ' + (e.message || 'unknown') + '\n\nat ' + (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?') + (e.error && e.error.stack ? '\n\n' + e.error.stack : '');
    });
    window.addEventListener('unhandledrejection', function(e) {
      var box = document.getElementById('errbox');
      box.style.display = 'block';
      box.textContent = 'PROMISE REJECTION: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
    });
  </script>
