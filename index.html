<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0D0D0F" />
  <title>My Planning</title>
  <style>
    :root {
      --bg: #0D0D0F;
      --bg-card: #1F1C26;
      --bg-card-deep: #16151A;
      --bg-hover: #2A2630;
      --border: #2A2830;
      --rule: #2A2630;
      --col-divider: #3A3548;
      --gold: #C9A84C;
      --gold-dim: #9C8845;
      --teal: #7EB8A4;
      --violet: #A78BCA;
      --coral: #E07B6A;
      --text: #E8E0D0;
      --muted-1: #C8BFB0;
      --muted-2: #A09888;
      --muted-3: #7A7268;
      --muted-4: #5A5248;
      --serif: 'Georgia', 'Times New Roman', serif;
      --mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body { position: relative; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
    }
    body::after {
      content: ''; position: fixed; top: 0; left: 0; right: 0;
      height: 2px; z-index: 10;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .wrap, .wrap-wide {
      position: relative; z-index: 1;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .wrap { max-width: 820px; }
    .wrap-wide { max-width: 1500px; }
    .screen-pad-top { padding-top: 80px; }
    .screen-pad-top-sm { padding-top: 40px; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .eyebrow.danger { color: var(--coral); }
    h1.title {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 400;
      line-height: 1.05;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    h2.title {
      font-size: 28px;
      font-weight: 400;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    .rule {
      width: 60px; height: 1px;
      background: var(--gold);
      margin: 20px 0 28px;
    }
    p.lede {
      font-size: 15px;
      color: var(--muted-2);
      line-height: 1.8;
      max-width: 520px;
      margin: 0 0 40px;
      font-style: italic;
    }

    button { font-family: inherit; cursor: pointer; transition: all 0.15s ease; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      padding: 12px 28px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      font-size: 13px;
      letter-spacing: 0.1em;
    }
    .btn-primary:hover:not(:disabled) { background: #D9B85C; }
    .btn-secondary {
      padding: 12px 20px;
      background: transparent;
      color: var(--muted-2);
      border: 1px solid var(--border);
      font-size: 13px;
      letter-spacing: 0.05em;
    }
    .btn-secondary:hover { border-color: var(--muted-3); color: var(--text); }
    .btn-tertiary {
      padding: 8px 14px;
      background: transparent;
      color: var(--muted-3);
      border: none;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .btn-tertiary:hover { color: var(--muted-2); }

    .center { display: flex; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }

    .error-box {
      margin-top: 20px;
      padding: 14px 18px;
      background: #2A1A1A;
      border-left: 2px solid var(--coral);
      color: var(--coral);
      font-size: 13px;
      line-height: 1.6;
      font-family: var(--mono);
    }
    .info-box {
      margin-top: 32px;
      padding: 18px 22px;
      background: var(--bg-card);
      border-left: 2px solid var(--border);
      font-size: 12px;
      color: var(--muted-3);
      line-height: 1.9;
    }
    .info-box .info-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-4);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .pulse {
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
      display: inline-block;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ───────── CALENDAR HEADER ───────── */
    .cal-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }
    .cal-title-block { display: flex; flex-direction: column; min-width: 0; }
    .cal-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .cal-week-label {
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .cal-week-range {
      font-size: 12px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .cal-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .cal-nav-btn {
      width: 38px; height: 38px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 18px;
    }
    .cal-nav-btn:hover { border-color: var(--gold); color: var(--gold); }
    .cal-today-btn {
      padding: 0 16px; height: 38px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-2);
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    }
    .cal-today-btn:hover { border-color: var(--gold); color: var(--gold); }
    .cal-today-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201, 168, 76, 0.06);
    }
    .sync-pill {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 0.15em;
      color: var(--muted-4); text-transform: uppercase;
      font-family: var(--mono);
    }
    .sync-pill::before {
      content: ''; width: 5px; height: 5px;
      background: var(--teal); border-radius: 50%;
      box-shadow: 0 0 8px var(--teal);
    }
    .sync-pill.saving::before { background: var(--gold); animation: pulse 1.2s ease-in-out infinite; }
    .sync-pill.error::before { background: var(--coral); }

    /* ───────── WEEK GRID (desktop) ───────── */
    .week-grid {
      background: var(--bg-card);
      border-top: 1px solid var(--col-divider);
      overflow: hidden;
    }
    .week-grid-header {
      display: grid;
      grid-template-columns: 64px repeat(7, 1fr);
      border-bottom: 2px solid var(--col-divider);
      position: sticky; top: 0; z-index: 4;
      background: var(--bg-card-deep);
    }
    .time-gutter-header { border-right: 2px solid var(--col-divider); }
    .day-header {
      padding: 14px 8px;
      text-align: center;
      border-left: 2px solid var(--col-divider);
      cursor: pointer;
      transition: background 0.15s;
    }
    .day-header:hover { background: rgba(201, 168, 76, 0.06); }
    .day-header.today { background: rgba(201, 168, 76, 0.05); }
    .day-header-name {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--muted-1);
      text-transform: uppercase;
      font-weight: 600;
    }
    .day-header.today .day-header-name { color: var(--gold); }
    .day-header.weekend .day-header-name { color: var(--muted-3); }
    .day-header-date {
      font-size: 19px;
      color: var(--text);
      margin-top: 5px;
      font-variant-numeric: tabular-nums;
      font-family: var(--serif);
      font-weight: 500;
    }
    .day-header.today .day-header-date { color: var(--gold); font-weight: 600; }
    .day-header.weekend .day-header-date { color: var(--muted-2); }

    .week-grid-body {
      display: grid;
      grid-template-columns: 64px repeat(7, 1fr);
      position: relative;
    }
    .time-gutter {
      position: relative;
      border-right: 2px solid var(--col-divider);
    }
    .hour-label {
      position: absolute;
      right: 10px;
      font-size: 11px;
      color: var(--muted-1);
      font-family: var(--mono);
      font-weight: 600;
      letter-spacing: 0.04em;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .day-column {
      position: relative;
      border-left: 2px solid var(--col-divider);
      min-height: 100%;
    }
    .day-column.today { background: rgba(201, 168, 76, 0.025); }
    .day-column.weekend { background: rgba(0,0,0,0.18); }
    .hour-line {
      position: absolute; left: 0; right: 0;
      border-top: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .cal-item {
      position: absolute;
      border-radius: 3px;
      padding: 4px 7px 4px 9px;
      overflow: hidden;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.15s ease;
      font-family: var(--serif);
    }
    .cal-item:hover {
      filter: brightness(1.3);
      transform: translateX(1px);
    }
    .cal-item-title {
      color: var(--text);
      font-size: 12px;
      line-height: 1.3;
      overflow: hidden;
    }
    .cal-item:not(.tiny):not(.short) .cal-item-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .cal-item.short .cal-item-title,
    .cal-item.tiny .cal-item-title {
      white-space: nowrap; text-overflow: ellipsis;
    }
    .cal-item-time {
      font-size: 10px;
      color: var(--muted-1);
      font-family: var(--mono);
      letter-spacing: 0.04em;
      margin-bottom: 2px;
      white-space: nowrap; overflow: hidden;
      font-weight: 500;
    }
    .cal-item-note {
      font-size: 10px;
      color: var(--muted-2);
      font-style: italic;
      margin-top: 3px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cal-item-home-flag {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
      margin-left: 5px;
      vertical-align: middle;
    }
    .cal-item.tiny { padding: 2px 5px 2px 7px; }
    .cal-item.tiny .cal-item-time { display: none; }
    .cal-item.tiny .cal-item-note { display: none; }
    .cal-item.tiny .cal-item-title { font-size: 10px; }
    .cal-item.short .cal-item-note { display: none; }

    /* Day-view items can show more */
    .day-view .cal-item-title { font-size: 14px; line-height: 1.35; }
    .day-view .cal-item:not(.tiny):not(.short) .cal-item-title { -webkit-line-clamp: 3; }
    .day-view .cal-item-time { font-size: 11px; margin-bottom: 4px; }
    .day-view .cal-item-note { font-size: 12px; -webkit-line-clamp: 4; margin-top: 5px; }

    .now-line {
      position: absolute;
      left: 0; right: 0;
      height: 0;
      border-top: 1px solid var(--gold);
      pointer-events: none;
      z-index: 5;
      box-shadow: 0 0 8px rgba(201, 168, 76, 0.5);
    }
    .now-line::before {
      content: '';
      position: absolute;
      left: -4px; top: -3.5px;
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold);
    }

    /* Day view (single-column zoom) */
    .day-view-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-2);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: var(--serif);
      margin-bottom: 16px;
    }
    .day-view-back:hover { border-color: var(--gold); color: var(--gold); }
    .day-view .week-grid-header {
      grid-template-columns: 80px 1fr;
    }
    .day-view .week-grid-body {
      grid-template-columns: 80px 1fr;
    }
    .day-view .day-header { padding: 18px 8px; cursor: default; }
    .day-view .day-header:hover { background: transparent; }
    .day-view .day-header.today:hover { background: rgba(201, 168, 76, 0.05); }
    .day-view .day-header-name { font-size: 12px; }
    .day-view .day-header-date { font-size: 28px; margin-top: 6px; }
    .day-view .hour-label { right: 14px; font-size: 12px; }

    /* ───────── AGENDA (mobile) ───────── */
    .agenda-day-strip {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      margin-bottom: 24px;
      padding-bottom: 6px;
      scrollbar-width: none;
    }
    .agenda-day-strip::-webkit-scrollbar { display: none; }
    .agenda-day-chip {
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-3);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      gap: 4px;
      min-width: 56px;
      font-family: var(--serif);
    }
    .agenda-day-chip-name {
      font-size: 9px; letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted-3);
    }
    .agenda-day-chip-date {
      font-size: 16px;
      color: var(--muted-2);
      font-variant-numeric: tabular-nums;
    }
    .agenda-day-chip.today { border-color: var(--muted-3); }
    .agenda-day-chip.today .agenda-day-chip-name { color: var(--gold); }
    .agenda-day-chip.selected {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.06);
    }
    .agenda-day-chip.selected .agenda-day-chip-name { color: var(--gold); }
    .agenda-day-chip.selected .agenda-day-chip-date { color: var(--text); }

    .agenda-header {
      margin-bottom: 16px;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .agenda-day-title {
      font-size: 22px; font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .agenda-day-subtitle {
      font-size: 11px;
      color: var(--muted-3);
      font-family: var(--mono);
      letter-spacing: 0.1em;
    }

    .agenda-list { display: flex; flex-direction: column; gap: 3px; }
    .agenda-item {
      display: flex;
      align-items: stretch;
      background: var(--bg-card);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .agenda-item:hover { background: var(--bg-hover); }
    .agenda-item-stripe { width: 3px; flex-shrink: 0; }
    .agenda-item-time {
      width: 70px;
      padding: 14px 10px;
      flex-shrink: 0;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      letter-spacing: 0.05em;
      border-right: 1px solid var(--rule);
      display: flex; flex-direction: column; gap: 2px;
    }
    .agenda-item-time-end { color: var(--muted-4); font-size: 9px; }
    .agenda-item-content { padding: 14px 16px; flex: 1; min-width: 0; }
    .agenda-item-title {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }
    .agenda-item-meta {
      font-size: 11px;
      color: var(--muted-3);
      margin-top: 4px;
      font-style: italic;
      line-height: 1.5;
    }
    .agenda-item.past .agenda-item-time,
    .agenda-item.past .agenda-item-title,
    .agenda-item.past .agenda-item-meta { opacity: 0.4; }
    .agenda-item.now { background: rgba(201, 168, 76, 0.07); }
    .agenda-now-flag {
      position: absolute;
      right: 14px; top: 14px;
      font-size: 9px; letter-spacing: 0.25em;
      color: var(--gold);
      font-family: var(--mono);
    }
    .agenda-empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted-4);
      font-style: italic;
      font-size: 13px;
      background: var(--bg-card);
    }

    /* ───────── LEGEND + FOOTER ───────── */
    .legend {
      margin-top: 32px;
      padding: 16px 0;
      display: flex; flex-wrap: wrap;
      gap: 18px;
      border-top: 1px solid var(--rule);
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    .legend-swatch {
      width: 10px; height: 10px;
      background: rgba(255,255,255,0.05);
      border-left: 2px solid currentColor;
    }

    .raw {
      margin-top: 32px;
      background: var(--bg-card);
      border-left: 2px solid var(--border);
    }
    .raw summary {
      padding: 14px 20px;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--muted-3);
      text-transform: uppercase;
      list-style: none;
      user-select: none;
    }
    .raw summary::-webkit-details-marker { display: none; }
    .raw summary::before { content: '+ '; color: var(--muted-4); }
    .raw[open] summary::before { content: '− '; }
    .raw pre {
      margin: 0;
      padding: 0 20px 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted-3);
      overflow-x: auto;
      line-height: 1.6;
      max-height: 360px;
    }

    .footer {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-info {
      font-size: 10px;
      color: var(--muted-4);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    @media (max-width: 759px) {
      .wrap, .wrap-wide { padding: 0 18px 60px; }
      .screen-pad-top { padding-top: 50px; }
      .cal-header { gap: 12px; }
      .cal-week-label { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ═════════════════════════════════════════════════════════════
    // CONFIG
    // ═════════════════════════════════════════════════════════════
    const CLIENT_ID = '25894919429-pbtl8l6nn23vnvc8c8cbhg5f3n8gepu6.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
    const FILE_NAME = 'my-planning-data.json';
    const SCHEMA_VERSION = 2;

    // Days: JS Date.getDay() — 0=Sun, 1=Mon ... 6=Sat. Visual columns are Mon-first.
    const VISUAL_TO_JS_DAY = [1, 2, 3, 4, 5, 6, 0];
    const DAY_NAMES_SHORT = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const DAY_NAMES_LONG  = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

    const CATEGORY_STYLES = {
      supplement: { color: '#9C8845', label: 'Supplement', bgAlpha: 0.10 },
      focus:      { color: '#A78BCA', label: 'Focus',      bgAlpha: 0.13 },
      gym:        { color: '#7EB8A4', label: 'Physical',   bgAlpha: 0.13 },
      review:     { color: '#C9A84C', label: 'Review',     bgAlpha: 0.16 },
      planning:   { color: '#7A7268', label: 'Planning',   bgAlpha: 0.10 },
      prep:       { color: '#7A7268', label: 'Prep',       bgAlpha: 0.10 },
      elsewhere:  { color: '#E07B6A', label: 'Elsewhere',  bgAlpha: 0.10 },
      commute:    { color: '#B5896E', label: 'Commute',    bgAlpha: 0.10 },
      'micro-strength': { color: '#7EB8A4', label: 'Micro-strength', bgAlpha: 0.06 },

    // HELPERS
    // ═════════════════════════════════════════════════════════════
    function pad(n) { return String(n).padStart(2, '0'); }

    function startOfDay(d) {
      const x = new Date(d); x.setHours(0,0,0,0); return x;
    }
    function startOfWeek(d) {
      const x = startOfDay(d);
      const jsDay = x.getDay();
      const diff = jsDay === 0 ? -6 : 1 - jsDay; // Mon as week start
      x.setDate(x.getDate() + diff);
      return x;
    }
    function addDays(d, n) {
      const x = new Date(d); x.setDate(x.getDate() + n); return x;
    }
    function isSameDay(a, b) {
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }
    function toMinutes(hhmm) {
      const [h, m] = hhmm.split(':').map(Number);
      return h * 60 + m;
    }
    function formatDateShort(d) {
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }
    function formatRange(a, b) {
      const sameMonth = a.getMonth() === b.getMonth() && a.getFullYear() === b.getFullYear();
      if (sameMonth) {
        return `${a.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })} – ${b.getDate()}, ${b.getFullYear()}`;
      }
      return `${formatDateShort(a)} – ${formatDateShort(b)}, ${b.getFullYear()}`;
    }

    function hexToRgba(hex, alpha) {
      const h = hex.replace('#', '');
      const r = parseInt(h.substring(0, 2), 16);
      const g = parseInt(h.substring(2, 4), 16);
      const b = parseInt(h.substring(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // ─────────────────────────────────────────────────────────────
    // ROUTINE SELECTION + LANE LAYOUT
    // ─────────────────────────────────────────────────────────────
    function itemsForVisualColumn(visualCol, routine) {
      const jsDay = VISUAL_TO_JS_DAY[visualCol];
      return routine.filter(item =>
        item.days.includes(jsDay) && !item.recurrence
      );
    }

    function layoutDay(items) {
      const sorted = [...items].sort((a, b) => toMinutes(a.start) - toMinutes(b.start));
      const annotated = sorted.map(item => ({ ...item }));
      const lanes = [];
      annotated.forEach(item => {
        const itemStart = toMinutes(item.start);
        let placed = false;
        for (let li = 0; li < lanes.length; li++) {
          const last = lanes[li][lanes[li].length - 1];
          const lastEnd = toMinutes(last.start) + last.duration;
          if (itemStart >= lastEnd) {
            lanes[li].push(item);
            item._lane = li;
            placed = true;
            break;
          }
        }
        if (!placed) {
          lanes.push([item]);
          item._lane = lanes.length - 1;
        }
      });
      annotated.forEach(item => {
        const aStart = toMinutes(item.start);
        const aEnd = aStart + item.duration;
        let maxLane = item._lane;
        annotated.forEach(other => {
          if (other === item) return;
          const oStart = toMinutes(other.start);
          const oEnd = oStart + other.duration;
          if (oStart < aEnd && oEnd > aStart) {
            maxLane = Math.max(maxLane, other._lane);
          }
        });
        item._totalLanes = maxLane + 1;
      });
      return annotated;
    }

    // ═════════════════════════════════════════════════════════════
    // GOOGLE DRIVE LAYER
    // ═════════════════════════════════════════════════════════════
    let _tokenClient = null;
    let _accessToken = null;

    function waitForGoogle() {
      return new Promise((resolve) => {
        const check = () => {
          if (window.google && window.google.accounts && window.google.accounts.oauth2) resolve();
          else setTimeout(check, 80);
        };
        check();
      });
    }

    async function initAuth() {
      await waitForGoogle();
      _tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        callback: () => {},
      });
    }

    function requestToken({ silent }) {
      return new Promise((resolve, reject) => {
        if (!_tokenClient) return reject(new Error('Auth not initialized'));
        _tokenClient.callback = (resp) => {
          if (resp && resp.access_token) {
            _accessToken = resp.access_token;
            resolve(resp.access_token);
          } else {
            reject(new Error(resp && (resp.error_description || resp.error) || 'No token'));
          }
        };
        try {
          _tokenClient.requestAccessToken({ prompt: silent ? '' : 'consent' });
        } catch (e) { reject(e); }
      });
    }

    function revokeToken() {
      return new Promise((resolve) => {
        if (!_accessToken) return resolve();
        google.accounts.oauth2.revoke(_accessToken, () => {
          _accessToken = null;
          resolve();
        });
      });
    }

    async function driveFetch(url, options = {}) {
      const headers = { ...options.headers, Authorization: `Bearer ${_accessToken}` };
      const resp = await fetch(url, { ...options, headers });
      if (resp.status === 401) {
        await requestToken({ silent: true });
        return fetch(url, { ...options, headers: { ...options.headers, Authorization: `Bearer ${_accessToken}` } });
      }
      return resp;
    }

    async function findDataFile() {
      const url = `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name,modifiedTime)&q=name%3D'${encodeURIComponent(FILE_NAME)}'`;
      const resp = await driveFetch(url);
      if (!resp.ok) throw new Error(`Drive list failed (${resp.status})`);
      const json = await resp.json();
      return (json.files || []).find((f) => f.name === FILE_NAME) || null;
    }

    async function downloadFile(fileId) {
      const resp = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
      if (!resp.ok) throw new Error(`Drive download failed (${resp.status})`);
      return resp.json();
    }

    async function createFile(data) {
      const metadata = { name: FILE_NAME, parents: ['appDataFolder'] };
      const boundary = '-------314159265358979323846';
      const body =
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n` +
        JSON.stringify(metadata) + `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
        JSON.stringify(data) + `\r\n--${boundary}--`;
      const resp = await driveFetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime',
        { method: 'POST', headers: { 'Content-Type': `multipart/related; boundary=${boundary}` }, body }
      );
      if (!resp.ok) throw new Error(`Drive create failed (${resp.status})`);
      return resp.json();
    }

    async function updateFile(fileId, data) {
      const resp = await driveFetch(
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media&fields=id,modifiedTime`,
        { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }
      );
      if (!resp.ok) throw new Error(`Drive update failed (${resp.status})`);
      return resp.json();
    }

    // ═════════════════════════════════════════════════════════════
    // DEFAULT DATA + MIGRATION
    // ═════════════════════════════════════════════════════════════
    function makeDefaultData() {
      const now = new Date().toISOString();
      return {
        schemaVersion: SCHEMA_VERSION,
        createdAt: now,
        lastModified: now,
        routine: SEED_ROUTINE,
        overrides: {},
        calendars: { workIcs: '', householdIcs: '' },
        weeklyResets: [],
        projects: [],
        inbox: [],
        elsewhereToggles: { morning: false, afternoon: false, allDay: false, date: null },
      };
    }

    function migrate(data) {
      let changed = false;
      const next = { ...data };
      const prevVersion = next.schemaVersion || 0;
      if (prevVersion < SCHEMA_VERSION) { next.schemaVersion = SCHEMA_VERSION; changed = true; }
      // Re-seed routine when crossing into v2 (no edit feature exists yet, so user data won't be lost).
      // Once an edit UI lands, this branch goes away.
      if (prevVersion < 2) {
        next.routine = SEED_ROUTINE;
        changed = true;
      } else if (next.routine == null || (Array.isArray(next.routine) && next.routine.length === 0)) {
        next.routine = SEED_ROUTINE; changed = true;
      }
      if (!next.overrides) { next.overrides = {}; changed = true; }
      if (!next.calendars) { next.calendars = { workIcs: '', householdIcs: '' }; changed = true; }
      if (!next.weeklyResets) { next.weeklyResets = []; changed = true; }
      if (!next.projects) { next.projects = []; changed = true; }
      if (!next.inbox) { next.inbox = []; changed = true; }
      if (!next.elsewhereToggles) { next.elsewhereToggles = { morning: false, afternoon: false, allDay: false, date: null }; changed = true; }
      if ('testCounter' in next) { delete next.testCounter; changed = true; }
      return { data: next, migrated: changed };
    }

    // ═════════════════════════════════════════════════════════════
    // HOOKS
    // ═════════════════════════════════════════════════════════════
    function useMediaQuery(query) {
      const [matches, setMatches] = useState(() =>
        typeof window !== 'undefined' ? window.matchMedia(query).matches : false
      );
      useEffect(() => {
        const mm = window.matchMedia(query);
        const handler = (e) => setMatches(e.matches);
        mm.addEventListener('change', handler);
        return () => mm.removeEventListener('change', handler);
      }, [query]);
      return matches;
    }

    function useTickingClock(intervalMs = 60000) {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), intervalMs);
        return () => clearInterval(id);
      }, [intervalMs]);
      return now;
    }

    // ═════════════════════════════════════════════════════════════
    // APP ROOT
    // ═════════════════════════════════════════════════════════════
    function App() {
      const [phase, setPhase] = useState('booting');
      const [error, setError] = useState('');
      const [fileId, setFileId] = useState(null);
      const [data, setData] = useState(null);
      const [saving, setSaving] = useState(false);
      const [lastSyncedAt, setLastSyncedAt] = useState(null);

      const loadOrCreate = useCallback(async () => {
        setPhase('loading');
        try {
          const existing = await findDataFile();
          if (existing) {
            const content = await downloadFile(existing.id);
            const { data: migrated, migrated: didMigrate } = migrate(content);
            setFileId(existing.id);
            setData(migrated);
            setLastSyncedAt(new Date());
            if (didMigrate) {
              migrated.lastModified = new Date().toISOString();
              await updateFile(existing.id, migrated);
            }
          } else {
            const fresh = makeDefaultData();
            const created = await createFile(fresh);
            setFileId(created.id);
            setData(fresh);
            setLastSyncedAt(new Date());
          }
          setPhase('ready');
        } catch (e) {
          setError(`Load failed: ${e.message}`);
          setPhase('error');
        }
      }, []);

      useEffect(() => {
        (async () => {
          try {
            await initAuth();
            try {
              await requestToken({ silent: true });
              await loadOrCreate();
            } catch {
              setPhase('signin');
            }
          } catch (e) {
            setError(`Init failed: ${e.message}`);
            setPhase('error');
          }
        })();
      }, [loadOrCreate]);

      const handleSignIn = async () => {
        setError('');
        try {
          await requestToken({ silent: false });
          await loadOrCreate();
        } catch (e) {
          setError(`Sign-in failed: ${e.message}`);
          setPhase('signin');
        }
      };
      const handleSignOut = async () => {
        await revokeToken();
        setData(null);
        setFileId(null);
        setLastSyncedAt(null);
        setPhase('signin');
      };
      const handleReload = async () => {
        setError('');
        await loadOrCreate();
      };

      if (phase === 'booting')
        return <Centered><span className="pulse" /><span>Initializing</span></Centered>;
      if (phase === 'loading')
        return <Centered><span className="pulse" /><span>Syncing with Drive</span></Centered>;
      if (phase === 'error')
        return <ErrorScreen message={error} onRetry={() => setPhase('signin')} />;
      if (phase === 'signin')
        return <SignInScreen onSignIn={handleSignIn} error={error} />;
      return (
        <CalendarScreen
          data={data}
          saving={saving}
          lastSyncedAt={lastSyncedAt}
          error={error}
          onReload={handleReload}
          onSignOut={handleSignOut}
        />
      );
    }

    function Centered({ children }) {
      return (
        <div className="wrap center">
          <div style={{ color: 'var(--muted-3)', fontSize: 14, fontStyle: 'italic', letterSpacing: '0.05em' }}>

    // ═════════════════════════════════════════════════════════════
    // CALENDAR SCREEN
    // ═════════════════════════════════════════════════════════════
    function CalendarScreen({ data, saving, lastSyncedAt, error, onReload, onSignOut }) {
      const isMobile = useMediaQuery('(max-width: 759px)');
      const now = useTickingClock(60000);
      const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
      const [dayView, setDayView] = useState(null); // null = week view, 0..6 = visual column

      const weekEnd = addDays(weekStart, 6);
      const isCurrentWeek = isSameDay(weekStart, startOfWeek(now));

      const goPrev = () => {
        if (dayView !== null) {
          // Day view: shift one day. Crossing a week boundary shifts the week too.
          if (dayView === 0) {
            setWeekStart(addDays(weekStart, -7));
            setDayView(6);
          } else {
            setDayView(dayView - 1);
          }
        } else {
          setWeekStart(addDays(weekStart, -7));
        }
      };
      const goNext = () => {
        if (dayView !== null) {
          if (dayView === 6) {
            setWeekStart(addDays(weekStart, 7));
            setDayView(0);
          } else {
            setDayView(dayView + 1);
          }
        } else {
          setWeekStart(addDays(weekStart, 7));
        }
      };
      const goToday = () => {
        setWeekStart(startOfWeek(new Date()));
        if (dayView !== null) {
          const d = now.getDay();
          setDayView(d === 0 ? 6 : d - 1);
        }
      };

      const handleDayClick = (col) => {
        if (isMobile) return; // mobile already shows day-at-a-time
        if (dayView === col) setDayView(null);
        else setDayView(col);
      };

      return (
        <div className={`wrap-wide screen-pad-top-sm fade-in ${dayView !== null ? 'day-view' : ''}`}>
          <CalendarHeader
            weekStart={weekStart}
            weekEnd={weekEnd}
            isCurrentWeek={isCurrentWeek}
            dayView={dayView}
            onPrev={goPrev}
            onNext={goNext}
            onToday={goToday}
            saving={saving}
            error={error}
            lastSyncedAt={lastSyncedAt}
          />

          {dayView !== null && !isMobile && (
            <button className="day-view-back" onClick={() => setDayView(null)}>
              ← Back to week
            </button>
          )}

          {isMobile ? (
            <AgendaView routine={data.routine} weekStart={weekStart} now={now} />
          ) : (
            <WeekGrid
              routine={data.routine}
              weekStart={weekStart}
              now={now}
              singleCol={dayView}
              onDayClick={handleDayClick}
            />
          )}

          <Legend />

          <details className="raw">
            <summary>Diagnostics · raw data</summary>
            <pre>{JSON.stringify(data, null, 2)}</pre>
          </details>

          <div className="footer">
            <div className="footer-info">{FILE_NAME}</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn-tertiary" onClick={onReload}>↻ Reload</button>
              <button className="btn-tertiary" onClick={onSignOut}>Sign out</button>
            </div>
          </div>
        </div>
      );
    }

    function CalendarHeader({ weekStart, weekEnd, isCurrentWeek, dayView, onPrev, onNext, onToday, saving, error, lastSyncedAt }) {
      const synced = lastSyncedAt
        ? lastSyncedAt.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })
        : '—';
      const status = error ? 'error' : (saving ? 'saving' : '');
      const statusText = error ? 'Save error' : (saving ? 'Saving…' : `Synced ${synced}`);

      const isDayView = dayView !== null;
      const focusedDate = isDayView ? addDays(weekStart, dayView) : null;
      const focusedIsToday = isDayView && isSameDay(focusedDate, new Date());

      return (
        <div className="cal-header">
          <div className="cal-title-block">
            <div className="cal-eyebrow">My Planning</div>
            <div className="cal-week-label">
              {isDayView
                ? (focusedIsToday ? 'Today' : DAY_NAMES_LONG[dayView])
                : (isCurrentWeek ? 'This week' : `Week of ${formatDateShort(weekStart)}`)}
            </div>
            <div className="cal-week-range">
              {isDayView ? formatDateShort(focusedDate) + ', ' + focusedDate.getFullYear() : formatRange(weekStart, weekEnd)}
            </div>
          </div>
          <div className="cal-controls">
            <span className={`sync-pill ${status}`}>{statusText}</span>
            <div style={{ width: 12 }} />
            <button className="cal-nav-btn" onClick={onPrev} aria-label={isDayView ? 'Previous day' : 'Previous week'}>‹</button>
            <button
              className={`cal-today-btn ${(isDayView ? focusedIsToday : isCurrentWeek) ? 'active' : ''}`}
              onClick={onToday}
            >Today</button>
            <button className="cal-nav-btn" onClick={onNext} aria-label={isDayView ? 'Next day' : 'Next week'}>›</button>
          </div>
        </div>
      );
    }

    function Legend() {
      const keys = ['supplement', 'focus', 'gym', 'commute', 'review', 'planning', 'elsewhere'];
      return (
        <div className="legend">
          {keys.map(k => {
            const s = CATEGORY_STYLES[k];
            return (
              <div key={k} className="legend-item" style={{ color: s.color }}>
                <span className="legend-swatch" style={{ borderLeftColor: s.color }} />
                <span>{s.label}</span>
              </div>
            );
          })}
        </div>
      );
    }

    // ═════════════════════════════════════════════════════════════
    // WEEK GRID (desktop) — supports singleCol mode for day view
    // ═════════════════════════════════════════════════════════════
    const HOUR_HEIGHT_WEEK = 56;
    const HOUR_HEIGHT_DAY  = 80;
    const START_HOUR = 6;
    const END_HOUR = 23;
    const HOURS_VISIBLE = END_HOUR - START_HOUR;

    function WeekGrid({ routine, weekStart, now, singleCol, onDayClick }) {
      const isDayView = singleCol !== null && singleCol !== undefined;
      const HOUR_HEIGHT = isDayView ? HOUR_HEIGHT_DAY : HOUR_HEIGHT_WEEK;
      const totalHeight = HOURS_VISIBLE * HOUR_HEIGHT;
      const isCurrentWeek = isSameDay(weekStart, startOfWeek(now));

      const cols = isDayView ? [singleCol] : [0, 1, 2, 3, 4, 5, 6];

      return (
        <div className="week-grid">
          <div className="week-grid-header">
            <div className="time-gutter-header" />
            {cols.map(col => {
              const date = addDays(weekStart, col);
              const isToday = isCurrentWeek && isSameDay(date, now);
              const isWeekend = col === 5 || col === 6;
              return (
                <div
                  key={col}
                  className={`day-header ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}`}
                  onClick={() => onDayClick && onDayClick(col)}
                  title={isDayView ? 'Click to return to week view' : 'Click to zoom into this day'}
                >
                  <div className="day-header-name">{DAY_NAMES_SHORT[col]}</div>
                  <div className="day-header-date">{date.getDate()}</div>
                </div>
              );
            })}
          </div>

          <div className="week-grid-body" style={{ height: totalHeight }}>
            <div className="time-gutter">
              {Array.from({ length: HOURS_VISIBLE + 1 }, (_, i) => (
                <div
                  key={i}
                  className="hour-label"
                  style={{ top: i * HOUR_HEIGHT }}
                >{pad(START_HOUR + i)}:00</div>
              ))}
            </div>

            {cols.map(col => {
              const date = addDays(weekStart, col);
              const isToday = isCurrentWeek && isSameDay(date, now);
              const isWeekend = col === 5 || col === 6;
              const dayItems = layoutDay(itemsForVisualColumn(col, routine));

              return (
                <div key={col} className={`day-column ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}`}>
                  {Array.from({ length: HOURS_VISIBLE }, (_, i) => (
                    <div
                      key={i}
                      className="hour-line"
                      style={{ top: (i + 1) * HOUR_HEIGHT }}
                    />
                  ))}
                  {dayItems.map(item => <CalItem key={item.id} item={item} hourHeight={HOUR_HEIGHT} />)}
                  {isToday && <NowLine now={now} hourHeight={HOUR_HEIGHT} />}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function CalItem({ item, hourHeight }) {
      const style = CATEGORY_STYLES[item.category] || CATEGORY_STYLES.supplement;
      const startMin = toMinutes(item.start);
      const offsetMin = startMin - START_HOUR * 60;
      const top = (offsetMin / 60) * hourHeight;
      const rawHeight = (item.duration / 60) * hourHeight;
      const height = Math.max(rawHeight, 22);
      const isTiny = rawHeight < 26;
      const isShort = !isTiny && rawHeight < 50;

      const lane = item._lane || 0;
      const totalLanes = item._totalLanes || 1;
      const widthPct = 100 / totalLanes;
      const leftPct = widthPct * lane;

      const endMin = startMin + item.duration;
      const endStr = `${pad(Math.floor(endMin / 60))}:${pad(endMin % 60)}`;
      const tooltipParts = [
        `${item.title} · ${item.start}–${endStr}`,
        item.note,
        item.homeOnly ? '(home only)' : null,
      ].filter(Boolean);

      let cls = 'cal-item';
      if (isTiny) cls += ' tiny';
      else if (isShort) cls += ' short';

      return (
        <div
          className={cls}
          title={tooltipParts.join('\n')}
          style={{
            top,
            height,
            left: `calc(${leftPct}% + 2px)`,
            width: `calc(${widthPct}% - 4px)`,
            background: hexToRgba(style.color, style.bgAlpha),
            borderLeft: `3px solid ${style.color}`,
          }}
        >
          {!isTiny && (
            <div className="cal-item-time" style={{ color: style.color }}>{item.start}–{endStr}</div>
          )}
          <div className="cal-item-title">
            {item.title}
            {item.homeOnly && <span className="cal-item-home-flag" style={{ color: style.color }} />}
          </div>
          {item.note && !isTiny && !isShort && (
            <div className="cal-item-note">{item.note}</div>
          )}
        </div>
      );
    }

    function NowLine({ now, hourHeight }) {
      const min = now.getHours() * 60 + now.getMinutes();
      const offsetMin = min - START_HOUR * 60;
      if (offsetMin < 0 || offsetMin > HOURS_VISIBLE * 60) return null;
      const top = (offsetMin / 60) * hourHeight;
      return <div className="now-line" style={{ top }} />;
    }

    // ═════════════════════════════════════════════════════════════
    // AGENDA VIEW (mobile)
    // ═════════════════════════════════════════════════════════════
    function AgendaView({ routine, weekStart, now }) {
      const isCurrentWeek = isSameDay(weekStart, startOfWeek(now));
      const todayCol = isCurrentWeek
        ? (now.getDay() === 0 ? 6 : now.getDay() - 1)
        : 0;
      const [selectedCol, setSelectedCol] = useState(todayCol);

      useEffect(() => {
        setSelectedCol(isCurrentWeek ? todayCol : 0);
      }, [weekStart.getTime()]); // eslint-disable-line

      const date = addDays(weekStart, selectedCol);
      const isSelectedToday = isCurrentWeek && isSameDay(date, now);
      const sorted = [...itemsForVisualColumn(selectedCol, routine)]
        .sort((a, b) => toMinutes(a.start) - toMinutes(b.start));

      const nowMin = now.getHours() * 60 + now.getMinutes();

      return (
        <>
          <div className="agenda-day-strip">
            {Array.from({ length: 7 }, (_, col) => {
              const d = addDays(weekStart, col);
              const isToday = isCurrentWeek && isSameDay(d, now);
              const isSelected = col === selectedCol;
              return (
                <button
                  key={col}
                  className={`agenda-day-chip ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}`}
                  onClick={() => setSelectedCol(col)}
                >
                  <span className="agenda-day-chip-name">{DAY_NAMES_SHORT[col]}</span>
                  <span className="agenda-day-chip-date">{d.getDate()}</span>
                </button>
              );
            })}
          </div>

          <div className="agenda-header">
            <div className="agenda-day-title">{DAY_NAMES_LONG[selectedCol]}</div>
            <div className="agenda-day-subtitle">{formatDateShort(date)}</div>
          </div>

          {sorted.length === 0 ? (
            <div className="agenda-empty">No routine items on this day yet.</div>
          ) : (
            <div className="agenda-list">
              {sorted.map(item => {
                const style = CATEGORY_STYLES[item.category] || CATEGORY_STYLES.supplement;
                const startMin = toMinutes(item.start);
                const endMin = startMin + item.duration;
                const endStr = `${pad(Math.floor(endMin / 60))}:${pad(endMin % 60)}`;
                let stateClass = '';
                if (isSelectedToday) {
                  if (endMin < nowMin) stateClass = 'past';
                  else if (startMin <= nowMin && endMin >= nowMin) stateClass = 'now';
                }
                return (
                  <div key={item.id} className={`agenda-item ${stateClass}`}>
                    <div className="agenda-item-stripe" style={{ background: style.color }} />
                    <div className="agenda-item-time">
                      <span>{item.start}</span>
                      {item.duration >= 15 && <span className="agenda-item-time-end">→ {endStr}</span>}
                    </div>
                    <div className="agenda-item-content">
                      <div className="agenda-item-title">
                        {item.title}
                        {item.homeOnly && (
                          <span style={{ color: style.color, marginLeft: 8, fontSize: 9, letterSpacing: '0.15em', fontFamily: 'var(--mono)', opacity: 0.7 }}>HOME</span>
                        )}
                      </div>
                      {item.note && <div className="agenda-item-meta">{item.note}</div>}
                    </div>
                    {stateClass === 'now' && <span className="agenda-now-flag">NOW</span>}
                  </div>
                );
              })}
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
