<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0D0D0F" />
  <title>My Planning</title>
  <style>
    :root {
      --bg: #0D0D0F;
      --bg-card: #16151A;
      --border: #2A2830;
      --rule: #1E1C24;
      --gold: #C9A84C;
      --teal: #7EB8A4;
      --violet: #A78BCA;
      --coral: #E07B6A;
      --text: #E8E0D0;
      --muted-1: #C8BFB0;
      --muted-2: #A09888;
      --muted-3: #7A7268;
      --muted-4: #5A5248;
      --serif: 'Georgia', 'Times New Roman', serif;
      --mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body {
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
    }
    body::after {
      content: '';
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px; z-index: 10;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .wrap {
      position: relative; z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .screen-pad-top { padding-top: 80px; }
    .screen-pad-top-sm { padding-top: 60px; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .eyebrow.muted { color: var(--muted-4); }
    .eyebrow.danger { color: var(--coral); }
    h1.title {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 400;
      line-height: 1.05;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    h2.title {
      font-size: 28px;
      font-weight: 400;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    .rule {
      width: 60px; height: 1px;
      background: var(--gold);
      margin: 20px 0 28px;
    }
    p.lede {
      font-size: 15px;
      color: var(--muted-2);
      line-height: 1.8;
      max-width: 520px;
      margin: 0 0 40px;
      font-style: italic;
    }
    p.lede.small { font-size: 14px; }

    button {
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-primary {
      padding: 12px 28px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      font-size: 13px;
      letter-spacing: 0.1em;
    }
    .btn-primary:hover:not(:disabled) {
      background: #D9B85C;
    }
    .btn-secondary {
      padding: 12px 20px;
      background: transparent;
      color: var(--muted-2);
      border: 1px solid var(--border);
      font-size: 13px;
      letter-spacing: 0.05em;
    }
    .btn-secondary:hover {
      border-color: var(--muted-3);
      color: var(--text);
    }
    .btn-tertiary {
      padding: 8px 14px;
      background: transparent;
      color: var(--muted-3);
      border: none;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .btn-tertiary:hover {
      color: var(--muted-2);
    }

    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    .card {
      background: var(--bg-card);
      border-top: 2px solid var(--gold);
      padding: 28px 32px;
      margin: 24px 0;
    }
    .card-label {
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .counter {
      font-size: 96px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text);
      margin: 8px 0 24px;
      font-variant-numeric: tabular-nums;
    }
    .card-meta {
      font-size: 12px;
      color: var(--muted-3);
      line-height: 1.8;
      margin-bottom: 20px;
      font-style: italic;
    }
    .card-meta strong {
      color: var(--gold);
      font-style: normal;
      font-family: var(--mono);
      font-weight: normal;
    }

    .raw {
      margin-top: 32px;
      background: var(--bg-card);
      border-left: 2px solid var(--border);
    }
    .raw summary {
      padding: 14px 20px;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--muted-3);
      text-transform: uppercase;
      list-style: none;
      user-select: none;
    }
    .raw summary::-webkit-details-marker { display: none; }
    .raw summary::before {
      content: '+ ';
      color: var(--muted-4);
    }
    .raw[open] summary::before { content: '− '; }
    .raw pre {
      margin: 0;
      padding: 0 20px 20px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      overflow-x: auto;
      line-height: 1.6;
    }

    .footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-info {
      font-size: 11px;
      color: var(--muted-4);
      letter-spacing: 0.1em;
    }

    .center { display: flex; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }

    .error-box {
      margin-top: 20px;
      padding: 14px 18px;
      background: #2A1A1A;
      border-left: 2px solid var(--coral);
      color: var(--coral);
      font-size: 13px;
      line-height: 1.6;
      font-family: var(--mono);
    }
    .info-box {
      margin-top: 32px;
      padding: 18px 22px;
      background: var(--bg-card);
      border-left: 2px solid var(--border);
      font-size: 12px;
      color: var(--muted-3);
      line-height: 1.9;
    }
    .info-box .info-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted-4);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .pulse {
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
      display: inline-block;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .fade-in {
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .wrap { padding: 0 20px 60px; }
      .screen-pad-top { padding-top: 60px; }
      .card { padding: 24px 22px; }
      .counter { font-size: 72px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─────────────────────────────────────────────────────────────
    // CONFIG
    // ─────────────────────────────────────────────────────────────
    const CLIENT_ID = '25894919429-pbtl8l6nn23vnvc8c8cbhg5f3n8gepu6.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
    const FILE_NAME = 'my-planning-data.json';
    const SCHEMA_VERSION = 1;

    // Default data structure — V1 features will populate these later.
    function makeDefaultData() {
      const now = new Date().toISOString();
      return {
        schemaVersion: SCHEMA_VERSION,
        createdAt: now,
        lastModified: now,
        // Skeleton verification field. Will be removed in V1 build.
        testCounter: 0,
        // V1 placeholders — empty for now:
        routine: null,
        overrides: {},
        calendars: { workIcs: '', householdIcs: '' },
        weeklyResets: [],
        projects: [],
        inbox: [],
        elsewhereToggles: { morning: false, afternoon: false, allDay: false, date: null },
      };
    }

    // ─────────────────────────────────────────────────────────────
    // GOOGLE DRIVE LAYER
    // ─────────────────────────────────────────────────────────────
    let _tokenClient = null;
    let _accessToken = null;

    function waitForGoogle() {
      return new Promise((resolve) => {
        const check = () => {
          if (window.google && window.google.accounts && window.google.accounts.oauth2) {
            resolve();
          } else {
            setTimeout(check, 80);
          }
        };
        check();
      });
    }

    async function initAuth() {
      await waitForGoogle();
      _tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        callback: () => {}, // overridden per-call
      });
    }

    function requestToken({ silent }) {
      return new Promise((resolve, reject) => {
        if (!_tokenClient) return reject(new Error('Auth not initialized'));
        _tokenClient.callback = (resp) => {
          if (resp && resp.access_token) {
            _accessToken = resp.access_token;
            resolve(resp.access_token);
          } else {
            reject(new Error(resp && resp.error_description || resp && resp.error || 'No token'));
          }
        };
        try {
          _tokenClient.requestAccessToken({ prompt: silent ? '' : 'consent' });
        } catch (e) {
          reject(e);
        }
      });
    }

    function revokeToken() {
      return new Promise((resolve) => {
        if (!_accessToken) return resolve();
        google.accounts.oauth2.revoke(_accessToken, () => {
          _accessToken = null;
          resolve();
        });
      });
    }

    async function driveFetch(url, options = {}) {
      const headers = {
        ...options.headers,
        Authorization: `Bearer ${_accessToken}`,
      };
      const resp = await fetch(url, { ...options, headers });
      if (resp.status === 401) {
        // Token expired — request a fresh one silently and retry once.
        await requestToken({ silent: true });
        return fetch(url, { ...options, headers: { ...options.headers, Authorization: `Bearer ${_accessToken}` } });
      }
      return resp;
    }

    async function findDataFile() {
      const url = `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name,modifiedTime)&q=name%3D'${encodeURIComponent(FILE_NAME)}'`;
      const resp = await driveFetch(url);
      if (!resp.ok) throw new Error(`Drive list failed (${resp.status})`);
      const json = await resp.json();
      return (json.files || []).find((f) => f.name === FILE_NAME) || null;
    }

    async function downloadFile(fileId) {
      const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
      const resp = await driveFetch(url);
      if (!resp.ok) throw new Error(`Drive download failed (${resp.status})`);
      return resp.json();
    }

    async function createFile(data) {
      const metadata = { name: FILE_NAME, parents: ['appDataFolder'] };
      const boundary = '-------314159265358979323846';
      const body =
        `--${boundary}\r\n` +
        `Content-Type: application/json; charset=UTF-8\r\n\r\n` +
        JSON.stringify(metadata) + `\r\n` +
        `--${boundary}\r\n` +
        `Content-Type: application/json\r\n\r\n` +
        JSON.stringify(data) + `\r\n` +
        `--${boundary}--`;
      const resp = await driveFetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime',
        {
          method: 'POST',
          headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
          body,
        }
      );
      if (!resp.ok) throw new Error(`Drive create failed (${resp.status})`);
      return resp.json();
    }

    async function updateFile(fileId, data) {
      const resp = await driveFetch(
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media&fields=id,modifiedTime`,
        {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        }
      );
      if (!resp.ok) throw new Error(`Drive update failed (${resp.status})`);
      return resp.json();
    }

    // ─────────────────────────────────────────────────────────────
    // APP
    // ─────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState('booting'); // booting | signin | loading | ready | error
      const [error, setError] = useState('');
      const [fileId, setFileId] = useState(null);
      const [data, setData] = useState(null);
      const [saving, setSaving] = useState(false);
      const [lastSyncedAt, setLastSyncedAt] = useState(null);

      // Boot: wait for GIS, init token client, attempt silent sign-in.
      useEffect(() => {
        (async () => {
          try {
            await initAuth();
            // Try silent first. If it fails, surface the sign-in screen.
            try {
              await requestToken({ silent: true });
              await loadOrCreate();
            } catch {
              setPhase('signin');
            }
          } catch (e) {
            setError(`Init failed: ${e.message}`);
            setPhase('error');
          }
        })();
      }, []);

      const loadOrCreate = useCallback(async () => {
        setPhase('loading');
        try {
          const existing = await findDataFile();
          if (existing) {
            const content = await downloadFile(existing.id);
            setFileId(existing.id);
            setData(content);
            setLastSyncedAt(new Date());
          } else {
            const fresh = makeDefaultData();
            const created = await createFile(fresh);
            setFileId(created.id);
            setData(fresh);
            setLastSyncedAt(new Date());
          }
          setPhase('ready');
        } catch (e) {
          setError(`Load failed: ${e.message}`);
          setPhase('error');
        }
      }, []);

      const handleSignIn = async () => {
        setError('');
        try {
          await requestToken({ silent: false });
          await loadOrCreate();
        } catch (e) {
          setError(`Sign-in failed: ${e.message}`);
          setPhase('signin');
        }
      };

      const handleSignOut = async () => {
        await revokeToken();
        setData(null);
        setFileId(null);
        setLastSyncedAt(null);
        setPhase('signin');
      };

      const persist = async (next) => {
        setSaving(true);
        setError('');
        try {
          await updateFile(fileId, next);
          setData(next);
          setLastSyncedAt(new Date());
        } catch (e) {
          setError(`Save failed: ${e.message}`);
        } finally {
          setSaving(false);
        }
      };

      const handleIncrement = () => {
        const next = {
          ...data,
          testCounter: (data.testCounter || 0) + 1,
          lastModified: new Date().toISOString(),
        };
        persist(next);
      };

      const handleReload = async () => {
        setError('');
        await loadOrCreate();
      };

      // ── render ──
      if (phase === 'booting') {
        return <Centered><span className="pulse" /><span>Initializing</span></Centered>;
      }
      if (phase === 'loading') {
        return <Centered><span className="pulse" /><span>Syncing with Drive</span></Centered>;
      }
      if (phase === 'error') {
        return <ErrorScreen message={error} onRetry={() => setPhase('signin')} />;
      }
      if (phase === 'signin') {
        return <SignInScreen onSignIn={handleSignIn} error={error} />;
      }
      return (
        <SkeletonHome
          data={data}
          saving={saving}
          lastSyncedAt={lastSyncedAt}
          error={error}
          onIncrement={handleIncrement}
          onReload={handleReload}
          onSignOut={handleSignOut}
        />
      );
    }

    function Centered({ children }) {
      return (
        <div className="wrap center">
          <div style={{ color: 'var(--muted-3)', fontSize: 14, fontStyle: 'italic', letterSpacing: '0.05em' }}>
            {children}
          </div>
        </div>
      );
    }

    function SignInScreen({ onSignIn, error }) {
      return (
        <div className="wrap screen-pad-top fade-in">
          <div className="eyebrow">Executive Performance System</div>
          <h1 className="title">My Planning</h1>
          <div className="rule" />
          <p className="lede">
            One source of truth across every device.<br />
            Your routine, your calendars, your reflections —<br />
            stored privately in your own Google Drive.
          </p>
          <button className="btn-primary" onClick={onSignIn}>
            Sign in with Google →
          </button>
          {error && <div className="error-box">{error}</div>}
          <div className="info-box">
            <div className="info-label">How storage works</div>
            One JSON file, hidden in your Drive's app folder.<br />
            Only this app can see it. Sign in on any device — same data appears.<br />
            Sign out and revoke any time from your Google account permissions.
          </div>
        </div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <div className="wrap screen-pad-top fade-in">
          <div className="eyebrow danger">Something went wrong</div>
          <h2 className="title">Hmm.</h2>
          <div className="rule" />
          <div className="error-box">{message}</div>
          <div style={{ marginTop: 24 }}>
            <button className="btn-primary" onClick={onRetry}>Try again</button>
          </div>
          <div className="info-box">
            <div className="info-label">Common causes</div>
            • Pop-up blocker preventing the Google sign-in window<br />
            • Network issue or Drive API rate limit<br />
            • Your email isn't on the test users list in Google Cloud<br />
            • Token expired — signing in again should fix it
          </div>
        </div>
      );
    }

    function SkeletonHome({ data, saving, lastSyncedAt, error, onIncrement, onReload, onSignOut }) {
      const synced = lastSyncedAt ? lastSyncedAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '—';
      return (
        <div className="wrap screen-pad-top fade-in">
          <div className="eyebrow">Sync verification · v0</div>
          <h1 className="title">My Planning</h1>
          <div className="rule" />
          <p className="lede small">
            Skeleton phase. Once we confirm cross-device sync works on this device<br />
            and your phone, the six V1 features come next.
          </p>

          <div className="card">
            <div className="card-label">Test counter</div>
            <div className="counter">{data.testCounter || 0}</div>
            <div className="card-meta">
              Increment on this device, open the app on another, hit <strong>Reload</strong> — the number should match.<br />
              Last synced: <strong>{synced}</strong>
            </div>
            <div className="row">
              <button className="btn-primary" disabled={saving} onClick={onIncrement}>
                {saving ? 'Saving…' : 'Increment'}
              </button>
              <button className="btn-secondary" disabled={saving} onClick={onReload}>
                Reload from Drive
              </button>
            </div>
            {error && <div className="error-box">{error}</div>}
          </div>

          <details className="raw">
            <summary>Raw data file</summary>
            <pre>{JSON.stringify(data, null, 2)}</pre>
          </details>

          <div className="footer">
            <div className="footer-info">{FILE_NAME}</div>
            <button className="btn-tertiary" onClick={onSignOut}>Sign out</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
