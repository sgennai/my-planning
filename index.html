    // ═════════════════════════════════════════════════════════════
    // HELPERS
    // ═════════════════════════════════════════════════════════════
    function pad(n) { return String(n).padStart(2, '0'); }

    function startOfDay(d) {
      const x = new Date(d); x.setHours(0,0,0,0); return x;
    }
    function startOfWeek(d) {
      const x = startOfDay(d);
      const jsDay = x.getDay();
      const diff = jsDay === 0 ? -6 : 1 - jsDay; // Mon as week start
      x.setDate(x.getDate() + diff);
      return x;
    }
    function addDays(d, n) {
      const x = new Date(d); x.setDate(x.getDate() + n); return x;
    }
    function isSameDay(a, b) {
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }
    function toMinutes(hhmm) {
      const [h, m] = hhmm.split(':').map(Number);
      return h * 60 + m;
    }
    function formatDateShort(d) {
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }
    function formatRange(a, b) {
      const sameMonth = a.getMonth() === b.getMonth() && a.getFullYear() === b.getFullYear();
      if (sameMonth) {
        return `${a.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })} – ${b.getDate()}, ${b.getFullYear()}`;
      }
      return `${formatDateShort(a)} – ${formatDateShort(b)}, ${b.getFullYear()}`;
    }

    function hexToRgba(hex, alpha) {
      const h = hex.replace('#', '');
      const r = parseInt(h.substring(0, 2), 16);
      const g = parseInt(h.substring(2, 4), 16);
      const b = parseInt(h.substring(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // ─────────────────────────────────────────────────────────────
    // ROUTINE SELECTION + LANE LAYOUT
    // ─────────────────────────────────────────────────────────────
    function itemsForVisualColumn(visualCol, routine) {
      const jsDay = VISUAL_TO_JS_DAY[visualCol];
      return routine.filter(item =>
        item.days.includes(jsDay) && !item.recurrence
      );
    }

    function layoutDay(items) {
      const sorted = [...items].sort((a, b) => toMinutes(a.start) - toMinutes(b.start));
      const annotated = sorted.map(item => ({ ...item }));
      const lanes = [];
      annotated.forEach(item => {
        const itemStart = toMinutes(item.start);
        let placed = false;
        for (let li = 0; li < lanes.length; li++) {
          const last = lanes[li][lanes[li].length - 1];
          const lastEnd = toMinutes(last.start) + last.duration;
          if (itemStart >= lastEnd) {
            lanes[li].push(item);
            item._lane = li;
            placed = true;
            break;
          }
        }
        if (!placed) {
          lanes.push([item]);
          item._lane = lanes.length - 1;
        }
      });
      annotated.forEach(item => {
        const aStart = toMinutes(item.start);
        const aEnd = aStart + item.duration;
        let maxLane = item._lane;
        annotated.forEach(other => {
          if (other === item) return;
          const oStart = toMinutes(other.start);
          const oEnd = oStart + other.duration;
          if (oStart < aEnd && oEnd > aStart) {
            maxLane = Math.max(maxLane, other._lane);
          }
        });
        item._totalLanes = maxLane + 1;
      });
      return annotated;
    }

    // ─────────────────────────────────────────────────────────────
    // SCHEDULED BLOCKS — date matching, week filtering, layout combining
    // ─────────────────────────────────────────────────────────────
    function blocksForDate(blocks, date) {
      const dateKey = startOfDay(date).getTime();
      return blocks.filter(b => {
        if (b.status === 'skipped') return false;
        const d = new Date(b.date);
        return startOfDay(d).getTime() === dateKey;
      });
    }

    function blocksForWeek(blocks, weekStart) {
      const start = startOfDay(weekStart).getTime();
      const end = startOfDay(addDays(weekStart, 7)).getTime();
      return blocks.filter(b => {
        if (b.status === 'skipped') return false;
        const t = new Date(b.date).getTime();
        return t >= start && t < end;
      });
    }

    // Total minutes for a given project this week (only counts scheduled + partial,
    // not completed — once done it's "spent" not "scheduled").
    function plannedMinutesForProject(blocks, weekStart, projectId) {
      return blocksForWeek(blocks, weekStart)
        .filter(b => b.projectId === projectId && b.status !== 'completed')
        .reduce((sum, b) => sum + (b.duration || 0), 0);
    }

    function spentMinutesForProject(blocks, weekStart, projectId) {
      return blocksForWeek(blocks, weekStart)
        .filter(b => b.projectId === projectId && (b.status === 'completed' || b.status === 'partial'))
        .reduce((sum, b) => sum + (b.actualMinutes || 0), 0);
    }

    // Combine routine items + project blocks for a single day, then run lane allocation.
    function combinedDayItems(visualCol, routine, blocks, weekStart) {
      const date = addDays(weekStart, visualCol);
      const routineItems = itemsForVisualColumn(visualCol, routine).map(it => ({
        ...it, _kind: 'routine',
      }));
      const blockItems = blocksForDate(blocks, date).map(b => ({
        id: b.id,
        title: b.title,
        start: b.start,
        duration: b.duration,
        category: 'project-block',
        _kind: 'block',
        _block: b,
      }));
      return layoutDay([...routineItems, ...blockItems]);
    }

    // Get the set of action IDs that are currently scheduled or completed
    // (so the chip can show as scheduled and avoid duplicate scheduling).
    function actionStateMap(blocks) {
      const map = {};
      blocks.forEach(b => {
        if (!b.actionId) return;
        if (b.status === 'skipped') return;
        // 'completed' wins over 'scheduled' wins over 'partial'
        const cur = map[b.actionId];
        const rank = { partial: 1, scheduled: 2, completed: 3 };
        if (!cur || rank[b.status] > rank[cur.status]) {
          map[b.actionId] = { status: b.status, blockId: b.id, duration: b.duration };
        }
      });
      return map;
    }

    // ═════════════════════════════════════════════════════════════
    // GOOGLE DRIVE LAYER
    // ═════════════════════════════════════════════════════════════
    let _tokenClient = null;
    let _accessToken = null;

    function waitForGoogle() {
      return new Promise((resolve) => {
        const check = () => {
          if (window.google && window.google.accounts && window.google.accounts.oauth2) resolve();
          else setTimeout(check, 80);
        };
        check();
      });
    }

    async function initAuth() {
      await waitForGoogle();
      _tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        callback: () => {},
      });
    }

    function requestToken({ silent }) {
      return new Promise((resolve, reject) => {
        if (!_tokenClient) return reject(new Error('Auth not initialized'));
        _tokenClient.callback = (resp) => {
          if (resp && resp.access_token) {
            _accessToken = resp.access_token;
            resolve(resp.access_token);
          } else {
            reject(new Error(resp && (resp.error_description || resp.error) || 'No token'));
          }
        };
        try {
          _tokenClient.requestAccessToken({ prompt: silent ? '' : 'consent' });
        } catch (e) { reject(e); }
      });
    }

    function revokeToken() {
      return new Promise((resolve) => {
        if (!_accessToken) return resolve();
        google.accounts.oauth2.revoke(_accessToken, () => {
          _accessToken = null;
          resolve();
        });
      });
    }

    async function driveFetch(url, options = {}) {
      const headers = { ...options.headers, Authorization: `Bearer ${_accessToken}` };
      const resp = await fetch(url, { ...options, headers });
      if (resp.status === 401) {
        await requestToken({ silent: true });
        return fetch(url, { ...options, headers: { ...options.headers, Authorization: `Bearer ${_accessToken}` } });
      }
      return resp;
    }

    async function findDataFile() {
      const url = `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name,modifiedTime)&q=name%3D'${encodeURIComponent(FILE_NAME)}'`;
      const resp = await driveFetch(url);
      if (!resp.ok) throw new Error(`Drive list failed (${resp.status})`);
      const json = await resp.json();
      return (json.files || []).find((f) => f.name === FILE_NAME) || null;
    }

    async function downloadFile(fileId) {
      const resp = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
      if (!resp.ok) throw new Error(`Drive download failed (${resp.status})`);
      return resp.json();
    }

    async function createFile(data) {
      const metadata = { name: FILE_NAME, parents: ['appDataFolder'] };
      const boundary = '-------314159265358979323846';
      const body =
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n` +
        JSON.stringify(metadata) + `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
        JSON.stringify(data) + `\r\n--${boundary}--`;
      const resp = await driveFetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime',
        { method: 'POST', headers: { 'Content-Type': `multipart/related; boundary=${boundary}` }, body }
      );
      if (!resp.ok) throw new Error(`Drive create failed (${resp.status})`);
      return resp.json();
    }

    async function updateFile(fileId, data) {
      const resp = await driveFetch(
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media&fields=id,modifiedTime`,
        { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }
      );
      if (!resp.ok) throw new Error(`Drive update failed (${resp.status})`);
      return resp.json();
    }

    // ═════════════════════════════════════════════════════════════
    // DEFAULT DATA + MIGRATION
    // ═════════════════════════════════════════════════════════════
    function makeDefaultData() {
      const now = new Date().toISOString();
      return {
        schemaVersion: SCHEMA_VERSION,
        createdAt: now,
        lastModified: now,
        routine: SEED_ROUTINE,
        overrides: {},
        calendars: { workIcs: '', householdIcs: '' },
        weeklyResets: [],
        projects: SEED_PROJECTS,
        scheduledBlocks: [],
        inbox: [],
        elsewhereToggles: { morning: false, afternoon: false, allDay: false, date: null },
      };
    }

    function migrate(data) {
      let changed = false;
      const next = { ...data };
      const prevVersion = next.schemaVersion || 0;
      if (prevVersion < SCHEMA_VERSION) { next.schemaVersion = SCHEMA_VERSION; changed = true; }
      // v2: re-seed routine
      if (prevVersion < 2) { next.routine = SEED_ROUTINE; changed = true; }
      else if (next.routine == null || (Array.isArray(next.routine) && next.routine.length === 0)) {
        next.routine = SEED_ROUTINE; changed = true;
      }
      // v3: seed projects + scheduledBlocks (no edit feature yet, safe to overwrite)
      if (prevVersion < 3) {
        next.projects = SEED_PROJECTS;
        next.scheduledBlocks = next.scheduledBlocks || [];
        changed = true;
      } else if (!Array.isArray(next.projects) || next.projects.length === 0) {
        next.projects = SEED_PROJECTS; changed = true;
      }
      if (!Array.isArray(next.scheduledBlocks)) { next.scheduledBlocks = []; changed = true; }
      if (!next.overrides) { next.overrides = {}; changed = true; }
      if (!next.calendars) { next.calendars = { workIcs: '', householdIcs: '' }; changed = true; }
      if (!next.weeklyResets) { next.weeklyResets = []; changed = true; }
      if (!next.inbox) { next.inbox = []; changed = true; }
      if (!next.elsewhereToggles) { next.elsewhereToggles = { morning: false, afternoon: false, allDay: false, date: null }; changed = true; }
      if ('testCounter' in next) { delete next.testCounter; changed = true; }
      return { data: next, migrated: changed };
    }

    // ═════════════════════════════════════════════════════════════
    // HOOKS
    // ═════════════════════════════════════════════════════════════
    function useMediaQuery(query) {
      const [matches, setMatches] = useState(() =>
        typeof window !== 'undefined' ? window.matchMedia(query).matches : false
      );
      useEffect(() => {
        const mm = window.matchMedia(query);
        const handler = (e) => setMatches(e.matches);
        mm.addEventListener('change', handler);
        return () => mm.removeEventListener('change', handler);
      }, [query]);
      return matches;
    }

    function useTickingClock(intervalMs = 60000) {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), intervalMs);
        return () => clearInterval(id);
      }, [intervalMs]);
      return now;
    }

    // ═════════════════════════════════════════════════════════════
    // APP ROOT
    // ═════════════════════════════════════════════════════════════
    function App() {
      const [phase, setPhase] = useState('booting');
      const [error, setError] = useState('');
      const [fileId, setFileId] = useState(null);
      const [data, setData] = useState(null);
      const [saving, setSaving] = useState(false);
      const [lastSyncedAt, setLastSyncedAt] = useState(null);

      const loadOrCreate = useCallback(async () => {
        setPhase('loading');
        try {
          const existing = await findDataFile();
          if (existing) {
            const content = await downloadFile(existing.id);
            const { data: migrated, migrated: didMigrate } = migrate(content);
            setFileId(existing.id);
            setData(migrated);
            setLastSyncedAt(new Date());
            if (didMigrate) {
              migrated.lastModified = new Date().toISOString();
              await updateFile(existing.id, migrated);
            }
          } else {
            const fresh = makeDefaultData();
            const created = await createFile(fresh);
            setFileId(created.id);
            setData(fresh);
            setLastSyncedAt(new Date());
          }
          setPhase('ready');
        } catch (e) {
          setError(`Load failed: ${e.message}`);
          setPhase('error');
        }
      }, []);

      // Persist new data to Drive. Optimistically updates local state, then syncs.
      const persist = useCallback(async (nextData) => {
        if (!fileId) return;
        setData(nextData); // optimistic — render reflects change immediately
        setSaving(true);
        setError('');
        try {
          await updateFile(fileId, nextData);
          setLastSyncedAt(new Date());
        } catch (e) {
          setError(`Save failed: ${e.message}`);
        } finally {
          setSaving(false);
        }
      }, [fileId]);

      useEffect(() => {
        (async () => {
          try {
            await initAuth();
            try {
              await requestToken({ silent: true });
              await loadOrCreate();
            } catch {
              setPhase('signin');
            }
          } catch (e) {
            setError(`Init failed: ${e.message}`);
            setPhase('error');
          }
        })();
      }, [loadOrCreate]);

      const handleSignIn = async () => {
        setError('');
        try {
          await requestToken({ silent: false });
          await loadOrCreate();
        } catch (e) {
          setError(`Sign-in failed: ${e.message}`);
          setPhase('signin');
        }
      };
      const handleSignOut = async () => {
        await revokeToken();
        setData(null);
        setFileId(null);
        setLastSyncedAt(null);
        setPhase('signin');
      };
      const handleReload = async () => {
        setError('');
        await loadOrCreate();
      };

      if (phase === 'booting')
        return <Centered><span className="pulse" /><span>Initializing</span></Centered>;
      if (phase === 'loading')
        return <Centered><span className="pulse" /><span>Syncing with Drive</span></Centered>;
      if (phase === 'error')
        return <ErrorScreen message={error} onRetry={() => setPhase('signin')} />;
      if (phase === 'signin')
        return <SignInScreen onSignIn={handleSignIn} error={error} />;
      return (
        <CalendarScreen
          data={data}
          saving={saving}
          lastSyncedAt={lastSyncedAt}
          error={error}
          onReload={handleReload}
          onSignOut={handleSignOut}
          onPersist={persist}
        />
      );
    }

    function Centered({ children }) {
      return (
        <div className="wrap center">
          <div style={{ color: 'var(--muted-3)', fontSize: 14, fontStyle: 'italic', letterSpacing: '0.05em' }}>
            {children}
          </div>
        </div>
      );
    }

    function SignInScreen({ onSignIn, error }) {
      return (
        <div className="wrap screen-pad-top fade-in">
          <div className="eyebrow">Executive Performance System</div>
          <h1 className="title">My Planning</h1>
          <div className="rule" />
          <p className="lede">
            One source of truth across every device.<br />
            Your routine, your calendars, your reflections —<br />
            stored privately in your own Google Drive.
          </p>
          <button className="btn-primary" onClick={onSignIn}>Sign in with Google →</button>
          {error && <div className="error-box">{error}</div>}
          <div className="info-box">
            <div className="info-label">How storage works</div>
            One JSON file, hidden in your Drive's app folder.<br />
            Only this app can see it. Sign in on any device — same data appears.<br />
            Sign out and revoke any time from your Google account permissions.
          </div>
        </div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <div className="wrap screen-pad-top fade-in">
          <div className="eyebrow danger">Something went wrong</div>
          <h2 className="title">Hmm.</h2>
          <div className="rule" />
          <div className="error-box">{message}</div>
          <div style={{ marginTop: 24 }}>
            <button className="btn-primary" onClick={onRetry}>Try again</button>
          </div>
        </div>
      );
    }

    // ═════════════════════════════════════════════════════════════
    // CALENDAR SCREEN
    // ═════════════════════════════════════════════════════════════
    function CalendarScreen({ data, saving, lastSyncedAt, error, onReload, onSignOut, onPersist }) {
      const isMobile = useMediaQuery('(max-width: 759px)');
      const now = useTickingClock(60000);
      const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
      const [dayView, setDayView] = useState(null); // null = week view, 0..6 = visual column
      const [openBlockId, setOpenBlockId] = useState(null); // block currently shown in popover

      const weekEnd = addDays(weekStart, 6);
      const isCurrentWeek = isSameDay(weekStart, startOfWeek(now));

      const persistData = useCallback((mutator) => {
        const nextData = typeof mutator === 'function' ? mutator(data) : mutator;
        const withTimestamp = { ...nextData, lastModified: new Date().toISOString() };
        onPersist(withTimestamp);
      }, [data, onPersist]);

      const createBlock = useCallback((block) => {
        const newBlock = {
          id: `block-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
          status: 'scheduled',
          actualMinutes: null,
          completedAt: null,
          createdAt: new Date().toISOString(),
          ...block,
        };
        persistData(d => ({
          ...d,
          scheduledBlocks: [...(d.scheduledBlocks || []), newBlock],
        }));
      }, [persistData]);

      const updateBlock = useCallback((blockId, changes) => {
        persistData(d => ({
          ...d,
          scheduledBlocks: (d.scheduledBlocks || []).map(b =>
            b.id === blockId ? { ...b, ...changes } : b
          ),
        }));
      }, [persistData]);

      const deleteBlock = useCallback((blockId) => {
        persistData(d => ({
          ...d,
          scheduledBlocks: (d.scheduledBlocks || []).filter(b => b.id !== blockId),
        }));
      }, [persistData]);

      const goPrev = () => {
        if (dayView !== null) {
          // Day view: shift one day. Crossing a week boundary shifts the week too.
          if (dayView === 0) {
            setWeekStart(addDays(weekStart, -7));
            setDayView(6);
          } else {
            setDayView(dayView - 1);
          }
        } else {
          setWeekStart(addDays(weekStart, -7));
        }
      };
      const goNext = () => {
        if (dayView !== null) {
          if (dayView === 6) {
            setWeekStart(addDays(weekStart, 7));
            setDayView(0);
          } else {
            setDayView(dayView + 1);
          }
        } else {
          setWeekStart(addDays(weekStart, 7));
        }
      };
      const goToday = () => {
        setWeekStart(startOfWeek(new Date()));
        if (dayView !== null) {
          const d = now.getDay();
          setDayView(d === 0 ? 6 : d - 1);
        }
      };

      const handleDayClick = (col) => {
        if (isMobile) return; // mobile already shows day-at-a-time
        if (dayView === col) setDayView(null);
        else setDayView(col);
      };

      const blocks = data.scheduledBlocks || [];
      const projects = data.projects || [];
      const openBlock = openBlockId ? blocks.find(b => b.id === openBlockId) : null;

      return (
        <div className={`wrap-wide screen-pad-top-sm fade-in ${dayView !== null ? 'day-view' : ''}`}>
          <RightNowBanner
            routine={data.routine}
            scheduledBlocks={blocks}
            projects={projects}
            now={now}
          />

          <div className="main-layout">
            <div className="portfolio">
              <PortfolioPanel
                projects={projects}
                scheduledBlocks={blocks}
                weekStart={weekStart}
              />
            </div>

            <div className="calendar-panel">
              <CalendarHeader
                weekStart={weekStart}
                weekEnd={weekEnd}
                isCurrentWeek={isCurrentWeek}
                dayView={dayView}
                onPrev={goPrev}
                onNext={goNext}
                onToday={goToday}
                saving={saving}
                error={error}
                lastSyncedAt={lastSyncedAt}
              />

              {dayView !== null && !isMobile && (
                <button className="day-view-back" onClick={() => setDayView(null)}>
                  ← Back to week
                </button>
              )}

              {isMobile ? (
                <AgendaView
                  routine={data.routine}
                  scheduledBlocks={blocks}
                  projects={projects}
                  weekStart={weekStart}
                  now={now}
                  onBlockClick={(blockId) => setOpenBlockId(blockId)}
                />
              ) : (
                <WeekGrid
                  routine={data.routine}
                  scheduledBlocks={blocks}
                  projects={projects}
                  weekStart={weekStart}
                  now={now}
                  singleCol={dayView}
                  onDayClick={handleDayClick}
                  onCreateBlock={createBlock}
                  onBlockClick={(blockId) => setOpenBlockId(blockId)}
                />
              )}

              <Legend />
            </div>
          </div>

          {openBlock && (
            <BlockPopover
              block={openBlock}
              projects={projects}
              onClose={() => setOpenBlockId(null)}
              onUpdate={(changes) => updateBlock(openBlock.id, changes)}
              onDelete={() => { deleteBlock(openBlock.id); setOpenBlockId(null); }}
            />
          )}

          <details className="raw">
            <summary>Diagnostics · raw data</summary>
            <pre>{JSON.stringify(data, null, 2)}</pre>
          </details>

          <div className="footer">
            <div className="footer-info">{FILE_NAME}</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn-tertiary" onClick={onReload}>↻ Reload</button>
              <button className="btn-tertiary" onClick={onSignOut}>Sign out</button>
            </div>
          </div>
        </div>
      );
    }

    // ═════════════════════════════════════════════════════════════
    // RIGHT NOW BANNER
    // ═════════════════════════════════════════════════════════════
    function RightNowBanner({ routine, scheduledBlocks, projects, now }) {
      const jsDay = now.getDay();
      const todayCol = jsDay === 0 ? 6 : jsDay - 1;
      const nowMin = now.getHours() * 60 + now.getMinutes();
      const todayKey = startOfDay(now).toISOString();

      // Routine items happening today, sorted chronologically
      const todayRoutine = itemsForVisualColumn(todayCol, routine)
        .map(it => ({
          source: 'routine',
          title: it.title,
          start: toMinutes(it.start),
          end: toMinutes(it.start) + it.duration,
          note: it.note,
          category: it.category,
        }));

      // Scheduled project blocks for today (excluding completed/skipped — those are done)
      const todayBlocks = blocksForDate(scheduledBlocks || [], now)
        .filter(b => b.status !== 'completed')
        .map(b => {
          const project = projects.find(p => p.id === b.projectId);
          return {
            source: 'project',
            title: b.title,
            start: toMinutes(b.start),
            end: toMinutes(b.start) + b.duration,
            note: project ? project.name : '',
            category: 'project',
          };
        });

      const allTodayItems = [...todayRoutine, ...todayBlocks].sort((a, b) => a.start - b.start);

      const current = allTodayItems.find(it => it.start <= nowMin && it.end > nowMin);
      const upcoming = allTodayItems.filter(it => it.start > nowMin);
      const next = upcoming[0];

      // Micro-strength: surface when within first 90 seconds of an hour, 9-18, Mon-Fri (and not at home only when off-toggled — V1: always show)
      const isWeekday = jsDay >= 1 && jsDay <= 5;
      const inMicroWindow = isWeekday && now.getHours() >= 9 && now.getHours() <= 18 && now.getMinutes() < 2;

      const dayName = DAY_NAMES_LONG[todayCol];
      const dateStr = formatDateShort(now);
      const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

      let nowBlock;
      if (inMicroWindow) {
        nowBlock = (
          <>
            <div className="right-now-now">⚡ Micro-Strength · top of the hour</div>
            <div className="right-now-next" style={{ color: 'var(--teal)' }}>
              ~60–80s · 10 air squats · 10 KB RDL · 10 push-ups · 6 KB row/side
            </div>
          </>
        );
      } else if (current) {
        const remaining = current.end - nowMin;
        nowBlock = (
          <>
            <div className="right-now-now">{current.title}</div>
            <div className="right-now-next">
              <b>{remaining} min remaining</b>
              {next && <> · then <b>{next.title}</b> at {pad(Math.floor(next.start / 60))}:{pad(next.start % 60)}</>}
            </div>
          </>
        );
      } else if (next) {
        const minsUntil = next.start - nowMin;
        const startStr = `${pad(Math.floor(next.start / 60))}:${pad(next.start % 60)}`;
        nowBlock = (
          <>
            <div className="right-now-now-empty">
              {minsUntil < 60 ? `Free for ${minsUntil} min — use them deliberately.` : 'Open block. Decide what to work on.'}
            </div>
            <div className="right-now-next">Next: <b>{next.title}</b> at {startStr}</div>
          </>
        );
      } else {
        nowBlock = (
          <>
            <div className="right-now-now-empty">Day is done. Rest is part of the work.</div>
          </>
        );
      }

      return (
        <div className="right-now">
          <div>
            <div className="right-now-label">Right Now</div>
            {nowBlock}
          </div>
          <div className="right-now-time">
            <div className="right-now-time-big">{timeStr}</div>
            <div className="right-now-time-day">{dayName} · {dateStr}</div>
          </div>
        </div>
      );
    }

    // ═════════════════════════════════════════════════════════════
    // PORTFOLIO PANEL
    // ═════════════════════════════════════════════════════════════
    function PortfolioPanel({ projects, scheduledBlocks, weekStart }) {
      const [expandedId, setExpandedId] = useState('next'); // NEXT expanded by default

      const totalBudgetMin = projects.reduce((sum, p) => sum + (p.weeklyBudgetHours || 0) * 60, 0);
      const totalScheduledMin = projects.reduce(
        (sum, p) => sum + plannedMinutesForProject(scheduledBlocks, weekStart, p.id),
        0
      );
      const overBudget = totalScheduledMin > totalBudgetMin;
      const actionStates = useMemo(() => actionStateMap(scheduledBlocks), [scheduledBlocks]);

      return (
        <>
          <div className="portfolio-header">
            <div className="portfolio-eyebrow">Portfolio</div>
            <div className={`portfolio-budget-summary ${overBudget ? 'over' : ''}`}>
              <b>{minutesToHrLabel(totalScheduledMin)}</b> / {minutesToHrLabel(totalBudgetMin)} this week
            </div>
          </div>
          {projects.map(project => (
            <ProjectCard
              key={project.id}
              project={project}
              expanded={expandedId === project.id}
              onToggle={() => setExpandedId(expandedId === project.id ? null : project.id)}
              scheduledBlocks={scheduledBlocks}
              weekStart={weekStart}
              actionStates={actionStates}
            />
          ))}
        </>
      );
    }

    function minutesToHrLabel(min) {
      if (!min) return '0h';
      const h = Math.floor(min / 60);
      const m = min % 60;
      if (h === 0) return `${m}m`;
      if (m === 0) return `${h}h`;
      return `${h}h ${m}m`;
    }

    function ProjectCard({ project, expanded, onToggle, scheduledBlocks, weekStart, actionStates }) {
      const isMaster = !!project.isMaster;
      const tierLabel = `Tier ${project.tier}`;

      const plannedMin = plannedMinutesForProject(scheduledBlocks, weekStart, project.id);
      const budgetMin = (project.weeklyBudgetHours || 0) * 60;
      const fillPct = budgetMin > 0 ? Math.min(100, (plannedMin / budgetMin) * 100) : 0;
      const isOver = budgetMin > 0 && plannedMin > budgetMin;
      const isSlackOnly = project.weeklyBudgetHours === 0;

      const budgetText = isSlackOnly
        ? 'slack only'
        : `${minutesToHrLabel(plannedMin)} / ${project.weeklyBudgetHours}h`;

      return (
        <div
          className={`project-card ${isMaster ? 'master' : ''} ${expanded ? 'expanded' : ''}`}
          style={{ borderLeftColor: project.color || 'var(--border)' }}
        >
          <div className="project-card-header" onClick={onToggle}>
            <div className="project-card-top">
              <div className="project-card-name" style={isMaster ? { color: project.color } : {}}>
                {project.name}
              </div>
              <div className="project-card-tier">{tierLabel}</div>
            </div>
            {project.subtitle && (
              <div className="project-card-subtitle">{project.subtitle}</div>
            )}
            <div className="project-card-status">{project.status}</div>
            <div className="project-card-meta">
              <div className="project-card-budget">
                {!isSlackOnly && (
                  <div className="project-card-budget-bar">
                    <div
                      className="project-card-budget-bar-fill"
                      style={{
                        width: `${fillPct}%`,
                        background: isOver ? 'var(--coral)' : project.color,
                      }}
                    />
                  </div>
                )}
                <span className="project-card-budget-text" style={isOver ? { color: 'var(--coral)' } : {}}>
                  {budgetText}
                </span>
              </div>
              {project.totalEffortRemainingHours != null && (
                <span className="project-card-effort">~{project.totalEffortRemainingHours}h remaining</span>
              )}
            </div>
          </div>

          {expanded && (
            <div className="project-card-body">
              {isMaster && project.modules ? (
                <NextModulesList project={project} actionStates={actionStates} />
              ) : (
                <ProjectNextActions project={project} actionStates={actionStates} />
              )}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // ActionChip — draggable chip representing a "next action" in the portfolio
    // ─────────────────────────────────────────────────────────────
    function ActionChip({ action, project, moduleNumber, actionStates }) {
      const state = actionStates[action.id];
      const status = state ? state.status : 'open';
      const draggable = status !== 'completed';

      const onDragStart = (e) => {
        if (!draggable) { e.preventDefault(); return; }
        e.dataTransfer.effectAllowed = 'copy';
        const payload = {
          type: 'next-action',
          projectId: project.id,
          actionId: action.id,
          title: action.text,
          duration: action.estimatedMin || 30,
          moduleNumber: moduleNumber || null,
          color: project.color,
        };
        e.dataTransfer.setData('application/json', JSON.stringify(payload));
        e.currentTarget.classList.add('next-action-dragging');
      };
      const onDragEnd = (e) => {
        e.currentTarget.classList.remove('next-action-dragging');
      };

      const cls = `next-action${status === 'scheduled' ? ' scheduled' : ''}`;
      const tooltip = draggable
        ? (status === 'scheduled'
            ? 'Already scheduled — drag to schedule another instance'
            : 'Drag onto a calendar slot to schedule')
        : 'Completed';

      return (
        <div
          className={cls}
          draggable={draggable}
          onDragStart={onDragStart}
          onDragEnd={onDragEnd}
          title={tooltip}
        >
          <div className="next-action-text">{action.text}</div>
          {status === 'scheduled' && (
            <span className="next-action-badge scheduled" title="A calendar block exists for this">SCHED</span>
          )}
          {action.estimatedMin && status !== 'scheduled' && (
            <div className="next-action-time">~{action.estimatedMin}m</div>
          )}
        </div>
      );
    }

    function ProjectNextActions({ project, actionStates }) {
      const actions = (project.nextActions || []).filter(a => {
        const s = actionStates[a.id];
        return !s || s.status !== 'completed';
      });
      if (actions.length === 0) {
        return <div style={{ fontSize: 11, color: 'var(--muted-4)', fontStyle: 'italic' }}>All actions complete or none defined.</div>;
      }
      return (
        <>
          <div className="next-actions-label">Next actions</div>
          {actions.map(a => (
            <ActionChip key={a.id} action={a} project={project} actionStates={actionStates} />
          ))}
        </>
      );
    }

    function NextModulesList({ project, actionStates }) {
      const [expandedModuleId, setExpandedModuleId] = useState(null);
      const sequence = project.prioritySequence || [];
      const moduleByNumber = {};
      project.modules.forEach(m => { moduleByNumber[m.number] = m; });
      const orderedModules = [];
      sequence.forEach(n => { if (moduleByNumber[n]) orderedModules.push(moduleByNumber[n]); });
      project.modules.forEach(m => { if (!sequence.includes(m.number)) orderedModules.push(m); });

      return (
        <>
          <div className="next-actions-label">Modules · priority order</div>
          <div className="module-list">
            {orderedModules.map((mod, idx) => {
              const statusStyle = MODULE_STATUS_STYLE[mod.status] || MODULE_STATUS_STYLE['not started'];
              const isExpanded = expandedModuleId === mod.id;
              const isTop = idx < 3;
              const visibleActions = (mod.nextActions || []).filter(a => {
                const s = actionStates[a.id];
                return !s || s.status !== 'completed';
              });
              return (
                <div key={mod.id} className={`module-row ${isExpanded ? 'expanded' : ''}`}>
                  <div className="module-row-header" onClick={() => setExpandedModuleId(isExpanded ? null : mod.id)}>
                    <div className={`module-row-priority ${isTop ? 'top' : ''}`}>#{idx + 1}</div>
                    <div className="module-row-name">{mod.name}</div>
                    <div className="module-row-effort">~{mod.effortRemainingHours}h</div>
                    <div
                      className="module-row-status"
                      style={{ background: statusStyle.color }}
                      title={statusStyle.label}
                    />
                  </div>
                  {isExpanded && (
                    <div className="module-row-body">
                      <div className="module-row-description">{mod.description}</div>
                      <div className="next-actions-label">Next actions</div>
                      {visibleActions.length === 0 ? (
                        <div style={{ fontSize: 11, color: 'var(--muted-4)', fontStyle: 'italic' }}>All actions complete.</div>
                      ) : (
                        visibleActions.map(a => (
                          <ActionChip key={a.id} action={a} project={project} moduleNumber={mod.number} actionStates={actionStates} />
                        ))
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      );
    }

    // ═════════════════════════════════════════════════════════════
    // BLOCK POPOVER — click any scheduled block to manage it
    // ═════════════════════════════════════════════════════════════
    function BlockPopover({ block, projects, onClose, onUpdate, onDelete }) {
      const project = projects.find(p => p.id === block.projectId);
      const projectColor = (project && project.color) || 'var(--gold)';
      const dateObj = new Date(block.date);
      const dayName = DAY_NAMES_LONG[(dateObj.getDay() === 0 ? 6 : dateObj.getDay() - 1)];
      const startMin = toMinutes(block.start);
      const endMin = startMin + (block.duration || 0);
      const endStr = `${pad(Math.floor(endMin / 60))}:${pad(endMin % 60)}`;

      const isPast = new Date(block.date).getTime() < startOfDay(new Date()).getTime() - 1;
      const isCompleted = block.status === 'completed';
      const isPartial = block.status === 'partial';

      // Local form state for editing duration + start
      const [editStart, setEditStart] = useState(block.start);
      const [editDuration, setEditDuration] = useState(block.duration);
      const [actualMin, setActualMin] = useState(block.actualMinutes || block.duration || 30);

      const handleBackdropClick = (e) => {
        if (e.target === e.currentTarget) onClose();
      };

      const handleComplete = () => {
        onUpdate({
          status: 'completed',
          actualMinutes: Number(actualMin) || 0,
          completedAt: new Date().toISOString(),
        });
        onClose();
      };
      const handlePartial = () => {
        onUpdate({
          status: 'partial',
          actualMinutes: Number(actualMin) || 0,
          completedAt: new Date().toISOString(),
        });
        onClose();
      };
      const handleSkip = () => {
        // Treat skip as deletion (action returns to open). For past blocks this also removes
        // them from the calendar — which matches "didn't happen".
        onDelete();
      };
      const handleSaveEdit = () => {
        const dur = Number(editDuration);
        if (!editStart.match(/^\d{1,2}:\d{2}$/) || isNaN(dur) || dur < 5) return;
        const [h, m] = editStart.split(':').map(Number);
        const cleanStart = `${pad(h)}:${pad(m)}`;
        onUpdate({ start: cleanStart, duration: dur });
        onClose();
      };

      return (
        <div className="modal-backdrop" onClick={handleBackdropClick}>
          <div className="modal" style={{ borderTopColor: projectColor }}>
            <button className="modal-close" onClick={onClose} aria-label="Close">×</button>
            <div className="modal-header">
              <div className="modal-eyebrow" style={{ color: projectColor }}>
                {project ? project.name : 'Block'}
                {isCompleted && ' · completed'}
                {isPartial && ' · partial'}
              </div>
              <div className="modal-title">{block.title}</div>
              <div className="modal-meta">
                <span>{dayName} · {formatDateShort(dateObj)}</span>
                <span>{block.start}–{endStr}</span>
                <span>{block.duration} min scheduled</span>
                {block.actualMinutes != null && (
                  <span style={{ color: 'var(--teal)' }}>{block.actualMinutes} min spent</span>
                )}
              </div>
            </div>

            <div className="modal-body">
              {!isCompleted && (
                <div className="modal-section">
                  <div className="modal-section-label">Time spent</div>
                  <div className="modal-input-row">
                    <input
                      type="number"
                      className="modal-input"
                      value={actualMin}
                      min="0" max="600" step="5"
                      onChange={e => setActualMin(e.target.value)}
                    />
                    <span className="modal-input-suffix">minutes</span>
                  </div>
                </div>
              )}

              <div className="modal-section">
                <div className="modal-section-label">{isCompleted ? 'Adjust' : 'Mark this block as'}</div>
                <div className="modal-actions">
                  {!isCompleted && (
                    <>
                      <button className="modal-btn complete" onClick={handleComplete}>
                        <span>✓ Done · log time and remove from list</span>
                        <span className="modal-btn-hint">action complete</span>
                      </button>
                      <button className="modal-btn" onClick={handlePartial}>
                        <span>½ Partial · log time, action stays open</span>
                        <span className="modal-btn-hint">re-schedule it</span>
                      </button>
                    </>
                  )}
                  <button className="modal-btn danger" onClick={handleSkip}>
                    <span>{isPast ? "✕ Didn't happen · remove block" : "✕ Unschedule · return to portfolio"}</span>
                    <span className="modal-btn-hint">action returns to open</span>
                  </button>
                </div>
              </div>

              {!isCompleted && (
                <div className="modal-section">
                  <div className="modal-section-label">Edit time + duration</div>
                  <div className="modal-input-row">
                    <input
                      type="text"
                      className="modal-input wide"
                      value={editStart}
                      onChange={e => setEditStart(e.target.value)}
                      placeholder="HH:MM"
                    />
                    <input
                      type="number"
                      className="modal-input"
                      value={editDuration}
                      min="5" max="600" step="5"
                      onChange={e => setEditDuration(e.target.value)}
                    />
                    <span className="modal-input-suffix">min</span>
                    <button className="modal-btn primary" style={{ flex: 1 }} onClick={handleSaveEdit}>
                      <span>Save changes</span>
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function CalendarHeader({ weekStart, weekEnd, isCurrentWeek, dayView, onPrev, onNext, onToday, saving, error, lastSyncedAt }) {
      const synced = lastSyncedAt
        ? lastSyncedAt.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })
        : '—';
      const status = error ? 'error' : (saving ? 'saving' : '');
      const statusText = error ? 'Save error' : (saving ? 'Saving…' : `Synced ${synced}`);

      const isDayView = dayView !== null;
      const focusedDate = isDayView ? addDays(weekStart, dayView) : null;
      const focusedIsToday = isDayView && isSameDay(focusedDate, new Date());

      return (
        <div className="cal-header">
          <div className="cal-title-block">
            <div className="cal-eyebrow">My Planning</div>
            <div className="cal-week-label">
              {isDayView
                ? (focusedIsToday ? 'Today' : DAY_NAMES_LONG[dayView])
                : (isCurrentWeek ? 'This week' : `Week of ${formatDateShort(weekStart)}`)}
            </div>
            <div className="cal-week-range">
              {isDayView ? formatDateShort(focusedDate) + ', ' + focusedDate.getFullYear() : formatRange(weekStart, weekEnd)}
            </div>
          </div>
          <div className="cal-controls">
            <span className={`sync-pill ${status}`}>{statusText}</span>
            <div style={{ width: 12 }} />
            <button className="cal-nav-btn" onClick={onPrev} aria-label={isDayView ? 'Previous day' : 'Previous week'}>‹</button>
            <button
              className={`cal-today-btn ${(isDayView ? focusedIsToday : isCurrentWeek) ? 'active' : ''}`}
              onClick={onToday}
            >Today</button>
            <button className="cal-nav-btn" onClick={onNext} aria-label={isDayView ? 'Next day' : 'Next week'}>›</button>
          </div>
        </div>
      );
    }

    function Legend() {
      const keys = ['supplement', 'focus', 'gym', 'commute', 'review', 'planning', 'elsewhere'];
      return (
        <div className="legend">
          {keys.map(k => {
            const s = CATEGORY_STYLES[k];
            return (
              <div key={k} className="legend-item" style={{ color: s.color }}>
                <span className="legend-swatch" style={{ borderLeftColor: s.color }} />
                <span>{s.label}</span>
              </div>
            );
          })}
        </div>
      );
    }

    // ═════════════════════════════════════════════════════════════
    // WEEK GRID (desktop) — supports singleCol mode for day view
    // ═════════════════════════════════════════════════════════════
    const HOUR_HEIGHT_WEEK = 56;
    const HOUR_HEIGHT_DAY  = 80;
    const START_HOUR = 6;
    const END_HOUR = 23;
    const HOURS_VISIBLE = END_HOUR - START_HOUR;

    function WeekGrid({ routine, scheduledBlocks, projects, weekStart, now, singleCol, onDayClick, onCreateBlock, onBlockClick }) {
      const isDayView = singleCol !== null && singleCol !== undefined;
      const HOUR_HEIGHT = isDayView ? HOUR_HEIGHT_DAY : HOUR_HEIGHT_WEEK;
      const totalHeight = HOURS_VISIBLE * HOUR_HEIGHT;
      const isCurrentWeek = isSameDay(weekStart, startOfWeek(now));

      const cols = isDayView ? [singleCol] : [0, 1, 2, 3, 4, 5, 6];

      const [activeDropCol, setActiveDropCol] = useState(null);
      const [dropPreview, setDropPreview] = useState(null); // { col, top, height }
      const dragPayloadRef = useRef(null);

      // Convert mouse Y position within a day column → snapped HH:MM string
      const yToTimeString = (y) => {
        const minutesFromGridStart = (y / HOUR_HEIGHT) * 60;
        const totalMinutes = START_HOUR * 60 + minutesFromGridStart;
        const snapped = Math.max(START_HOUR * 60, Math.round(totalMinutes / 15) * 15);
        const clamped = Math.min(snapped, END_HOUR * 60 - 15);
        return `${pad(Math.floor(clamped / 60))}:${pad(clamped % 60)}`;
      };

      const onColDragOver = (e, col) => {
        if (!onCreateBlock) return;
        // Only handle drags carrying our payload
        if (!Array.from(e.dataTransfer.types).includes('application/json')) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        const rect = e.currentTarget.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const startStr = yToTimeString(y);
        const startMin = toMinutes(startStr);
        const dur = (dragPayloadRef.current && dragPayloadRef.current.duration) || 30;
        const top = ((startMin - START_HOUR * 60) / 60) * HOUR_HEIGHT;
        const height = (dur / 60) * HOUR_HEIGHT;
        setActiveDropCol(col);
        setDropPreview({ col, top, height, start: startStr });
      };

      const onColDragLeave = (e) => {
        // dragleave fires when entering child elements; only clear on actual exit
        if (e.currentTarget.contains(e.relatedTarget)) return;
        setActiveDropCol(null);
        setDropPreview(null);
      };

      const onColDrop = (e, col) => {
        e.preventDefault();
        setActiveDropCol(null);
        setDropPreview(null);
        let payload;
        try {
          payload = JSON.parse(e.dataTransfer.getData('application/json'));
        } catch { return; }
        if (!payload || payload.type !== 'next-action') return;
        const rect = e.currentTarget.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const startStr = yToTimeString(y);
        const date = startOfDay(addDays(weekStart, col)).toISOString();
        onCreateBlock({
          projectId: payload.projectId,
          actionId: payload.actionId,
          title: payload.title,
          date,
          start: startStr,
          duration: payload.duration || 30,
        });
        dragPayloadRef.current = null;
      };

      // Capture drag enter on document so we can read the payload (dataTransfer.getData
      // is restricted during dragover) — we read it from a ref instead, set on drag start.
      // Action chips in this app set window-level state via their own dragstart; we keep it simple
      // by re-parsing on dragover with a heuristic since duration is in payload.
      // Actually the cleanest path: read getData synchronously on drop only. For the preview
      // size we use the payload's duration value the chip set on a global window field.
      useEffect(() => {
        const handler = (e) => {
          if (!Array.from(e.dataTransfer.types).includes('application/json')) return;
          // Some browsers expose getData on dragstart only. We listen to dragstart globally:
        };
        const onDragStart = (e) => {
          try {
            const raw = e.dataTransfer.getData('application/json');
            if (raw) dragPayloadRef.current = JSON.parse(raw);
          } catch {}
        };
        // Listen at the document level so any chip's dragstart updates our ref
        document.addEventListener('dragstart', onDragStart, true);
        return () => document.removeEventListener('dragstart', onDragStart, true);
      }, []);

      return (
        <div className="week-grid">
          <div className="week-grid-header">
            <div className="time-gutter-header" />
            {cols.map(col => {
              const date = addDays(weekStart, col);
              const isToday = isCurrentWeek && isSameDay(date, now);
              const isWeekend = col === 5 || col === 6;
              return (
                <div
                  key={col}
                  className={`day-header ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}`}
                  onClick={() => onDayClick && onDayClick(col)}
                  title={isDayView ? 'Click to return to week view' : 'Click to zoom into this day'}
                >
                  <div className="day-header-name">{DAY_NAMES_SHORT[col]}</div>
                  <div className="day-header-date">{date.getDate()}</div>
                </div>
              );
            })}
          </div>

          <div className="week-grid-body" style={{ height: totalHeight }}>
            <div className="time-gutter">
              {Array.from({ length: HOURS_VISIBLE + 1 }, (_, i) => (
                <div
                  key={i}
                  className="hour-label"
                  style={{ top: i * HOUR_HEIGHT }}
                >{pad(START_HOUR + i)}:00</div>
              ))}
            </div>

            {cols.map(col => {
              const date = addDays(weekStart, col);
              const isToday = isCurrentWeek && isSameDay(date, now);
              const isWeekend = col === 5 || col === 6;
              const dayItems = combinedDayItems(col, routine, scheduledBlocks || [], weekStart);

              return (
                <div
                  key={col}
                  className={`day-column ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''} ${activeDropCol === col ? 'drop-active' : ''}`}
                  onDragOver={(e) => onColDragOver(e, col)}
                  onDragLeave={onColDragLeave}
                  onDrop={(e) => onColDrop(e, col)}
                >
                  {Array.from({ length: HOURS_VISIBLE }, (_, i) => (
                    <div
                      key={i}
                      className="hour-line"
                      style={{ top: (i + 1) * HOUR_HEIGHT }}
                    />
                  ))}
                  {dayItems.map(item => (
                    <CalItem
                      key={item.id}
                      item={item}
                      hourHeight={HOUR_HEIGHT}
                      projects={projects}
                      onBlockClick={onBlockClick}
                    />
                  ))}
                  {isToday && <NowLine now={now} hourHeight={HOUR_HEIGHT} />}
                  {dropPreview && dropPreview.col === col && (
                    <div className="drop-ghost" style={{ top: dropPreview.top, height: dropPreview.height }}>
                      <div style={{ padding: 4, fontSize: 10, color: 'var(--gold)', fontFamily: 'var(--mono)', letterSpacing: '0.05em' }}>
                        {dropPreview.start}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function CalItem({ item, hourHeight, projects, onBlockClick }) {
      const isBlock = item._kind === 'block';
      const block = isBlock ? item._block : null;
      const project = isBlock && projects ? projects.find(p => p.id === block.projectId) : null;
      const projectColor = (project && project.color) || 'var(--gold)';

      // Style + colors
      const style = isBlock
        ? { color: projectColor, bgAlpha: 0.18 }
        : (CATEGORY_STYLES[item.category] || CATEGORY_STYLES.supplement);

      const startMin = toMinutes(item.start);
      const offsetMin = startMin - START_HOUR * 60;
      const top = (offsetMin / 60) * hourHeight;
      const rawHeight = (item.duration / 60) * hourHeight;
      const height = Math.max(rawHeight, 22);
      const isTiny = rawHeight < 26;
      const isShort = !isTiny && rawHeight < 50;

      const lane = item._lane || 0;
      const totalLanes = item._totalLanes || 1;
      const widthPct = 100 / totalLanes;
      const leftPct = widthPct * lane;

      const endMin = startMin + item.duration;
      const endStr = `${pad(Math.floor(endMin / 60))}:${pad(endMin % 60)}`;

      const tooltipParts = isBlock
        ? [
            `${item.title}`,
            project ? `Project: ${project.name}` : null,
            `${item.start}–${endStr} (${item.duration} min)`,
            block.status === 'partial' ? `Partial · ${block.actualMinutes || 0} min logged` : null,
            block.status === 'completed' ? `Completed · ${block.actualMinutes || 0} min` : null,
            'Click to manage',
          ].filter(Boolean)
        : [
            `${item.title} · ${item.start}–${endStr}`,
            item.note,
            item.homeOnly ? '(home only)' : null,
          ].filter(Boolean);

      let cls = 'cal-item';
      if (isTiny) cls += ' tiny';
      else if (isShort) cls += ' short';
      if (isBlock) {
        cls += ' project-block';
        if (block.status === 'completed') cls += ' completed';
        if (block.status === 'partial') cls += ' partial';
      }

      const onClick = isBlock && onBlockClick
        ? (e) => { e.stopPropagation(); onBlockClick(block.id); }
        : undefined;

      return (
        <div
          className={cls}
          title={tooltipParts.join('\n')}
          onClick={onClick}
          style={{
            top,
            height,
            left: `calc(${leftPct}% + 2px)`,
            width: `calc(${widthPct}% - 4px)`,
            background: hexToRgba(style.color, style.bgAlpha),
            borderLeft: `3px solid ${style.color}`,
          }}
        >
          {!isTiny && (
            <div className="cal-item-time" style={{ color: style.color }}>{item.start}–{endStr}</div>
          )}
          <div className="cal-item-title">
            {item.title}
            {item.homeOnly && !isBlock && <span className="cal-item-home-flag" style={{ color: style.color }} />}
          </div>
          {isBlock && project && !isTiny && (
            <div className="cal-item-project" style={{ color: style.color }}>{project.name}</div>
          )}
          {item.note && !isTiny && !isShort && !isBlock && (
            <div className="cal-item-note">{item.note}</div>
          )}
        </div>
      );
    }

    function NowLine({ now, hourHeight }) {
      const min = now.getHours() * 60 + now.getMinutes();
      const offsetMin = min - START_HOUR * 60;
      if (offsetMin < 0 || offsetMin > HOURS_VISIBLE * 60) return null;
      const top = (offsetMin / 60) * hourHeight;
      return <div className="now-line" style={{ top }} />;
    }

    // ═════════════════════════════════════════════════════════════
    // AGENDA VIEW (mobile)
    // ═════════════════════════════════════════════════════════════
    function AgendaView({ routine, scheduledBlocks, projects, weekStart, now, onBlockClick }) {
      const isCurrentWeek = isSameDay(weekStart, startOfWeek(now));
      const todayCol = isCurrentWeek
        ? (now.getDay() === 0 ? 6 : now.getDay() - 1)
        : 0;
      const [selectedCol, setSelectedCol] = useState(todayCol);

      useEffect(() => {
        setSelectedCol(isCurrentWeek ? todayCol : 0);
      }, [weekStart.getTime()]); // eslint-disable-line

      const date = addDays(weekStart, selectedCol);
      const isSelectedToday = isCurrentWeek && isSameDay(date, now);

      const routineItems = itemsForVisualColumn(selectedCol, routine).map(it => ({
        ...it, _kind: 'routine',
      }));
      const blockItems = blocksForDate(scheduledBlocks || [], date).map(b => {
        const project = (projects || []).find(p => p.id === b.projectId);
        return {
          id: b.id,
          title: b.title,
          start: b.start,
          duration: b.duration,
          category: 'project-block',
          _kind: 'block',
          _block: b,
          _project: project,
        };
      });
      const sorted = [...routineItems, ...blockItems].sort((a, b) => toMinutes(a.start) - toMinutes(b.start));
      const nowMin = now.getHours() * 60 + now.getMinutes();

      return (
        <>
          <div className="agenda-day-strip">
            {Array.from({ length: 7 }, (_, col) => {
              const d = addDays(weekStart, col);
              const isToday = isCurrentWeek && isSameDay(d, now);
              const isSelected = col === selectedCol;
              return (
                <button
                  key={col}
                  className={`agenda-day-chip ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}`}
                  onClick={() => setSelectedCol(col)}
                >
                  <span className="agenda-day-chip-name">{DAY_NAMES_SHORT[col]}</span>
                  <span className="agenda-day-chip-date">{d.getDate()}</span>
                </button>
              );
            })}
          </div>

          <div className="agenda-header">
            <div className="agenda-day-title">{DAY_NAMES_LONG[selectedCol]}</div>
            <div className="agenda-day-subtitle">{formatDateShort(date)}</div>
          </div>

          {sorted.length === 0 ? (
            <div className="agenda-empty">No items on this day yet. Plan from a desktop to schedule project work.</div>
          ) : (
            <div className="agenda-list">
              {sorted.map(item => {
                const isBlock = item._kind === 'block';
                const block = isBlock ? item._block : null;
                const project = isBlock ? item._project : null;
                const color = isBlock
                  ? ((project && project.color) || 'var(--gold)')
                  : (CATEGORY_STYLES[item.category] || CATEGORY_STYLES.supplement).color;
                const startMin = toMinutes(item.start);
                const endMin = startMin + item.duration;
                const endStr = `${pad(Math.floor(endMin / 60))}:${pad(endMin % 60)}`;
                let stateClass = '';
                if (isSelectedToday) {
                  if (endMin < nowMin) stateClass = 'past';
                  else if (startMin <= nowMin && endMin >= nowMin) stateClass = 'now';
                }
                if (isBlock && block.status === 'completed') stateClass += ' past';

                const handleClick = isBlock && onBlockClick
                  ? () => onBlockClick(block.id)
                  : undefined;

                return (
                  <div
                    key={item.id}
                    className={`agenda-item ${stateClass}`}
                    onClick={handleClick}
                    style={isBlock ? { cursor: 'pointer' } : {}}
                  >
                    <div className="agenda-item-stripe" style={{ background: color }} />
                    <div className="agenda-item-time">
                      <span>{item.start}</span>
                      {item.duration >= 15 && <span className="agenda-item-time-end">→ {endStr}</span>}
                    </div>
                    <div className="agenda-item-content">
                      <div className="agenda-item-title">
                        {isBlock && block.status === 'completed' && '✓ '}
                        {isBlock && block.status === 'partial' && '½ '}
                        {item.title}
                        {item.homeOnly && !isBlock && (
                          <span style={{ color, marginLeft: 8, fontSize: 9, letterSpacing: '0.15em', fontFamily: 'var(--mono)', opacity: 0.7 }}>HOME</span>
                        )}
                        {isBlock && project && (
                          <span style={{ color, marginLeft: 8, fontSize: 9, letterSpacing: '0.15em', fontFamily: 'var(--mono)', opacity: 0.7 }}>
                            {project.name.replace('APP - ', '')}
                          </span>
                        )}
                      </div>
                      {item.note && !isBlock && <div className="agenda-item-meta">{item.note}</div>}
                      {isBlock && block.actualMinutes != null && (
                        <div className="agenda-item-meta">{block.actualMinutes} min spent</div>
                      )}
                    </div>
                    {stateClass.includes('now') && !isBlock && <span className="agenda-now-flag">NOW</span>}
                  </div>
                );
              })}
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
